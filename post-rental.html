<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | List Your Property</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; color: white; }
        .input-field:focus { border-color: #8B5CF6; outline: none; background: rgba(255, 255, 255, 0.07); box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="flex items-center justify-between px-4 py-4 max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
            <svg onclick="window.location.href='index.html'" class="cursor-pointer" width="30" height="30" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="20" fill="url(#logoGrad)"/>
                <path d="M14 12V28M14 20L24 12M14 20L24 28" stroke="white" stroke-width="3" stroke-linecap="round"/>
                <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
            </svg>
            <span class="text-lg font-bold tracking-tight">K-Hub <span class="text-xs font-normal text-purple-400">Landlords</span></span>
        </div>
        <button onclick="window.location.href='user-dashboard.html'" class="px-4 py-2 rounded-xl bg-white/10 text-[10px] font-bold">Back to Dashboard</button>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-2xl md:text-3xl font-bold">List a Property</h1>
            <p class="text-gray-400 text-sm mt-1">Provide details about your house, apartment, or shop in Kano.</p>
        </div>

        <form id="rental-form" class="space-y-6">
            <section class="glass-card p-6 md:p-8 rounded-3xl space-y-5">
                <h2 class="text-sm font-bold text-purple-400 uppercase tracking-widest">Property Information</h2>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Property Title</label>
                    <input type="text" id="title" required placeholder="e.g. Modern 2-Bedroom Flat" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Category</label>
                        <select id="category" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                            <option value="Apartment">Apartment/House</option>
                            <option value="Shop">Shop/Commercial</option>
                            <option value="Office">Office Space</option>
                            <option value="Land">Land</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Price (₦ / year)</label>
                        <input type="number" id="price" required placeholder="500000" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Location (LGA)</label>
                        <input type="text" id="location" required placeholder="Nasarawa" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Bedrooms (if applicable)</label>
                        <input type="number" id="bedrooms" placeholder="2" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Description</label>
                    <textarea id="description" required rows="4" placeholder="Mention amenities, water supply, security, etc." class="w-full input-field px-4 py-3 rounded-xl text-sm"></textarea>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Image URL (Optional for now)</label>
                    <input type="url" id="image-url" placeholder="https://image-link.com/house.jpg" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                </div>
            </section>

            <button type="submit" class="w-full py-4 neon-gradient rounded-2xl font-bold shadow-lg shadow-purple-500/20 active:scale-95 transition">
                Publish Listing
            </button>
        </form>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let landlordId = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'k-hub-login.html';
            } else {
                landlordId = user.uid;
            }
        });

        const rentalForm = document.getElementById('rental-form');
        rentalForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const rentalData = {
                landlordId: landlordId,
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: document.getElementById('price').value,
                location: document.getElementById('location').value,
                bedrooms: document.getElementById('bedrooms').value || "N/A",
                description: document.getElementById('description').value,
                imageUrl: document.getElementById('image-url').value || "",
                postedAt: new Date(),
                status: 'available'
            };

            try {
                await addDoc(collection(db, "rentals"), rentalData);
                alert("Property Listed Successfully!");
                window.location.href = 'rentals.html';
            } catch (error) {
                alert("Error: " + error.message);
            }
        });
    </script>
</body>
</html>
