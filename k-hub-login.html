<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Access Your Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { 
            background-color: #06080C; 
            color: white; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: var(--neon-purple);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }
        .btn-gradient {
            background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%);
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4);
        }
        .btn-gradient:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        /* Language Dropdown Style */
        .lang-dropdown { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; 
            padding: 8px 12px; 
            border-radius: 12px; 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            outline: none; 
            cursor: pointer;
        }
        .lang-dropdown option { background: #06080C; color: white; }
    </style>
</head>
<body class="p-6">

    <div class="w-full max-w-md">
        <div class="flex flex-col items-center mb-10 cursor-pointer" onclick="window.location.href='index.html'">
            <svg class="w-16 h-16 mb-4" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="10" fill="url(#k-grad)"/>
                <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                <defs><linearGradient id="k-grad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
            </svg>
            <h1 class="text-3xl font-black italic tracking-tighter">K-HUB</h1>
            <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.4em] mt-1">Kano Digital Marketplace</p>
        </div>

        <div class="glass-panel p-8 md:p-10 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-blue-500"></div>
            
            <div class="flex justify-between items-center mb-10">
                <div class="flex gap-6">
                    <button class="text-sm font-black uppercase tracking-widest border-b-2 border-purple-500 pb-2 lang-login-tab">Login</button>
                    <button onclick="window.location.href='register.html'" class="text-sm font-black uppercase tracking-widest text-gray-500 hover:text-white transition pb-2 lang-reg-tab">Register</button>
                </div>
                <select id="lang-select" class="lang-dropdown">
                    <option value="en">EN</option>
                    <option value="ha">HA</option>
                    <option value="ig">IG</option>
                    <option value="yo">YO</option>
                </select>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-500 tracking-widest mb-2 block lang-label-email">Account Email</label>
                    <input type="email" id="login-email" required placeholder="example@k-hub.ng" 
                           class="w-full input-field rounded-2xl px-5 py-4 outline-none text-sm font-medium">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] font-black uppercase text-gray-500 tracking-widest block lang-label-pass">Security Key</label>
                        <button type="button" id="forgot-password" class="text-[10px] font-black uppercase text-purple-400 hover:text-white transition lang-forgot">Forgot Key?</button>
                    </div>
                    <input type="password" id="login-password" required placeholder="••••••••••••" 
                           class="w-full input-field rounded-2xl px-5 py-4 outline-none text-sm font-medium">
                </div>

                <button type="submit" id="auth-btn" class="w-full btn-gradient py-4 rounded-2xl text-[11px] font-black uppercase tracking-[0.2em] transition lang-authorize">
                    Authorize Access
                </button>
            </form>

            <div class="mt-10">
                <div class="flex items-center gap-4 mb-8">
                    <div class="flex-1 h-[1px] bg-white/5"></div>
                    <span class="text-[9px] font-black text-gray-600 uppercase tracking-widest">Global Auth</span>
                    <div class="flex-1 h-[1px] bg-white/5"></div>
                </div>

                <button id="google-login" class="w-full flex items-center justify-center gap-3 bg-white/5 border border-white/10 py-4 rounded-2xl hover:bg-white/10 transition group">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5 group-hover:scale-110 transition" alt="Google">
                    <span class="text-[10px] font-black uppercase tracking-widest lang-google">Connect with Google</span>
                </button>
            </div>
        </div>

        <footer class="mt-10 text-center">
            <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-2 lang-footer-trust">Trusted by 50,000+ Kano Residents</p>
        </footer>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { 
            signInWithEmailAndPassword, 
            GoogleAuthProvider, 
            signInWithPopup, 
            sendPasswordResetEmail 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- LANGUAGE LOGIC ---
        const translations = {
            en: { loginTab: "Login", regTab: "Register", labelEmail: "Account Email", labelPass: "Security Key", forgot: "Forgot Key?", authorize: "Authorize Access", google: "Connect with Google", trust: "Trusted by 50,000+ Kano Residents", error: "Auth Error", resetSent: "Security reset email sent!" },
            ha: { loginTab: "Shiga", regTab: "Yi Rajista", labelEmail: "Imel Na Akant", labelPass: "Kalmar Sirri", forgot: "Ka Manta Key?", authorize: "Bada Izini", google: "Shiga da Google", trust: "Mutane 50,000+ ne suka amince da mu", error: "Matsalar Shiga", resetSent: "An tura saƙon sabunta kalmar sirri!" },
            ig: { loginTab: "Banye", regTab: "Debanye aha", labelEmail: "Email gị", labelPass: "Igodo Nchebe", forgot: "Chefuru igodo?", authorize: "Nye ikike mbanye", google: "Jiri Google banye", trust: "Ndị bi na Kano 50,000+ tụkwasịrị obi", error: "Nsogbu mbanye", resetSent: "Ezigara ozi nseta igodo!" },
            yo: { loginTab: "Wọlé", regTab: "Forúkọsílẹ̀", labelEmail: "Imeeli rẹ", labelPass: "Kókó Ààbò", forgot: "Gbàgbé kókó?", authorize: "Gba Ìyọ̀ǹda", google: "Lo Google wọlé", trust: "Ju 50,000+ olùgbé Kano lo fọkàn tán wa", error: "Àṣìṣe Ìwọlé", resetSent: "A ti fi imeeli ìtúnṣe ránṣẹ́!" }
        };

        function applyLanguage(lang) {
            const l = translations[lang];
            document.querySelector('.lang-login-tab').innerText = l.loginTab;
            document.querySelector('.lang-reg-tab').innerText = l.regTab;
            document.querySelector('.lang-label-email').innerText = l.labelEmail;
            document.querySelector('.lang-label-pass').innerText = l.labelPass;
            document.querySelector('.lang-forgot').innerText = l.forgot;
            document.querySelector('.lang-authorize').innerText = l.authorize;
            document.querySelector('.lang-google').innerText = l.google;
            document.querySelector('.lang-footer-trust').innerText = l.trust;
            
            localStorage.setItem('kHubLang', lang);
            document.getElementById('lang-select').value = lang;
        }

        document.getElementById('lang-select').addEventListener('change', (e) => applyLanguage(e.target.value));
        
        // Auto-load saved language
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('kHubLang') || 'en';
            applyLanguage(saved);
        });

        // --- AUTH LOGIC ---
        const loginForm = document.getElementById('login-form');
        const googleBtn = document.getElementById('google-login');
        const forgotBtn = document.getElementById('forgot-password');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const lang = localStorage.getItem('kHubLang') || 'en';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                handleRedirect(userCredential.user);
            } catch (error) {
                alert(translations[lang].error + ": " + error.message);
            }
        });

        googleBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        fullName: user.displayName,
                        email: user.email,
                        role: 'buyer',
                        createdAt: new Date()
                    });
                }
                handleRedirect(user);
            } catch (error) {
                alert("Google Sign-in failed");
            }
        });

        forgotBtn.addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const lang = localStorage.getItem('kHubLang') || 'en';
            if (!email) {
                alert("Please enter email first.");
                return;
            }
            try {
                await sendPasswordResetEmail(auth, email);
                alert(translations[lang].resetSent);
            } catch (error) {
                alert("Error: " + error.message);
            }
        });

        async function handleRedirect(user) {
            const ADMIN_EMAIL = "clintzyarts@gmail.com";
            if (user.email === ADMIN_EMAIL) {
                window.location.href = "admin.html";
            } else {
                window.location.href = "user-dashboard.html";
            }
        }
    </script>
</body>
</html>
