<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Access Your Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #8B5CF6;
            --neon-blue: #3B82F6;
        }
        body { 
            background-color: #06080C; 
            color: white; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: var(--neon-purple);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }
        .btn-gradient {
            background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%);
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4);
        }
        .btn-gradient:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body class="p-6">

    <div class="w-full max-w-md">
        <div class="flex flex-col items-center mb-10 cursor-pointer" onclick="window.location.href='index.html'">
            <svg class="w-16 h-16 mb-4" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="10" fill="url(#k-grad)"/>
                <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                <defs><linearGradient id="k-grad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
            </svg>
            <h1 class="text-3xl font-black italic tracking-tighter">K-HUB</h1>
            <p class="text-gray-500 text-[10px] font-black uppercase tracking-[0.4em] mt-1">Kano Digital Marketplace</p>
        </div>

        <div class="glass-panel p-8 md:p-10 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-blue-500"></div>
            
            <div class="flex gap-6 mb-10">
                <button class="text-sm font-black uppercase tracking-widest border-b-2 border-purple-500 pb-2">Login</button>
                <button onclick="window.location.href='register.html'" class="text-sm font-black uppercase tracking-widest text-gray-500 hover:text-white transition pb-2">Register</button>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-500 tracking-widest mb-2 block">Account Email</label>
                    <input type="email" id="login-email" required placeholder="example@k-hub.ng" 
                           class="w-full input-field rounded-2xl px-5 py-4 outline-none text-sm font-medium">
                </div>

                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-[10px] font-black uppercase text-gray-500 tracking-widest block">Security Key</label>
                        <button type="button" id="forgot-password" class="text-[10px] font-black uppercase text-purple-400 hover:text-white transition">Forgot Key?</button>
                    </div>
                    <input type="password" id="login-password" required placeholder="••••••••••••" 
                           class="w-full input-field rounded-2xl px-5 py-4 outline-none text-sm font-medium">
                </div>

                <button type="submit" class="w-full btn-gradient py-4 rounded-2xl text-[11px] font-black uppercase tracking-[0.2em] transition">
                    Authorize Access
                </button>
            </form>

            <div class="mt-10">
                <div class="flex items-center gap-4 mb-8">
                    <div class="flex-1 h-[1px] bg-white/5"></div>
                    <span class="text-[9px] font-black text-gray-600 uppercase tracking-widest">Global Auth</span>
                    <div class="flex-1 h-[1px] bg-white/5"></div>
                </div>

                <button id="google-login" class="w-full flex items-center justify-center gap-3 bg-white/5 border border-white/10 py-4 rounded-2xl hover:bg-white/10 transition group">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5 group-hover:scale-110 transition" alt="Google">
                    <span class="text-[10px] font-black uppercase tracking-widest">Connect with Google</span>
                </button>
            </div>
        </div>

        <footer class="mt-10 text-center">
            <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-2">Trusted by 50,000+ Kano Residents</p>
            <div id="google_translate_element" class="inline-block scale-75 opacity-50 hover:opacity-100 transition"></div>
        </footer>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { 
            signInWithEmailAndPassword, 
            GoogleAuthProvider, 
            signInWithPopup, 
            sendPasswordResetEmail 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const loginForm = document.getElementById('login-form');
        const googleBtn = document.getElementById('google-login');
        const forgotBtn = document.getElementById('forgot-password');

        // 1. STANDARD EMAIL LOGIN
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                handleRedirect(userCredential.user);
            } catch (error) {
                alert("Auth Error: " + error.message);
            }
        });

        // 2. GOOGLE LOGIN FUNCTIONALITY
        googleBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Create user profile in Firestore if it doesn't exist
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        fullName: user.displayName,
                        email: user.email,
                        role: 'buyer', // default role
                        createdAt: new Date()
                    });
                }
                handleRedirect(user);
            } catch (error) {
                alert("Google Sign-in failed");
            }
        });

        // 3. FUNCTIONAL FORGOT PASSWORD
        forgotBtn.addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            if (!email) {
                alert("Please enter your email address first to reset your password.");
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                alert("Security reset email sent! Check your inbox to verify your identity.");
            } catch (error) {
                alert("Error: " + error.message);
            }
        });

        // Redirect Logic based on Admin/User status
        async function handleRedirect(user) {
            const ADMIN_EMAIL = "clintzyarts@gmail.com";
            if (user.email === ADMIN_EMAIL) {
                window.location.href = "admin.html";
            } else {
                window.location.href = "user-dashboard.html";
            }
        }
    </script>

    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ha,ig,yo,en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
