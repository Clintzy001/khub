<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Login & Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-input:focus { border-color: #8B5CF6; box-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-900/20 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-900/20 rounded-full blur-[120px]"></div>

    <div class="mb-8 flex flex-col items-center gap-2">
        <svg width="50" height="50" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="20" fill="url(#logoGrad)"/>
            <path d="M14 12V28M14 20L24 12M14 20L24 28" stroke="white" stroke-width="3" stroke-linecap="round"/>
            <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
        </svg>
        <h1 class="text-2xl font-bold tracking-widest">K-HUB</h1>
    </div>

    <div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-2xl relative z-10">
        <div class="flex gap-4 mb-8">
            <button class="text-xl font-bold border-b-2 border-purple-500 pb-1">Login</button>
            <button onclick="window.location.href='register.html'" class="text-xl font-bold text-gray-500 hover:text-gray-300 transition">Register</button>
        </div>

        <form class="space-y-6" id="login-form">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" id="login-email" required placeholder="name@email.com" 
                       class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none glow-input transition text-white">
            </div>

            <div>
                <div class="flex justify-between mb-2">
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Password</label>
                    <a href="#" class="text-xs text-purple-400 hover:underline">Forgot?</a>
                </div>
                <input type="password" id="login-password" required placeholder="••••••••" 
                       class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none glow-input transition text-white">
            </div>

            <button type="submit" class="neon-gradient w-full py-4 rounded-xl font-bold text-lg shadow-lg shadow-purple-500/30 hover:scale-[1.02] active:scale-95 transition">
                Sign In
            </button>
        </form>

        <div class="mt-8">
            <div class="relative flex py-3 items-center">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink mx-4 text-xs text-gray-500 uppercase">Or continue with</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <div class="flex gap-4 mt-4">
                <button class="flex-1 bg-white/5 border border-white/10 py-2 rounded-xl hover:bg-white/10 transition flex justify-center items-center">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                </button>
                <button class="flex-1 bg-white/5 border border-white/10 py-2 rounded-xl hover:bg-white/10 transition flex justify-center items-center">
                    <img src="https://www.svgrepo.com/show/448234/linkedin.svg" class="w-5 h-5" alt="LinkedIn">
                </button>
            </div>
        </div>
    </div>

    <footer class="mt-12 text-center text-xs text-gray-500">
        <p>Made for Kano Residents | © 2026 K-Hub</p>
        <div class="flex gap-4 justify-center mt-2">
            <a href="#" class="hover:text-white">Terms</a>
            <a href="#" class="hover:text-white">Privacy</a>
            <a href="#" class="hover:text-white">Help</a>
        </div>
    </footer>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const loginForm = document.getElementById('login-form');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                // 1. Sign in with Firebase Auth
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Fetch user role from Firestore to redirect correctly
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    
                    // Redirect based on role
                    if (userData.role === 'admin') {
                        window.location.href = "admin-dashboard.html";
                    } else {
                        window.location.href = "user-dashboard.html";
                    }
                } else {
                    // Fallback if role isn't found
                    window.location.href = "user-dashboard.html";
                }
            } catch (error) {
                console.error(error);
                alert("Login Failed: " + error.message);
            }
        });
    </script>
</body>
</html>
