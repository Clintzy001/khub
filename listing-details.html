<main class="max-w-7xl mx-auto px-4 md:px-6 py-8">
    <div id="loading-state" class="text-center py-20">
        <div class="animate-spin w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full mx-auto mb-4"></div>
        <p class="text-gray-400">Fetching K-Hub Listing...</p>
    </div>

    <div id="listing-content" class="hidden">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="glass-card rounded-[40px] overflow-hidden bg-white/5 relative aspect-video md:aspect-auto md:h-[500px]">
                    <img id="main-image" src="" alt="Listing Image" class="w-full h-full object-cover">
                    <div class="absolute top-6 left-6">
                        <span id="category-badge" class="px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest text-white shadow-xl"></span>
                    </div>
                </div>

                <div class="glass-card p-8 rounded-[32px]">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                        <div>
                            <h1 id="listing-title" class="text-3xl md:text-4xl font-extrabold tracking-tight"></h1>
                            <p id="listing-location" class="text-gray-400 flex items-center gap-2 mt-2">
                                <svg class="w-4 h-4 text-purple-500" fill="currentColor" viewBox="0 0 20 20"><path d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"></path></svg>
                                <span>Kano, Nigeria</span>
                            </p>
                        </div>
                        <div class="text-left md:text-right">
                            <p class="text-gray-500 text-xs uppercase font-bold tracking-widest mb-1">Price / Value</p>
                            <span id="listing-price" class="text-3xl font-black text-emerald-400"></span>
                        </div>
                    </div>

                    <div id="specs-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 pt-6 border-t border-white/10"></div>
                </div>

                <div class="glass-card p-8 rounded-[32px]">
                    <h3 class="text-xl font-bold mb-4">Description</h3>
                    <p id="listing-desc" class="text-gray-400 leading-relaxed whitespace-pre-line"></p>
                </div>
            </div>

            <aside class="space-y-6">
                <div class="glass-card p-8 rounded-3xl contact-card sticky top-24">
                    <div id="profile-link" class="flex items-center gap-4 mb-6 cursor-pointer group">
                        <div id="owner-avatar-container" class="relative">
                            <div id="owner-initial" class="w-12 h-12 rounded-full bg-purple-500 flex items-center justify-center font-bold text-white group-hover:scale-110 transition">?</div>
                            <img id="owner-img" src="" class="absolute inset-0 w-12 h-12 rounded-full object-cover hidden border-2 border-purple-500">
                        </div>
                        <div>
                            <p id="owner-name" class="font-bold group-hover:text-purple-400 transition">Loading...</p>
                            <p class="text-xs text-gray-500">View Public Profile →</p>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <a id="call-btn" href="#" class="block w-full py-4 neon-gradient text-center rounded-xl font-bold">Call Owner</a>
                        <a id="wa-btn" href="#" target="_blank" class="block w-full py-4 bg-white/5 border border-white/10 text-center rounded-xl font-bold">WhatsApp Message</a>
                    </div>

                    <button id="report-btn" class="w-full py-3 mt-4 text-xs font-bold text-gray-500 hover:text-red-400 transition flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        Report this Listing
                    </button>
                </div>
            </aside>
        </div>

        <section class="mt-20 border-t border-white/10 pt-12">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-bold">More for you</h3>
                <span id="related-category-text" class="text-purple-400 text-xs font-bold uppercase tracking-widest">Similar Items</span>
            </div>
            <div id="related-feed" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>
        </section>
    </div>
</main>

<div id="report-modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden flex items-center justify-center px-4">
    <div class="glass-card p-8 rounded-[32px] max-w-sm w-full border border-white/10">
        <h3 class="text-xl font-bold mb-2">Report Listing</h3>
        <p class="text-gray-400 text-sm mb-6">Why are you reporting this? Our team will review it.</p>
        <select id="report-reason" class="w-full bg-black border border-white/20 rounded-xl p-3 mb-6 text-sm text-white outline-none">
            <option value="fraud">Fraud / Scam</option>
            <option value="misleading">Misleading Information</option>
            <option value="offensive">Offensive Content</option>
            <option value="sold">Already Sold / Unavailable</option>
        </select>
        <div class="flex gap-3">
            <button onclick="document.getElementById('report-modal').classList.add('hidden')" class="flex-1 py-3 rounded-xl bg-white/5 font-bold text-sm">Cancel</button>
            <button id="submit-report" class="flex-1 py-3 rounded-xl bg-red-500 font-bold text-sm">Submit</button>
        </div>
    </div>
</div>

<script type="module">
    import { db, doc, getDoc, collection, query, where, limit, getDocs, addDoc, serverTimestamp } from './firebase-config.js';

    async function initListing() {
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');
        const type = urlParams.get('type');

        if (!itemId || !type) {
            window.location.href = 'index.html';
            return;
        }

        try {
            const snap = await getDoc(doc(db, type, itemId));

            if (snap.exists()) {
                const data = snap.data();
                
                // 1. DATA RENDERING
                document.getElementById('listing-title').innerText = data.name || data.title || "Untitled";
                document.getElementById('listing-desc').innerText = data.description || "No description provided.";
                document.getElementById('main-image').src = data.imageUrl || 'https://via.placeholder.com/800x600';
                
                const price = data.price || data.salary || data.fare || 0;
                document.getElementById('listing-price').innerText = `₦${Number(price).toLocaleString()}`;
                
                const badge = document.getElementById('category-badge');
                badge.innerText = type.replace('s', '');
                const colors = { jobs: 'bg-blue-500', rentals: 'bg-emerald-500', transports: 'bg-orange-500', products: 'bg-purple-500' };
                badge.className += ` ${colors[type] || 'bg-gray-500'}`;

                // 2. SPECS GRID
                const specsGrid = document.getElementById('specs-grid');
                let specs = [];
                if (type === 'jobs') specs = [{l: 'Type', v: data.jobType}, {l: 'Category', v: data.category}];
                if (type === 'transports') specs = [{l: 'Vehicle', v: data.vehicleType}, {l: 'Route', v: data.route}];
                if (type === 'products') specs = [{l: 'Condition', v: data.condition}, {l: 'Category', v: data.category}];

                specsGrid.innerHTML = specs.filter(s => s.v).map(s => `
                    <div class="bg-white/5 p-4 rounded-2xl">
                        <p class="text-[10px] uppercase text-gray-500 font-bold mb-1">${s.l}</p>
                        <p class="font-bold text-sm">${s.v}</p>
                    </div>
                `).join('') || `<p class="text-gray-600 text-xs">Standard listing details apply.</p>`;

                // 3. OWNER INFO
                if (data.userId) {
                    const userSnap = await getDoc(doc(db, "users", data.userId));
                    if (userSnap.exists()) {
                        const u = userSnap.data();
                        const name = u.fullName || u.displayName || "K-Hub User";
                        document.getElementById('owner-name').innerText = name;
                        document.getElementById('owner-initial').innerText = name.charAt(0);
                        if (u.photoURL) {
                            const img = document.getElementById('owner-img');
                            img.src = u.photoURL;
                            img.classList.remove('hidden');
                        }
                        document.getElementById('profile-link').onclick = () => window.location.href = `public-profile.html?id=${data.userId}`;
                        
                        if (u.phone) {
                            document.getElementById('call-btn').href = `tel:${u.phone}`;
                            const waPhone = u.phone.replace(/\D/g, '').replace(/^0/, '234');
                            document.getElementById('wa-btn').href = `https://wa.me/${waPhone}?text=Interest: ${data.name || data.title}`;
                        }
                    }
                }

                // 4. LOAD RELATED & SHOW CONTENT
                loadRelatedListings(type, itemId);
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('listing-content').classList.remove('hidden');

                // 5. REPORT LOGIC
                setupReportLogic(itemId, data.name || data.title);

            }
        } catch (e) {
            console.error(e);
            document.getElementById('loading-state').innerHTML = `<p class="text-red-400">Error loading data.</p>`;
        }
    }

    async function loadRelatedListings(category, currentId) {
        const relatedFeed = document.getElementById('related-feed');
        document.getElementById('related-category-text').innerText = `More in ${category}`;
        try {
            const q = query(collection(db, category), limit(4)); 
            const snap = await getDocs(q);
            let html = "";
            let count = 0;
            snap.forEach((doc) => {
                if (doc.id !== currentId && count < 3) {
                    const item = doc.data();
                    html += `
                        <div onclick="window.location.href='listing-details.html?id=${doc.id}&type=${category}'" class="glass-card p-4 rounded-3xl cursor-pointer hover:scale-[1.02] transition">
                            <img src="${item.imageUrl || 'https://via.placeholder.com/400x300'}" class="w-full h-40 object-cover rounded-2xl mb-3">
                            <h4 class="font-bold truncate">${item.title || item.name}</h4>
                            <p class="text-emerald-400 font-bold text-sm">₦${Number(item.price || item.salary || 0).toLocaleString()}</p>
                        </div>`;
                    count++;
                }
            });
            relatedFeed.innerHTML = html || `<p class="text-gray-500">No similar items found.</p>`;
        } catch (e) { console.error(e); }
    }

    function setupReportLogic(id, title) {
        const modal = document.getElementById('report-modal');
        document.getElementById('report-btn').onclick = () => modal.classList.remove('hidden');
        document.getElementById('submit-report').onclick = async () => {
            const reason = document.getElementById('report-reason').value;
            try {
                await addDoc(collection(db, "reports"), { listingId: id, title: title, reason: reason, timestamp: serverTimestamp() });
                alert("Report submitted. Thank you for keeping K-Hub safe.");
                modal.classList.add('hidden');
            } catch (e) { alert("Error sending report."); }
        };
    }

    initListing();
</script>
