<aside class="space-y-6">
    <div class="glass-card p-8 rounded-3xl contact-card sticky top-24">
        <div id="profile-link" class="flex items-center gap-4 mb-6 cursor-pointer group">
            <div id="owner-initial" class="w-12 h-12 rounded-full bg-purple-500 flex items-center justify-center font-bold group-hover:scale-110 transition">?</div>
            <div>
                <p id="owner-name" class="font-bold group-hover:text-purple-400 transition">Loading...</p>
                <p class="text-xs text-gray-500">View Public Profile →</p>
            </div>
        </div>
        
        <div class="space-y-3">
            <a id="call-btn" href="#" class="block w-full py-4 neon-gradient text-center rounded-xl font-bold hover:scale-[1.02] transition">Call Owner</a>
            <a id="wa-btn" href="#" target="_blank" class="block w-full py-4 bg-white/5 border border-white/10 text-center rounded-xl font-bold hover:bg-white/10 transition">WhatsApp Message</a>
        </div>
    </div>
</aside>

<script type="module">
    // ... existing imports ...

    async function initListing() {
        // ... existing logic for itemId/type ...

        try {
            const docRef = doc(db, type, itemId);
            const snap = await getDoc(docRef);

            if (snap.exists()) {
                const data = snap.data();
                
                // ... existing data rendering (images, title, specs) ...

                // UPDATED OWNER DATA FETCHING
                const userSnap = await getDoc(doc(db, "users", data.userId));
                if (userSnap.exists()) {
                    const u = userSnap.data();
                    const ownerNameDisplay = u.fullName || u.displayName || "K-Hub User";
                    
                    document.getElementById('owner-name').innerText = ownerNameDisplay;
                    document.getElementById('owner-initial').innerText = ownerNameDisplay.charAt(0);
                    
                    // Add click event to redirect to public profile
                    document.getElementById('profile-link').onclick = () => {
                        window.location.href = `public-profile.html?id=${data.userId}`;
                    };

                    // Setup contact buttons
                    if (u.phone) {
                        document.getElementById('call-btn').href = `tel:${u.phone}`;
                        // Formats number for international WhatsApp (removes leading 0, adds 234)
                        const waPhone = u.phone.startsWith('0') ? '234' + u.phone.substring(1) : u.phone;
                        document.getElementById('wa-btn').href = `https://wa.me/${waPhone}?text=Hi, I am interested in your listing: ${data.name || data.title}`;
                    }
                }

                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('listing-content').classList.remove('hidden');
            }
        } catch (e) {
            console.error(e);
            document.getElementById('loading-state').innerText = "Failed to load listing.";
        }
    }
    initListing();
</script>
