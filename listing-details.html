<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Listing Details</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #map { height: 250px; width: 100%; border-radius: 24px; z-index: 10; border: 1px solid rgba(139, 92, 246, 0.3); }
        
        .goog-te-gadget-simple { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; padding: 8px !important; border-radius: 12px !important; }
        .goog-te-gadget-simple span { color: #8B5CF6 !important; font-weight: bold !important; }
        body { top: 0px !important; }
        .star-rating { color: #fbbf24; cursor: pointer; font-size: 1.5rem; }
        
        /* Animations */
        .badge-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        
        .fav-active { color: #ef4444 !important; fill: #ef4444 !important; transform: scale(1.2); }
    </style>
</head>
<body class="overflow-x-hidden pb-10">

    <div id="report-modal" class="modal-overlay">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-md mx-4 relative">
            <h2 class="text-xl font-bold mb-4 text-red-500 uppercase tracking-tight">Report Listing</h2>
            <p class="text-xs text-gray-400 mb-6 font-medium">Help us keep K-Hub safe.</p>
            <select id="report-reason" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-4 outline-none focus:border-red-500">
                <option class="bg-[#0B0E14]" value="fraud">Fraud / Scam</option>
                <option class="bg-[#0B0E14]" value="offensive">Offensive Content</option>
                <option class="bg-[#0B0E14]" value="misleading">Misleading Info</option>
                <option class="bg-[#0B0E14]" value="other">Other</option>
            </select>
            <textarea id="report-details" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 mb-6 text-sm h-32 outline-none focus:border-red-500" placeholder="Provide more details..."></textarea>
            <div class="flex gap-3">
                <button onclick="document.getElementById('report-modal').style.display='none'" class="flex-1 py-4 bg-white/5 rounded-2xl font-bold text-xs uppercase">Cancel</button>
                <button id="confirm-report-btn" class="flex-1 py-4 bg-red-600 rounded-2xl font-bold text-xs uppercase">Submit</button>
            </div>
        </div>
    </div>

    <div id="call-verify-modal" class="modal-overlay">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-sm mx-4 text-center">
            <h2 class="text-xl font-bold mb-2">Call Check</h2>
            <p class="text-gray-400 text-sm mb-6">Did the seller pick up your call?</p>
            <div class="flex gap-3">
                <button id="call-no" class="flex-1 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold text-xs uppercase">No</button>
                <button id="call-yes" class="flex-1 py-4 neon-gradient rounded-2xl font-bold text-xs uppercase">Yes</button>
            </div>
        </div>
    </div>

    <header class="sticky top-0 z-50 bg-[#0B0E14]/80 backdrop-blur-md border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-8 h-8 neon-gradient rounded-lg flex items-center justify-center font-bold text-white">K</div>
                <span class="text-xl font-bold tracking-tight">K-Hub</span>
            </div>
            <div id="google_translate_element"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-8">
        <div id="loading-state" class="text-center py-20">
            <div class="animate-spin w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full mx-auto mb-4"></div>
        </div>

        <div id="listing-content" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-8">
                    <div class="glass-card rounded-[40px] overflow-hidden bg-white/5 relative aspect-video">
                        <img id="main-image" src="" alt="Listing" class="w-full h-full object-cover">
                        <div class="absolute top-6 left-6">
                            <span id="category-badge" class="px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-widest text-white shadow-xl"></span>
                        </div>
                        <button id="fav-btn" class="absolute top-6 right-6 p-4 bg-black/40 backdrop-blur-lg rounded-2xl border border-white/10 transition-all active:scale-90">
                            <svg id="fav-icon" class="w-6 h-6 text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
                            </svg>
                        </button>
                    </div>

                    <div class="glass-card p-8 rounded-[32px]">
                        <div class="flex flex-col md:flex-row justify-between gap-6 mb-6">
                            <div>
                                <h1 id="listing-title" class="text-3xl md:text-5xl font-black mb-4"></h1>
                                <p id="listing-location" class="text-gray-400 flex items-center gap-2 font-bold text-sm uppercase tracking-widest">
                                    <svg class="w-4 h-4 text-purple-500" fill="currentColor" viewBox="0 0 20 20"><path d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9z"></path></svg>
                                    <span id="location-text"></span>
                                </p>
                            </div>
                            <div class="bg-emerald-500/10 border border-emerald-500/20 px-6 py-4 rounded-3xl text-center">
                                <span id="listing-price" class="text-3xl font-black text-emerald-400"></span>
                            </div>
                        </div>
                        <p id="listing-desc" class="text-gray-300 leading-relaxed text-lg whitespace-pre-line border-t border-white/10 pt-6"></p>
                    </div>

                    <div class="glass-card p-8 rounded-[32px]">
                        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">User Reviews <span id="avg-rating-pill" class="text-sm bg-yellow-500/20 text-yellow-500 px-2 py-1 rounded-lg">★ 0.0</span></h2>
                        <div id="reviews-list" class="space-y-4"></div>
                        <div class="mt-8 p-4 bg-white/5 rounded-2xl border border-white/10">
                            <div id="star-input" class="flex gap-2 mb-4">
                                <span data-val="1" class="star-rating">☆</span><span data-val="2" class="star-rating">☆</span><span data-val="3" class="star-rating">☆</span><span data-val="4" class="star-rating">☆</span><span data-val="5" class="star-rating">☆</span>
                            </div>
                            <textarea id="review-text" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm focus:border-purple-500 outline-none mb-3" placeholder="Write your experience..."></textarea>
                            <button id="submit-review" class="px-6 py-2 neon-gradient rounded-xl font-bold text-sm">Post Review</button>
                        </div>
                    </div>
                </div>

                <aside class="space-y-6">
                    <div class="glass-card p-8 rounded-3xl border border-purple-500/20 text-center relative overflow-hidden">
                        <div id="owner-initial" class="w-20 h-20 rounded-full neon-gradient mx-auto flex items-center justify-center font-black text-3xl mb-4">?</div>
                        
                        <div class="flex items-center justify-center gap-2 mb-2">
                            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-gray-500"></div>
                            <span id="status-text" class="text-[10px] font-black uppercase tracking-widest text-gray-500 italic">Checking status...</span>
                        </div>

                        <h3 id="owner-name" class="font-black text-xl mb-2">...</h3>
                        <div id="seller-badges" class="flex flex-wrap justify-center gap-2 mb-6">
                            <span class="text-[9px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-1 rounded-md font-black uppercase tracking-tighter">Verified</span>
                        </div>
                        <div class="space-y-3 pt-4 border-t border-white/5">
                            <a id="call-btn" href="#" class="block w-full py-4 neon-gradient rounded-2xl font-black uppercase tracking-widest text-sm">Call Now</a>
                            <a id="wa-btn" href="#" target="_blank" class="block w-full py-4 bg-emerald-500/10 border border-emerald-500/30 text-emerald-500 rounded-2xl font-black uppercase tracking-widest text-sm">WhatsApp</a>
                        </div>
                    </div>
                    <div class="glass-card p-4 rounded-[40px] overflow-hidden"><div id="map"></div></div>
                </aside>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script type="module">
        import { db, doc, getDoc, collection, addDoc, query, where, getDocs, serverTimestamp, limit } from './firebase-config.js';

        let map, selectedRating = 0;
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');
        const type = urlParams.get('type');

        async function initListing() {
            if (!itemId || !type) { window.location.href = 'index.html'; return; }
            try {
                const snap = await getDoc(doc(db, type, itemId));
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('listing-title').innerText = data.name || data.title;
                    document.getElementById('listing-desc').innerText = data.description || "No description.";
                    document.getElementById('main-image').src = data.imageUrl || 'https://via.placeholder.com/800';
                    document.getElementById('listing-price').innerText = `₦${Number(data.price || data.salary || 0).toLocaleString()}`;
                    document.getElementById('location-text').innerText = data.location || data.area || "Kano";
                    document.getElementById('owner-name').innerText = data.name || "User";
                    document.getElementById('owner-initial').innerText = (data.name || "K").charAt(0).toUpperCase();

                    updateAvailability(data.lastSeen);
                    checkFavoriteStatus();

                    const colors = { products: 'bg-purple-600', drivers: 'bg-orange-500', rentals: 'bg-emerald-600', jobs: 'bg-blue-600' };
                    const badge = document.getElementById('category-badge');
                    badge.innerText = type.replace('s', '').toUpperCase();
                    badge.className += ` ${colors[type] || 'bg-gray-600'}`;

                    if (data.phone) {
                        const phone = data.phone.replace(/\D/g, '');
                        document.getElementById('call-btn').href = `tel:${phone}`;
                        document.getElementById('wa-btn').href = `https://wa.me/${phone}?text=Interested in ${data.name || data.title}`;
                    }

                    loadMap(data.lat, data.lng, data.name || data.title);
                    loadReviews();
                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('listing-content').classList.remove('hidden');

                    // Favorite Button Click
                    document.getElementById('fav-btn').onclick = () => toggleFavorite({
                        id: itemId,
                        type: type,
                        name: data.name || data.title,
                        price: data.price || data.salary || 0,
                        image: data.imageUrl
                    });
                }
            } catch (e) { console.error(e); }
        }

        // Favorites Logic
        function toggleFavorite(item) {
            let favs = JSON.parse(localStorage.getItem('khub_favorites') || '[]');
            const index = favs.findIndex(f => f.id === item.id);
            const icon = document.getElementById('fav-icon');

            if (index > -1) {
                favs.splice(index, 1);
                icon.classList.remove('fav-active');
            } else {
                favs.push(item);
                icon.classList.add('fav-active');
            }
            localStorage.setItem('khub_favorites', JSON.stringify(favs));
        }

        function checkFavoriteStatus() {
            const favs = JSON.parse(localStorage.getItem('khub_favorites') || '[]');
            if (favs.some(f => f.id === itemId)) {
                document.getElementById('fav-icon').classList.add('fav-active');
            }
        }

        function updateAvailability(lastSeen) {
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            if (!lastSeen) { txt.innerText = "Offline"; return; }
            const diffMinutes = Math.floor((new Date() - lastSeen.toDate()) / 60000);
            if (diffMinutes < 5) {
                dot.className = "w-2.5 h-2.5 rounded-full bg-emerald-500 status-pulse";
                txt.innerText = "Online";
                txt.classList.replace('text-gray-500', 'text-emerald-400');
            } else {
                txt.innerText = diffMinutes < 60 ? `${diffMinutes}m ago` : "Offline";
            }
        }

        // Standard logic for reviews/map
        document.querySelectorAll('.star-rating').forEach(star => {
            star.onclick = (e) => {
                selectedRating = parseInt(e.target.dataset.val);
                document.querySelectorAll('.star-rating').forEach(s => s.innerText = parseInt(s.dataset.val) <= selectedRating ? '★' : '☆');
            };
        });

        document.getElementById('submit-review').onclick = async () => {
            if (selectedRating === 0) return alert("Select stars!");
            await addDoc(collection(db, "reviews"), { itemId, rating: selectedRating, comment: document.getElementById('review-text').value, timestamp: serverTimestamp() });
            location.reload();
        };

        async function loadReviews() {
            const snap = await getDocs(query(collection(db, "reviews"), where("itemId", "==", itemId)));
            let html = "";
            snap.forEach(doc => {
                const r = doc.data();
                html += `<div class="p-4 bg-white/5 rounded-xl border border-white/5"><div class="text-yellow-500 text-sm mb-1">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div><p class="text-sm text-gray-300">${r.comment}</p></div>`;
            });
            document.getElementById('reviews-list').innerHTML = html || "<p class='text-xs italic text-gray-500'>No reviews yet.</p>";
        }

        function loadMap(lat, lng, title) {
            map = L.map('map').setView([lat || 12.0022, lng || 8.5920], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.marker([lat || 12.0022, lng || 8.5920]).addTo(map).bindPopup(title);
        }

        initListing();
    </script>
</body>
</html>
