<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Driver Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-border { border: 1px solid #8B5CF6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        .lang-dropdown { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 6px 10px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; outline: none; cursor: pointer; }
    </style>
</head>
<body class="pb-20">

    <nav class="p-6 flex justify-between items-center border-b border-white/5 max-w-6xl mx-auto">
        <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
            <svg class="w-10 h-10 mb-1" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="10" fill="url(#k-grad-drive)"/>
                <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                <defs><linearGradient id="k-grad-drive" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
            </svg>
            <h1 class="text-[8px] font-black italic tracking-tighter leading-none">K-HUB</h1>
        </div>

        <div class="flex items-center gap-4">
            <select id="lang-select-desktop" class="lang-dropdown lang-select-dropdown" onchange="applyLanguage(this.value)">
                <option value="en">English</option>
                <option value="ha">Hausa</option>
                <option value="ig">Igbo</option>
                <option value="yo">Yoruba</option>
            </select>
            <button onclick="window.location.href='index.html'" class="text-[10px] font-black uppercase text-gray-400 hover:text-white transition tracking-widest lang-home">Home</button>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-6 py-12">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter bg-gradient-to-r from-purple-400 to-blue-500 bg-clip-text text-transparent lang-portal-title">Driver Verification Portal</h1>
            <p class="text-gray-400 mt-2 text-sm font-bold lang-portal-desc">Get verified to appear in the K-Hub Transport directory.</p>
        </div>

        <form id="driver-form" class="glass-card p-8 rounded-[40px] space-y-6 border-purple-500/10">
            <div>
                <label class="block text-[10px] font-black uppercase text-gray-500 mb-2 tracking-widest lang-label-name">Full Name (As on ID)</label>
                <input type="text" id="driver-name" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 focus:outline-none focus:border-purple-500 transition font-bold">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-2 tracking-widest lang-label-vehicle">Vehicle Type</label>
                    <select id="vehicle-type" class="w-full bg-[#0B0E14] border border-white/10 rounded-2xl p-4 focus:outline-none focus:border-purple-500 transition font-bold text-sm">
                        <option value="car">Car (Bolt/Uber Style)</option>
                        <option value="keke">Keke Napep</option>
                        <option value="bike">Motorcycle (Okada)</option>
                        <option value="truck">Delivery Truck</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-2 tracking-widest lang-label-phone">Phone Number</label>
                    <input type="tel" id="driver-phone" required placeholder="080..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 focus:outline-none focus:border-purple-500 transition font-bold">
                </div>
            </div>

            <div id="location-box" class="p-6 rounded-[32px] bg-purple-500/5 border border-purple-500/20 text-center">
                <p id="location-status" class="text-xs font-bold text-purple-300 leading-relaxed lang-loc-desc">We need your location to show you to nearby customers.</p>
                <button type="button" id="get-location" class="mt-3 text-[10px] font-black uppercase underline text-white tracking-widest lang-loc-btn">Enable Live Location</button>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-5 bg-gradient-to-r from-purple-600 to-blue-600 rounded-2xl font-black italic uppercase tracking-tighter shadow-xl shadow-purple-500/20 hover:scale-[1.02] transition lang-submit">Submit for Verification</button>
        </form>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- TRANSLATION LOGIC ---
        const translations = {
            en: { home: "Home", portalTitle: "Driver Verification Portal", portalDesc: "Get verified to appear in the K-Hub Transport directory.", labelName: "Full Name (As on ID)", labelVehicle: "Vehicle Type", labelPhone: "Phone Number", locDesc: "We need your location to show you to nearby customers.", locBtn: "Enable Live Location", submit: "Submit for Verification", success: "Application Submitted!", locSuccess: "📍 Location Secured!" },
            ha: { home: "Gida", portalTitle: "Sashin Tabbatar da Direba", portalDesc: "Yi rijista don bayyana a cikin kundin sufuri na K-Hub.", labelName: "Cikakken Suna (Kamar yadda yake a ID)", labelVehicle: "Irin Abun Chawa", labelPhone: "Lambar Waya", locDesc: "Muna buƙatar wurin da kake don nuna ka ga abokan ciniki na kusa.", locBtn: "Bada Izinin Wuri", submit: "Aika Don Dubawa", success: "An aika bayanan ku!", locSuccess: "📍 An Gano Inda Kake!" },
            ig: { home: "Ụlọ", portalTitle: "Ebe Nkwenye Ndị Na-anya Ụgbọala", portalDesc: "Debanye aha ka ị pụta na ndekọ njem K-Hub.", labelName: "Aha zuru ezu (Dịka ọ dị na ID)", labelVehicle: "Ụdị Ụgbọala", labelPhone: "Nọmba Ekwenti", locDesc: "Anyị chọrọ ebe ị nọ iji gosi gị ndị ahịa nọ gị nso.", locBtn: "Kwado Ebe I Nọ", submit: "Nyefee maka nkwenye", success: "E nyefere akwụkwọ anamachọihe gị!", locSuccess: "📍 Enwetala ebe ị nọ!" },
            yo: { home: "Ilé", portalTitle: "Ibùdó Ìfẹsẹ̀múlẹ̀ Olùwakọ̀", portalDesc: "Forukọsilẹ lati han ninu iwe itọsọna gbigbe K-Hub.", labelName: "Orukọ Kikun (Gẹgẹ bi o ti wa lori ID)", labelVehicle: "Irú Ọkọ̀", labelPhone: "Nọmba tẹlifóònù", locDesc: "A nilo ipo rẹ lati fi ọ han si awọn onibara nitosi.", locBtn: "Gba Ipo Rẹ Láàyè", submit: "Fi orukọ silẹ", success: "A ti gba ohun elo rẹ!", locSuccess: "📍 A ti rí ipo rẹ!" }
        };

        window.applyLanguage = function(lang) {
            const l = translations[lang];
            document.querySelector('.lang-home').innerText = l.home;
            document.querySelector('.lang-portal-title').innerText = l.portalTitle;
            document.querySelector('.lang-portal-desc').innerText = l.portalDesc;
            document.querySelector('.lang-label-name').innerText = l.labelName;
            document.querySelector('.lang-label-vehicle').innerText = l.labelVehicle;
            document.querySelector('.lang-label-phone').innerText = l.labelPhone;
            document.querySelector('.lang-loc-desc').innerText = l.locDesc;
            document.querySelector('.lang-loc-btn').innerText = l.locBtn;
            document.querySelector('.lang-submit').innerText = l.submit;
            
            localStorage.setItem('kHubLang', lang);
            document.getElementById('lang-select-desktop').value = lang;
        };

        // Initialize Language on Load
        const savedLang = localStorage.getItem('kHubLang') || 'en';
        applyLanguage(savedLang);

        // --- CORE LOGIC ---
        let driverCoords = { lat: 12.0022, lng: 8.5920 }; 

        document.getElementById('get-location').onclick = () => {
            const lang = localStorage.getItem('kHubLang') || 'en';
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    driverCoords.lat = position.coords.latitude;
                    driverCoords.lng = position.coords.longitude;
                    document.getElementById('location-status').innerText = translations[lang].locSuccess;
                    document.getElementById('location-box').classList.add('neon-border');
                }, () => {
                    alert("Please enable location to register as a driver.");
                });
            }
        };

        document.getElementById('driver-form').onsubmit = async (e) => {
            e.preventDefault();
            const lang = localStorage.getItem('kHubLang') || 'en';
            const btn = document.getElementById('submit-btn');
            btn.innerText = "...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "drivers"), {
                    name: document.getElementById('driver-name').value,
                    vehicle: document.getElementById('vehicle-type').value,
                    phone: document.getElementById('driver-phone').value,
                    lat: driverCoords.lat,
                    lng: driverCoords.lng,
                    isVerified: false,
                    createdAt: serverTimestamp()
                });
                alert(translations[lang].success);
                window.location.href = 'index.html';
            } catch (error) {
                console.error(error);
                alert("Error submitting form.");
                btn.innerText = translations[lang].submit;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
