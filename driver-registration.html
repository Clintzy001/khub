<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Driver Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-border { border: 1px solid #8B5CF6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body>
    <div class="max-w-2xl mx-auto px-6 py-12">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-blue-500 bg-clip-text text-transparent">Driver Verification Portal</h1>
            <p class="text-gray-400 mt-2">Get verified to appear in the K-Hub Transport directory.</p>
        </div>

        <form id="driver-form" class="glass-card p-8 rounded-[32px] space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Full Name (As on ID)</label>
                <input type="text" id="driver-name" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:outline-none focus:border-purple-500 transition">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Vehicle Type</label>
                    <select id="vehicle-type" class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:outline-none focus:border-purple-500 transition">
                        <option value="car">Car (Bolt/Uber Style)</option>
                        <option value="keke">Keke Napep</option>
                        <option value="bike">Motorcycle (Okada)</option>
                        <option value="truck">Delivery Truck</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Phone Number</label>
                    <input type="tel" id="driver-phone" required class="w-full bg-white/5 border border-white/10 rounded-xl p-4 focus:outline-none focus:border-purple-500 transition">
                </div>
            </div>

            <div id="location-box" class="p-4 rounded-2xl bg-purple-500/10 border border-purple-500/20 text-center">
                <p id="location-status" class="text-sm text-purple-300">We need your location to show you to nearby customers.</p>
                <button type="button" id="get-location" class="mt-3 text-xs font-bold underline text-white">Enable Live Location</button>
            </div>

            <button type="submit" class="w-full py-4 bg-gradient-to-r from-purple-600 to-blue-600 rounded-xl font-bold shadow-lg hover:scale-[1.02] transition">Submit for Verification</button>
        </form>
    </div>

    <script type="module">
        import { db, collection, addDoc, serverTimestamp } from './firebase-config.js';

        let driverCoords = { lat: 12.0022, lng: 8.5920 }; // Default Kano

        // 1. Capture Geolocation
        document.getElementById('get-location').onclick = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    driverCoords.lat = position.coords.latitude;
                    driverCoords.lng = position.coords.longitude;
                    document.getElementById('location-status').innerText = "📍 Location Secured!";
                    document.getElementById('location-box').classList.add('neon-border');
                }, () => {
                    alert("Please enable location to register as a driver.");
                });
            }
        };

        // 2. Submit to Firebase
        document.getElementById('driver-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "drivers"), {
                    name: document.getElementById('driver-name').value,
                    vehicle: document.getElementById('vehicle-type').value,
                    phone: document.getElementById('driver-phone').value,
                    lat: driverCoords.lat,
                    lng: driverCoords.lng,
                    isVerified: false, // Admin must manually change this to true
                    createdAt: serverTimestamp()
                });
                alert("Application Submitted! Our team will contact you for ID verification.");
                window.location.href = 'index.html';
            } catch (error) {
                console.error(error);
                alert("Error submitting form.");
                btn.innerText = "Submit for Verification";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
