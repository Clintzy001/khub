<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard | K-Hub Kano</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); margin: 0; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        
        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #mobile-menu.active { transform: translateX(0); }
        
        .lang-dropdown { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 6px 10px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; outline: none; cursor: pointer; }
        .lang-dropdown option { background: #06080C; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="mobile-menu" class="fixed inset-0 z-[100] bg-[#06080C]/98 backdrop-blur-2xl p-8 flex flex-col md:hidden">
        <div class="flex justify-between items-center mb-12">
            <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
                <svg class="w-10 h-10 mb-1" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#k-grad-shop-mob)"/>
                    <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="k-grad-shop-mob" x1="0" y1="0" x2="40" y2="40">
                            <stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1 class="text-[8px] font-black italic tracking-tighter leading-none">K-HUB</h1>
            </div>
            <button onclick="toggleMenu()" class="text-white p-2 glass-panel">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav class="flex flex-col gap-6 text-2xl font-bold uppercase italic tracking-tighter">
            <a href="index.html" class="text-gray-400 pl-4 lang-home">Home</a>
            <a href="#" class="text-white border-l-4 border-purple-500 pl-4 lang-dash">Driver Profile</a>
            <a href="transport.html" class="text-gray-400 pl-4 lang-transport">Transport</a>
            <hr class="border-white/10 my-2">
            <button id="mobile-logout-btn" class="text-red-500 pl-4 text-left lang-signout">Sign Out</button>
        </nav>
    </div>

    <div class="flex min-h-screen max-w-7xl mx-auto gap-8">
        <aside class="w-64 hidden md:block">
            <div class="flex flex-col items-center cursor-pointer mb-12" onclick="window.location.href='index.html'">
                <svg class="w-12 h-12 mb-1" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#k-grad-shop)"/>
                    <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="k-grad-shop" x1="0" y1="0" x2="40" y2="40">
                            <stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1 class="text-[10px] font-black italic tracking-tighter leading-none">K-HUB</h1>
            </div>
            
            <nav class="space-y-2">
                <a href="#" class="block p-4 rounded-2xl bg-purple-500/10 text-purple-400 font-black uppercase text-xs tracking-widest lang-dash">Driver Profile</a>
                <a href="index.html" class="block p-4 rounded-2xl text-gray-500 hover:bg-white/5 font-black uppercase text-xs tracking-widest lang-home">Back to Home</a>
                <select id="lang-select-desktop" class="lang-dropdown w-full mt-4 lang-select-sync">
                    <option value="en">English</option>
                    <option value="ha">Hausa</option>
                    <option value="ig">Igbo</option>
                    <option value="yo">Yoruba</option>
                </select>
            </nav>
        </aside>

        <main class="flex-1">
            <header class="flex justify-between items-center mb-10 md:mb-12">
                <h1 class="text-2xl font-black italic tracking-tighter uppercase">
                    <span class="lang-driver">DRIVER</span> <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400 lang-dash-title">DASHBOARD</span>
                </h1>
                
                <div class="flex items-center gap-3">
                    <select id="lang-select-mobile" class="lang-dropdown md:hidden lang-select-sync">
                        <option value="en">English</option>
                        <option value="ha">Hausa</option>
                        <option value="ig">Igbo</option>
                        <option value="yo">Yoruba</option>
                    </select>
                    <button onclick="toggleMenu()" class="md:hidden p-3 glass-panel border-white/10">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>
                </div>
            </header>

            <div class="max-w-3xl">
                <div id="loading-profile" class="text-center py-20">
                    <p class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 animate-pulse lang-sync">Synchronizing driver data...</p>
                </div>

                <form id="profile-form" class="hidden space-y-8">
                    <div id="status-banner" class="p-5 rounded-[24px] flex items-center justify-between border transition-all duration-500">
                        <span id="status-text" class="text-[10px] font-black uppercase tracking-widest"></span>
                        <div id="status-dot" class="w-3 h-3 rounded-full"></div>
                    </div>

                    <div class="glass-card p-8 rounded-[32px] space-y-6 ring-1 ring-white/5">
                        <h3 class="text-sm font-black uppercase tracking-widest border-b border-white/5 pb-4 lang-prof-details">Professional Details</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase mb-3 lang-exp-label">Driving Experience (Years)</label>
                                <input type="number" id="exp-years" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:ring-2 ring-purple-500/50 transition font-bold text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-gray-500 uppercase mb-3 lang-car-label">Vehicle Model/Year</label>
                                <input type="text" id="car-type" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:ring-2 ring-purple-500/50 transition font-bold text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-gray-500 uppercase mb-3 lang-area-label">Service Area (Neighborhood in Kano)</label>
                            <input type="text" id="driver-area" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:ring-2 ring-purple-500/50 transition font-bold text-sm">
                        </div>
                    </div>

                    <div class="glass-card p-8 rounded-[32px] space-y-6 ring-1 ring-white/5">
                        <h3 class="text-sm font-black uppercase tracking-widest border-b border-white/5 pb-4 lang-contact-details">Contact Information</h3>
                        <div>
                            <label class="block text-[10px] font-black text-gray-500 uppercase mb-3 lang-phone-label">WhatsApp / Phone Number</label>
                            <input type="tel" id="driver-phone" required class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:ring-2 ring-purple-500/50 transition font-bold text-sm">
                        </div>
                    </div>

                    <button type="submit" id="save-btn" class="w-full py-5 neon-gradient rounded-[24px] font-black uppercase text-xs tracking-[0.2em] shadow-xl shadow-purple-500/20 hover:scale-[1.02] transition-all active:scale-95 lang-save">
                        Save Profile Changes
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { db, doc, getDoc, updateDoc, onSnapshot, auth, signOut } from './firebase-config.js';
        
        window.toggleMenu = () => document.getElementById('mobile-menu').classList.toggle('active');

        const translations = {
            en: { home: "Home", dash: "Driver Profile", transport: "Transport", driver: "DRIVER", dashTitle: "DASHBOARD", sync: "Synchronizing driver data...", profDetails: "Professional Details", expLabel: "Driving Experience (Years)", carLabel: "Vehicle Model/Year", areaLabel: "Service Area (Kano)", contactDetails: "Contact Information", phoneLabel: "WhatsApp / Phone Number", save: "Save Profile Changes", signout: "Sign Out", verified: "Verified Driver ✅", pending: "Pending Verification ⏳", updated: "Profile Updated!", error: "Update failed. Please try again." },
            ha: { home: "Gida", dash: "Bayanin Direba", transport: "Sufuri", driver: "SHAFIN", dashTitle: "DIREBA", sync: "Ana duba bayanan direba...", profDetails: "Bayanin Aiki", expLabel: "Shekarun Tuƙi", carLabel: "Samfurin Mota/Shekara", areaLabel: "Wuraren Aiki (Kano)", contactDetails: "Bayanin Tuntuba", phoneLabel: "Lambar WhatsApp/Wayar", save: "Ajiye Canje-canje", signout: "Fita", verified: "Ingantaccen Direba ✅", pending: "Jiran Tabbatarwa ⏳", updated: "An sabunta bayani!", error: "An samu matsala." },
            ig: { home: "Ụlọ", dash: "Profaịlụ Ọkwọ Ụgbọ", transport: "Ụgbọ", driver: "DASHBOARD", dashTitle: "ỌKWỌ ỤGBỌ", sync: "Na-achọ data ọkwọ ụgbọ...", profDetails: "Nkọwa Ọrụ", expLabel: "Ahụmahụ Ịkwọ Ụgbọ", carLabel: "Ụdị Ụgbọ/Afọ", areaLabel: "Ebe Ọrụ (Kano)", contactDetails: "Ozi Ndiውata", phoneLabel: "WhatsApp / Nọmba ekwentị", save: "Chekwaa Mgbanwe", signout: "Pụọ", verified: "Ọkwọ Ụgbọ Akwadoro ✅", pending: "Na-eche Nkwenye ⏳", updated: "Emelitere Profaịlụ!", error: "Njehie mere." },
            yo: { home: "Ilé", dash: "Ìròyìn Awakọ̀", transport: "Ọkọ̀", driver: "DASHBOARD", dashTitle: "AWAKỌ̀", sync: "À ń ṣàyẹ̀wò dání awakọ̀...", profDetails: "Ìròyìn Iṣẹ́", expLabel: "Ìrírí Awakọ̀ (Ọdún)", carLabel: "Irú Ọkọ̀/Ọdún", areaLabel: "Ebe Iṣẹ́ (Kano)", contactDetails: "Ìròyìn Olubasọrọ", phoneLabel: "WhatsApp / Nọmba foonu", save: "Fi Ìyípadà Pamọ́", signout: "Jáde", verified: "Awakọ̀ Tí A Ti fọwọ́sí ✅", pending: "Ìfọwọ́sísí Ń Bọ̀ ⏳", updated: "A ti ṣe àtúnṣe!", error: "Ìṣòro kan ṣẹlẹ̀." }
        };

        function applyLanguage(lang) {
            const l = translations[lang] || translations.en;
            document.querySelectorAll('.lang-home').forEach(el => el.innerText = l.home);
            document.querySelectorAll('.lang-dash').forEach(el => el.innerText = l.dash);
            document.querySelectorAll('.lang-transport').forEach(el => el.innerText = l.transport);
            document.querySelector('.lang-driver').innerText = l.driver;
            document.querySelector('.lang-dash-title').innerText = l.dashTitle;
            document.querySelector('.lang-sync').innerText = l.sync;
            document.querySelector('.lang-prof-details').innerText = l.profDetails;
            document.querySelector('.lang-exp-label').innerText = l.expLabel;
            document.querySelector('.lang-car-label').innerText = l.carLabel;
            document.querySelector('.lang-area-label').innerText = l.areaLabel;
            document.querySelector('.lang-contact-details').innerText = l.contactDetails;
            document.querySelector('.lang-phone-label').innerText = l.phoneLabel;
            document.querySelector('.lang-save').innerText = l.save;
            document.querySelector('.lang-signout').innerText = l.signout;
            
            // Save selection to storage
            localStorage.setItem('kHubLang', lang);
            
            // Sync dropdowns
            document.querySelectorAll('.lang-select-sync').forEach(select => {
                select.value = lang;
            });
        }

        // Handle language selection
        document.querySelectorAll('.lang-select-sync').forEach(select => {
            select.addEventListener('change', (e) => applyLanguage(e.target.value));
        });

        auth.onAuthStateChanged(user => {
            if (!user) { window.location.href = 'k-hub-login.html'; return; }
            loadDriverData(user.uid);
        });

        async function loadDriverData(uid) {
            const docRef = doc(db, "drivers", uid);
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    const lang = localStorage.getItem('kHubLang') || 'en';
                    
                    document.getElementById('exp-years').value = data.experience || "";
                    document.getElementById('car-type').value = data.vehicle || "";
                    document.getElementById('driver-area').value = data.area || "";
                    document.getElementById('driver-phone').value = data.phone || "";
                    
                    const banner = document.getElementById('status-banner');
                    const statusText = document.getElementById('status-text');
                    const statusDot = document.getElementById('status-dot');
                    
                    if (data.isVerified) {
                        statusText.innerText = translations[lang].verified;
                        banner.className = "p-5 rounded-[24px] flex items-center justify-between border border-emerald-500/30 bg-emerald-500/5 text-emerald-400 shadow-lg shadow-emerald-500/5";
                        statusDot.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_15px_#10b981]";
                    } else {
                        statusText.innerText = translations[lang].pending;
                        banner.className = "p-5 rounded-[24px] flex items-center justify-between border border-orange-500/30 bg-orange-500/5 text-orange-400";
                        statusDot.className = "w-3 h-3 rounded-full bg-orange-500 animate-pulse";
                    }
                    
                    document.getElementById('loading-profile').classList.add('hidden');
                    document.getElementById('profile-form').classList.remove('hidden');
                }
            });
        }

        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const lang = localStorage.getItem('kHubLang') || 'en';
            const btn = document.getElementById('save-btn');
            
            // Validation
            const phone = document.getElementById('driver-phone').value.trim();
            if(phone.length < 10) {
                alert("Please enter a valid phone number.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "...";
            
            try {
                await updateDoc(doc(db, "drivers", auth.currentUser.uid), {
                    experience: document.getElementById('exp-years').value,
                    vehicle: document.getElementById('car-type').value,
                    area: document.getElementById('driver-area').value,
                    phone: phone,
                    lastUpdated: new Date()
                });
                alert(translations[lang].updated);
            } catch (err) { 
                console.error(err);
                alert(translations[lang].error); 
            } finally { 
                btn.disabled = false;
                btn.innerText = translations[lang].save; 
            }
        };

        document.getElementById('mobile-logout-btn').onclick = () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        };

        // Initialize from storage on load
        window.addEventListener('DOMContentLoaded', () => {
            applyLanguage(localStorage.getItem('kHubLang') || 'en');
        });
    </script>
</body>
</html>
