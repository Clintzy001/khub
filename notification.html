<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .notif-item { transition: all 0.2s ease; border-left: 4px solid transparent; }
        .notif-item:hover { background: rgba(255, 255, 255, 0.08); transform: translateX(4px); }
        .unread-border { border-left-color: #3B82F6; background: rgba(59, 130, 246, 0.05); }
        .lang-dropdown { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 6px 10px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; outline: none; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6 flex justify-between items-center border-b border-white/5 max-w-6xl mx-auto sticky top-0 bg-[#06080C]/80 backdrop-blur-xl z-50">
        <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='user-dashboard.html'">
            <svg class="w-8 h-8 mb-1" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="10" fill="url(#k-grad-notif)"/>
                <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                <defs><linearGradient id="k-grad-notif" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
            </svg>
            <h1 class="text-[8px] font-black italic tracking-tighter leading-none">K-HUB</h1>
        </div>

        <div class="flex items-center gap-4">
            <select id="lang-select-desktop" class="lang-dropdown">
                <option value="en">English</option>
                <option value="ha">Hausa</option>
                <option value="ig">Igbo</option>
                <option value="yo">Yoruba</option>
            </select>
            <button id="mark-all-read" class="text-[10px] font-black uppercase text-purple-400 hover:text-white transition tracking-widest lang-mark-read">Mark all as read</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6 mt-4">
        <div class="mb-10">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter lang-activity">Activity</h1>
            <p id="notif-count" class="text-gray-500 text-[10px] font-bold uppercase tracking-widest mt-2 italic">0 New alerts</p>
        </div>

        <div id="notifications-list" class="space-y-4">
            <div class="flex justify-center py-20">
                <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-purple-500"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, getDocs, doc, updateDoc, orderBy, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const translations = {
            en: { activity: "Activity", markRead: "Mark all as read", empty: "All caught up! No new notifications.", alerts: "New alerts", dashboard: "Dashboard" },
            ha: { activity: "Sanarwa", markRead: "Goge duka", empty: "Babu sabuwar sanarwa a yanzu.", alerts: "Sabbin sanarwa", dashboard: "Sashin Kulawa" },
            ig: { activity: "Ihe Omume", markRead: "Gụọ ha niile", empty: "Ọ nweghị ozi ọhụrụ.", alerts: "Ozi ọhụrụ", dashboard: "Dashboard" },
            yo: { activity: "Ìṣe", markRead: "Ka gbogbo rẹ̀", empty: "Kò sí ìfilọ̀ tuntun kankan.", alerts: "Ìfilọ̀ tuntun", dashboard: "Dashboard" }
        };

        function applyLanguage(lang) {
            const l = translations[lang];
            document.querySelector('.lang-activity').innerText = l.activity;
            document.querySelector('.lang-mark-read').innerText = l.markRead;
            localStorage.setItem('kHubLang', lang);
            document.getElementById('lang-select-desktop').value = lang;
        }

        document.getElementById('lang-select-desktop').addEventListener('change', (e) => {
            applyLanguage(e.target.value);
            location.reload(); // Reload to refresh the unread text count
        });

        onAuthStateChanged(auth, async (user) => {
            applyLanguage(localStorage.getItem('kHubLang') || 'en');
            if (user) {
                loadNotifications(user.uid);
            } else {
                window.location.href = "k-hub-login.html";
            }
        });

        window.removeNotif = async (id) => {
            try {
                await deleteDoc(doc(db, "notifications", id));
                location.reload();
            } catch (e) { console.error("Permission denied or error:", e); }
        };

        async function loadNotifications(uid) {
            const container = document.getElementById('notifications-list');
            const lang = localStorage.getItem('kHubLang') || 'en';
            
            const q = query(
                collection(db, "notifications"), 
                where("recipientId", "==", uid),
                orderBy("createdAt", "desc"),
                limit(30)
            );

            try {
                const snap = await getDocs(q);
                container.innerHTML = "";
                
                if (snap.empty) {
                    container.innerHTML = `
                        <div class="glass-card p-12 text-center rounded-[40px] border-white/5">
                            <span class="text-4xl mb-4 block">☕</span>
                            <p class="text-gray-500 font-bold italic text-sm">${translations[lang].empty}</p>
                        </div>`;
                    return;
                }

                let unreadCount = 0;
                snap.forEach(item => {
                    const data = item.data();
                    if (!data.read) unreadCount++;

                    const time = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "Now";
                    const { icon, color } = getMetadata(data.type);
                    
                    container.innerHTML += `
                        <div class="glass-card p-5 rounded-[28px] flex items-center gap-4 notif-item ${!data.read ? 'unread-border' : 'opacity-60'}">
                            <div class="w-12 h-12 rounded-2xl ${color} flex-shrink-0 flex items-center justify-center text-xl shadow-lg">
                                ${icon}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex justify-between items-start">
                                    <h4 class="font-black italic uppercase text-xs tracking-tighter text-white">${data.title}</h4>
                                    <span class="text-[9px] font-bold text-gray-600 uppercase tracking-widest">${time}</span>
                                </div>
                                <p class="text-[11px] font-medium text-gray-400 mt-1 line-clamp-2">${data.message}</p>
                            </div>
                            <button onclick="removeNotif('${item.id}')" class="text-gray-700 hover:text-red-500 p-2 transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    `;
                });

                document.getElementById('notif-count').innerText = `${unreadCount} ${translations[lang].alerts}`;

            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="text-red-500 font-black text-center text-xs uppercase tracking-widest">Error Loading Notifications</div>`;
            }
        }

        function getMetadata(type) {
            switch(type) {
                case 'follow': return { icon: '👤', color: 'bg-blue-500/10 text-blue-400' };
                case 'post': return { icon: '✨', color: 'bg-purple-500/10 text-purple-400' };
                case 'transport': return { icon: '🚗', color: 'bg-emerald-500/10 text-emerald-400' };
                case 'sold': return { icon: '💰', color: 'bg-yellow-500/10 text-yellow-400' };
                default: return { icon: '🔔', color: 'bg-gray-500/10 text-gray-400' };
            }
        }

        document.getElementById('mark-all-read').onclick = async () => {
            const user = auth.currentUser;
            if (!user) return;
            const btn = document.getElementById('mark-all-read');
            btn.innerText = "...";
            const q = query(collection(db, "notifications"), where("recipientId", "==", user.uid), where("read", "==", false));
            const snap = await getDocs(q);
            const promises = snap.docs.map(d => updateDoc(doc(db, "notifications", d.id), { read: true }));
            await Promise.all(promises);
            location.reload();
        };
    </script>
</body>
</html>
