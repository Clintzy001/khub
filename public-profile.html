<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | K-Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <header class="p-6 border-b border-white/10 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-8 h-8 neon-gradient rounded-lg flex items-center justify-center font-bold">K</div>
            <span class="text-xl font-bold">K-Hub</span>
        </div>
        <button onclick="history.back()" class="text-gray-400 text-sm hover:text-white">← Back</button>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="glass-card p-8 rounded-[40px] text-center mb-12">
            <div class="w-24 h-24 mx-auto rounded-full p-1 neon-gradient mb-4">
                <img id="user-avatar" src="https://via.placeholder.com/150" class="w-full h-full rounded-full object-cover border-4 border-[#0B0E14]">
            </div>
            <h1 id="user-name" class="text-3xl font-bold mb-1">Loading Profile...</h1>
            <p id="user-bio" class="text-gray-400 text-sm mb-6">K-Hub Member</p>
            
            <div class="flex justify-center gap-4">
                <div class="text-center px-6 border-r border-white/10">
                    <span id="post-count" class="block text-xl font-bold">0</span>
                    <span class="text-[10px] uppercase text-gray-500 tracking-widest">Listings</span>
                </div>
                <div class="text-center px-6">
                    <span id="join-date" class="block text-xl font-bold">...</span>
                    <span class="text-[10px] uppercase text-gray-500 tracking-widest">Joined</span>
                </div>
            </div>
        </div>

        <h3 class="text-xl font-bold mb-6">Activity Feed</h3>
        <div id="user-feed" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </main>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, getDocs, doc, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. Get User ID from URL (e.g., public-profile.html?id=USER_ID)
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        if (!userId) {
            window.location.href = 'index.html';
        }

        async function loadProfile() {
            try {
                // 2. Fetch User Details
                const userRef = doc(db, "users", userId);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    const userData = userSnap.data();
                    document.getElementById('user-name').innerText = userData.displayName || "Kano Merchant";
                    document.getElementById('user-bio').innerText = userData.bio || "Active K-Hub Member";
                    document.getElementById('user-avatar').src = userData.photoURL || 'https://via.placeholder.com/150';
                    document.getElementById('join-date').innerText = userData.createdAt ? new Date(userData.createdAt.seconds * 1000).getFullYear() : '2026';
                }

                // 3. Fetch User's Listings across all categories
                const categories = ['jobs', 'products', 'transports', 'rentals'];
                let posts = [];

                for (const cat of categories) {
                    const q = query(collection(db, cat), where("userId", "==", userId));
                    const snap = await getDocs(q);
                    snap.forEach(doc => posts.push({ id: doc.id, ...doc.data(), type: cat }));
                }

                document.getElementById('post-count').innerText = posts.length;
                renderUserFeed(posts);

            } catch (error) {
                console.error("Error loading profile:", error);
            }
        }

        function renderUserFeed(items) {
            const feed = document.getElementById('user-feed');
            if (items.length === 0) {
                feed.innerHTML = `<p class="text-gray-500">No active listings from this user.</p>`;
                return;
            }

            feed.innerHTML = items.map(item => `
                <div class="glass-card rounded-3xl overflow-hidden p-4 flex gap-4 items-center">
                    <img src="${item.imageUrl || 'https://via.placeholder.com/150'}" class="w-20 h-20 rounded-2xl object-cover">
                    <div class="flex-1">
                        <span class="text-[9px] uppercase font-bold text-purple-400">${item.type}</span>
                        <h4 class="font-bold truncate">${item.title || item.name}</h4>
                        <p class="text-emerald-400 font-bold text-sm">₦${Number(item.price || item.salary || 0).toLocaleString()}</p>
                    </div>
                    <button onclick="window.location.href='listing-details.html?id=${item.id}&type=${item.type}'" class="p-2 bg-white/5 rounded-full">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            `).join('');
        }

        loadProfile();
    </script>
</body>
</html>
