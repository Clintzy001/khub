<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | My Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-purple: #8B5CF6;
            --neon-blue: #3B82F6;
        }

        body { 
            background-color: #06080C; 
            color: white; 
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%);
            margin: 0;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%);
            transition: all 0.3s ease;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--neon-purple); }

        #mobile-menu {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
        }
        #mobile-menu.active { transform: translateX(0); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 150; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        
        .sold-item { opacity: 0.4; filter: grayscale(1); }

        /* Google Translate Styling */
        .menu-translate .goog-te-gadget-simple {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 12px !important;
            border-radius: 12px !important;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .menu-translate .goog-te-gadget-simple span { color: #fff !important; font-size: 14px !important; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">

    <div id="edit-modal" class="modal">
        <div class="glass-panel p-8 w-full max-w-lg border-purple-500/30">
            <h2 class="text-2xl font-black mb-6 italic">Edit <span class="text-purple-500">Listing</span></h2>
            <input type="hidden" id="edit-id">
            <input type="hidden" id="edit-coll">
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block">Title / Name</label>
                    <input type="text" id="edit-title" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 font-medium">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block">Price / Fare (₦)</label>
                    <input type="number" id="edit-price" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 font-medium">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block">Description</label>
                    <textarea id="edit-desc" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 font-medium"></textarea>
                </div>
                
                <div class="flex gap-4 mt-8">
                    <button onclick="closeEditModal()" class="flex-1 py-3 text-xs font-black uppercase text-gray-400">Cancel</button>
                    <button id="save-edit-btn" class="flex-1 btn-gradient py-3 rounded-xl text-xs font-black uppercase shadow-lg shadow-purple-500/20">Update Now</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mobile-menu" class="fixed inset-0 z-[100] bg-[#06080C]/98 backdrop-blur-2xl p-8 flex flex-col md:hidden">
        <div class="flex justify-between items-center mb-12">
            <span class="text-xl font-black text-purple-500 italic">K-HUB</span>
            <button onclick="toggleMenu()" class="text-white p-2 glass-panel">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav class="flex flex-col gap-8 text-3xl font-bold">
            <a href="index.html" class="text-gray-400">Home</a>
            <a href="public-profile.html" id="mobile-profile-link" class="text-gray-400">Public Profile</a>
            <a href="notifications.html" class="text-gray-400">Alerts</a>
            <button id="mobile-logout" class="text-red-500 text-left">Sign Out</button>
        </nav>
        <div class="mt-auto">
            <p class="text-[10px] uppercase tracking-[0.3em] text-gray-500 mb-4 font-bold">Platform Language</p>
            <div id="google_translate_element" class="menu-translate"></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto glass-panel p-6 md:p-10 relative overflow-hidden ring-1 ring-purple-500/20 shadow-2xl">
        
        <header class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
                <svg class="w-10 h-10" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#k-grad)"/>
                    <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs><linearGradient id="k-grad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
                </svg>
                <span class="text-2xl font-black tracking-tighter hidden sm:block italic">K-HUB</span>
            </div>

            <nav class="hidden md:flex gap-8 items-center text-[10px] font-black text-gray-400 uppercase tracking-widest">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a id="nav-profile-link" href="#" class="hover:text-white transition">My Profile</a>
                <a href="notifications.html" class="relative group">
                    Alerts
                    <span id="notif-dot" class="hidden absolute -top-1 -right-2 w-2 h-2 bg-red-500 rounded-full"></span>
                </a>
                <button id="logout-btn" class="text-red-500/70 hover:text-red-500 transition border border-red-500/20 px-4 py-2 rounded-full">Logout</button>
            </nav>

            <button onclick="toggleMenu()" class="md:hidden p-2 glass-panel">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </header>

        <section class="mb-12">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                <div>
                    <h1 class="text-3xl md:text-5xl font-black tracking-tighter mb-2">Hello, <span id="user-display-name" class="text-purple-500">...</span></h1>
                    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.3em]">Account Access: <span id="user-role" class="text-blue-400">Loading</span></p>
                </div>
                <button id="main-action-btn" class="btn-gradient px-8 py-4 rounded-2xl text-xs font-black uppercase tracking-widest shadow-xl shadow-purple-500/20 hover:scale-105 transition">
                    + Create New Listing
                </button>
            </div>
        </section>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-12">
            <div class="stat-card p-8 rounded-3xl text-center">
                <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-2">Total Posts</p>
                <h2 id="stat-listings-count" class="text-3xl font-black">0</h2>
            </div>
            <div class="stat-card p-8 rounded-3xl text-center">
                <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-2">Active Now</p>
                <h2 id="stat-active-count" class="text-3xl font-black text-emerald-400">0</h2>
            </div>
            <div class="stat-card p-8 rounded-3xl text-center border-b-4 border-purple-500">
                <p class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-2">Verified Status</p>
                <h2 id="account-status-text" class="text-2xl font-black text-purple-400 italic">Standard</h2>
            </div>
        </div>

        <section class="mb-12">
            <div class="flex items-center gap-4 mb-8">
                <h3 class="text-xs font-black text-gray-500 uppercase tracking-[0.3em]">Listing Manager</h3>
                <div class="flex-1 h-[1px] bg-white/5"></div>
            </div>
            
            <div id="my-listings" class="space-y-4">
                <div class="glass-panel h-20 animate-pulse bg-white/5"></div>
                <div class="glass-panel h-20 animate-pulse bg-white/5"></div>
            </div>
        </section>

        <footer class="mt-20 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6">
            <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest">K-Hub Merchant Console • 2026</p>
            <div class="flex gap-4">
                <div class="w-8 h-8 rounded-full glass-panel flex items-center justify-center hover:bg-purple-500 transition cursor-pointer text-xs">𝕏</div>
                <div class="w-8 h-8 rounded-full glass-panel flex items-center justify-center hover:bg-purple-500 transition cursor-pointer text-xs">IG</div>
            </div>
        </footer>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        }
        function closeEditModal() { document.getElementById('edit-modal').classList.remove('active'); }
        
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ha,ig,yo,en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, getDocs, doc, getDoc, updateDoc, deleteDoc, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('user-display-name').innerText = data.fullName || "User";
                    document.getElementById('user-role').innerText = data.role || "Merchant";
                    
                    const profileLink = `public-profile.html?id=${user.uid}`;
                    document.getElementById('nav-profile-link').href = profileLink;
                    document.getElementById('mobile-profile-link').href = profileLink;
                    
                    checkNewNotifications(user.uid);
                    setupRoleUI(data.role);
                    loadUserItems(user.uid);
                }
            } else {
                window.location.href = "login.html";
            }
        });

        async function checkNewNotifications(uid) {
            const q = query(collection(db, "notifications"), where("recipientId", "==", uid), where("read", "==", false), limit(1));
            const snap = await getDocs(q);
            if (!snap.empty) document.getElementById('notif-dot').classList.remove('hidden');
        }

        function setupRoleUI(role) {
            const btn = document.getElementById('main-action-btn');
            const routes = { seller: 'post-product.html', employer: 'post-job.html', landlord: 'post-rental.html', driver: 'post-transport.html' };
            btn.onclick = () => window.location.href = routes[role] || 'post-product.html';
        }

        async function loadUserItems(uid) {
            const collections = ['products', 'jobs', 'rentals', 'transports'];
            const container = document.getElementById('my-listings');
            container.innerHTML = "";
            let total = 0, activeCount = 0;

            for (const coll of collections) {
                const q = query(collection(db, coll), where("userId", "==", uid));
                const snap = await getDocs(q);

                snap.forEach(item => {
                    total++;
                    const data = item.data();
                    const status = data.status || 'active';
                    const isActive = status === 'active';
                    if(isActive) activeCount++;
                    
                    container.innerHTML += `
                        <div class="glass-panel p-5 flex flex-col sm:flex-row justify-between items-center gap-4 transition group ${!isActive ? 'sold-item' : ''}">
                            <div class="flex items-center gap-4 w-full">
                                <div class="w-14 h-14 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center overflow-hidden shrink-0">
                                    <img src="${data.imageUrl || 'https://via.placeholder.com/100'}" class="w-full h-full object-cover">
                                </div>
                                <div class="min-w-0">
                                    <h4 class="font-black text-sm truncate uppercase tracking-tight">${data.name || data.title}</h4>
                                    <p class="text-[10px] font-bold text-emerald-400">₦${Number(data.price || data.salary || 0).toLocaleString()}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                                <button onclick="toggleStatus('${coll}', '${item.id}', '${status}')" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest bg-white/5 hover:bg-white/10 text-purple-400 border border-white/5">
                                    ${isActive ? 'Close' : 'Relist'}
                                </button>
                                <button onclick="openEdit('${coll}', '${item.id}')" class="p-2 text-gray-500 hover:text-white transition">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                </button>
                                <button onclick="deleteItem('${coll}', '${item.id}')" class="p-2 text-gray-500 hover:text-red-500 transition">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </div>`;
                });
            }
            document.getElementById('stat-listings-count').innerText = total;
            document.getElementById('stat-active-count').innerText = activeCount;
            if (total === 0) container.innerHTML = `<p class="text-center py-10 text-gray-500 text-xs font-bold uppercase tracking-widest italic">No active listings found.</p>`;
        }

        // Action window functions
        window.toggleStatus = async (coll, id, current) => {
            const next = current === 'active' ? 'sold' : 'active';
            if(confirm(`Switch listing to ${next}?`)) {
                await updateDoc(doc(db, coll, id), { status: next });
                location.reload();
            }
        };

        window.deleteItem = async (coll, id) => {
            if(confirm("Permanently delete?")) {
                await deleteDoc(doc(db, coll, id));
                location.reload();
            }
        };

        window.openEdit = async (coll, id) => {
            const docSnap = await getDoc(doc(db, coll, id));
            if(docSnap.exists()) {
                const d = docSnap.data();
                document.getElementById('edit-id').value = id;
                document.getElementById('edit-coll').value = coll;
                document.getElementById('edit-title').value = d.name || d.title;
                document.getElementById('edit-price').value = d.price || d.salary || 0;
                document.getElementById('edit-desc').value = d.description || "";
                document.getElementById('edit-modal').classList.add('active');
            }
        };

        document.getElementById('save-edit-btn').onclick = async () => {
            const id = document.getElementById('edit-id').value;
            const coll = document.getElementById('edit-coll').value;
            const updateData = {
                description: document.getElementById('edit-desc').value
            };
            
            if(coll === 'products') {
                updateData.name = document.getElementById('edit-title').value;
                updateData.price = document.getElementById('edit-price').value;
            } else {
                updateData.title = document.getElementById('edit-title').value;
                if(coll === 'jobs') updateData.salary = document.getElementById('edit-price').value;
                else updateData.price = document.getElementById('edit-price').value;
            }

            await updateDoc(doc(db, coll, id), updateData);
            location.reload();
        };

        const logoff = () => signOut(auth).then(() => window.location.href = "index.html");
        document.getElementById('logout-btn').onclick = logoff;
        document.getElementById('mobile-logout').onclick = logoff;

    </script>
</body>
</html>
