<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | My Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .stat-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen bg-[#0B0E14]">

    <nav class="border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-8 h-8 neon-gradient rounded-lg flex items-center justify-center font-bold">K</div>
            <span class="font-bold text-xl tracking-tight">K-Hub</span>
        </div>
        <button id="logout-btn" class="text-sm text-gray-400 hover:text-red-400 transition">Logout</button>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <header class="mb-10">
            <div class="flex items-center gap-3">
                <h1 class="text-3xl font-bold">Welcome back, <span id="user-name" class="text-purple-400">...</span>!</h1>
                <span id="premium-badge" class="hidden bg-blue-600 text-white text-[10px] font-bold px-2 py-1 rounded-full flex items-center gap-1 shadow-lg shadow-blue-500/20">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M23 12L20.56 9.22l-.78-2.64L16.24 4.3l-2.64-.78L12 0l-2.64 3.52-2.64.78-.78 2.64L.44 12l2.44 2.78.78 2.64 2.64.78 2.64.78L12 24l2.64-3.52 2.64-.78.78-2.64 2.44-2.78L23 12zm-11 5.86l-4.5-4.5 1.41-1.41L12 14.04l5.09-5.09 1.41 1.41-6.5 6.5z"/></svg>
                    VERIFIED
                </span>
            </div>
            <p class="text-gray-400 mt-1">Role: <span id="user-role" class="uppercase text-xs font-bold tracking-widest text-blue-400">Loading...</span></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-card p-6 rounded-2xl stat-card">
                <p class="text-gray-400 text-sm">Active Listings</p>
                <h3 class="text-2xl font-bold mt-2">0</h3>
            </div>
            <div class="glass-card p-6 rounded-2xl stat-card">
                <p class="text-gray-400 text-sm">Messages</p>
                <h3 class="text-2xl font-bold mt-2">0</h3>
            </div>
            <div class="glass-card p-6 rounded-2xl stat-card border-l-4 border-gray-600" id="status-card">
                <p class="text-gray-400 text-sm">Account Status</p>
                <h3 id="account-status-text" class="text-2xl font-bold mt-2 text-gray-400">Standard</h3>
            </div>
        </div>

        <section class="glass-card p-8 rounded-3xl border-dashed border-2 border-white/10 text-center">
            <div id="role-action-icon" class="text-4xl mb-4">🚀</div>
            <h2 id="role-action-title" class="text-xl font-bold mb-2">Ready to get started?</h2>
            <p id="role-action-desc" class="text-gray-400 mb-6 max-w-md mx-auto">Set up your profile to start exploring all features of the K-Hub community.</p>
            <button id="main-action-btn" class="neon-gradient px-8 py-3 rounded-xl font-bold shadow-lg shadow-purple-500/20 hover:scale-105 transition">
                Complete Profile
            </button>
        </section>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    
                    document.getElementById('user-name').innerText = data.name || "User";
                    document.getElementById('user-role').innerText = data.role;
                    
                    // Logic to show verification only if YOU set it in Firebase
                    if (data.isPremium === true) {
                        document.getElementById('premium-badge').classList.remove('hidden');
                        
                        const statusText = document.getElementById('account-status-text');
                        statusText.innerText = "Verified Premium";
                        statusText.classList.replace('text-gray-400', 'text-green-400');
                        
                        document.getElementById('status-card').classList.replace('border-gray-600', 'border-green-500');
                    }

                    setupRoleUI(data.role);
                }
            } else {
                window.location.href = "k-hub-login.html";
            }
        });

        function setupRoleUI(role) {
            const btn = document.getElementById('main-action-btn');
            const title = document.getElementById('role-action-title');
            const icon = document.getElementById('role-action-icon');

            if (role === 'seller') {
                title.innerText = "Start Selling Items";
                btn.innerText = "Add New Product";
                icon.innerText = "🛍️";
                btn.onclick = () => window.location.href = 'post-product.html';
            } else if (role === 'employer') {
                title.innerText = "Hire Kano Talent";
                btn.innerText = "Post a Job";
                icon.innerText = "💼";
                btn.onclick = () => window.location.href = 'post-job.html';
            } else if (role === 'landlord') {
                title.innerText = "List Your Property";
                btn.innerText = "Add Listing";
                icon.innerText = "🏠";
                btn.onclick = () => window.location.href = 'rentals.html';
            }
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
