<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | My Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .stat-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen bg-[#0B0E14]">

    <nav class="border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-8 h-8 neon-gradient rounded-lg flex items-center justify-center font-bold">K</div>
            <span class="font-bold text-xl tracking-tight">K-Hub</span>
        </div>
        <div class="flex items-center gap-4">
            <button id="view-profile-btn" class="text-sm text-purple-400 hover:underline">Public Profile</button>
            <button id="logout-btn" class="text-sm text-gray-400 hover:text-red-400 transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <header class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <div class="flex items-center gap-3">
                    <h1 class="text-3xl font-bold">Welcome back, <span id="user-display-name" class="text-purple-400">...</span>!</h1>
                    <span id="premium-badge" class="hidden bg-blue-600 text-white text-[10px] font-bold px-2 py-1 rounded-full flex items-center gap-1 shadow-lg shadow-blue-500/20">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M23 12L20.56 9.22l-.78-2.64L16.24 4.3l-2.64-.78L12 0l-2.64 3.52-2.64.78-.78 2.64L.44 12l2.44 2.78.78 2.64 2.64.78 2.64.78L12 24l2.64-3.52 2.64-.78.78-2.64 2.44-2.78L23 12zm-11 5.86l-4.5-4.5 1.41-1.41L12 14.04l5.09-5.09 1.41 1.41-6.5 6.5z"/></svg>
                        VERIFIED
                    </span>
                </div>
                <p class="text-gray-400 mt-1">Account Type: <span id="user-role" class="uppercase text-xs font-bold tracking-widest text-blue-400">Loading...</span></p>
            </div>
            <button id="main-action-btn" class="neon-gradient px-6 py-3 rounded-xl font-bold shadow-lg hover:scale-105 transition text-sm">
                + Post New Listing
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-card p-6 rounded-2xl stat-card">
                <p class="text-gray-400 text-sm">Total Listings</p>
                <h3 id="stat-listings-count" class="text-2xl font-bold mt-2">0</h3>
            </div>
            <div class="glass-card p-6 rounded-2xl stat-card">
                <p class="text-gray-400 text-sm">Live Status</p>
                <h3 id="stat-active-count" class="text-2xl font-bold mt-2 text-emerald-400">0</h3>
            </div>
            <div class="glass-card p-6 rounded-2xl stat-card border-l-4 border-gray-600" id="status-card">
                <p class="text-gray-400 text-sm">Badge Status</p>
                <h3 id="account-status-text" class="text-2xl font-bold mt-2 text-gray-400">Standard</h3>
            </div>
        </div>

        <div class="glass-card p-8 rounded-3xl">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold">Manage My Listings</h3>
                <span class="text-xs text-gray-500 italic">Only you can see pending items</span>
            </div>
            
            <div id="my-listings" class="grid gap-4">
                <div class="animate-pulse flex space-x-4">
                    <div class="flex-1 space-y-4 py-1">
                        <div class="h-4 bg-white/10 rounded w-3/4"></div>
                        <div class="space-y-2">
                            <div class="h-4 bg-white/10 rounded"></div>
                        </div>
                    </div>
                </div>
                <p class="text-gray-500 text-center py-10">Searching for your posts...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    
                    document.getElementById('user-display-name').innerText = data.fullName || "User";
                    document.getElementById('user-role').innerText = data.role || "User";
                    
                    // Connected to Profile Page
                    document.getElementById('view-profile-btn').onclick = () => {
                        window.location.href = `profile.html?id=${user.uid}`;
                    };

                    // Handle Premium/Verified Status
                    if (data.isPremium === true) {
                        document.getElementById('premium-badge').classList.remove('hidden');
                        const statusText = document.getElementById('account-status-text');
                        statusText.innerText = "Verified Pro";
                        statusText.classList.replace('text-gray-400', 'text-blue-400');
                        document.getElementById('status-card').classList.replace('border-gray-600', 'border-blue-500');
                    }

                    setupRoleUI(data.role);
                    loadUserItems(user.uid);
                }
            } else {
                window.location.href = "k-hub-login.html";
            }
        });

        function setupRoleUI(role) {
            const btn = document.getElementById('main-action-btn');
            if (role === 'seller') btn.onclick = () => window.location.href = 'post-product.html';
            else if (role === 'employer') btn.onclick = () => window.location.href = 'post-job.html';
            else if (role === 'landlord') btn.onclick = () => window.location.href = 'post-rental.html';
            else if (role === 'driver') btn.onclick = () => window.location.href = 'post-transport.html';
            else btn.onclick = () => window.location.href = 'post-product.html';
        }

        async function loadUserItems(uid) {
            const collections = ['products', 'jobs', 'rentals', 'transport'];
            const container = document.getElementById('my-listings');
            container.innerHTML = "";
            
            let totalCount = 0;
            let activeCount = 0;

            for (const coll of collections) {
                const q = query(collection(db, coll), where("userId", "==", uid));
                const snapshot = await getDocs(q);

                snapshot.forEach(itemDoc => {
                    totalCount++;
                    const data = itemDoc.data();
                    if(data.status === 'active') activeCount++;

                    const statusColor = data.status === 'active' ? 'text-emerald-400' : 'text-yellow-400';
                    const statusBg = data.status === 'active' ? 'bg-emerald-400/10' : 'bg-yellow-400/10';
                    
                    container.innerHTML += `
                        <div class="glass-card p-5 rounded-2xl flex justify-between items-center border border-white/5 hover:border-white/20 transition">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center overflow-hidden">
                                    ${data.imageUrl ? `<img src="${data.imageUrl}" class="w-full h-full object-cover">` : `<span class="text-xl">📦</span>`}
                                </div>
                                <div>
                                    <h4 class="font-bold text-sm">${data.name || data.title || (data.from + ' to ' + data.to)}</h4>
                                    <p class="text-[10px] uppercase text-gray-500 tracking-wider font-bold">${coll}</p>
                                </div>
                            </div>
                            <div class="flex flex-col items-end gap-2">
                                <span class="text-[9px] font-bold ${statusColor} ${statusBg} px-2 py-1 rounded-md border border-white/5">
                                    ${data.status.toUpperCase()}
                                </span>
                                <button class="text-[10px] text-gray-500 hover:text-red-400 transition">Delete</button>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('stat-listings-count').innerText = totalCount;
            document.getElementById('stat-active-count').innerText = activeCount;

            if (totalCount === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-500 text-sm italic">You haven't posted anything yet.</div>`;
            }
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "index.html"; });
        });
    </script>
</body>
</html>
