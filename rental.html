<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Rentals & Properties</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .filter-btn.active { background: #8B5CF6; border-color: transparent; color: white; }
    </style>
</head>
<body class="overflow-x-hidden pb-32">

    <header class="sticky top-0 z-50 bg-[#0B0E14]/80 backdrop-blur-md border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-8 h-8 neon-gradient rounded-lg flex items-center justify-center font-bold text-white">K</div>
                <span class="text-xl font-bold tracking-tight">K-Hub</span>
            </div>
            
            <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="job-search.html" class="hover:text-purple-400 transition">Jobs</a>
                <a href="rentals.html" class="text-white border-b-2 border-purple-500 pb-1">Rentals</a>
                <a href="shop.html" class="hover:text-purple-400 transition">Shop</a>
                <a href="transport.html" class="hover:text-purple-400 transition">Transport</a>
            </nav>

            <button onclick="window.location.href='post-rental.html'" class="text-[11px] neon-gradient px-5 py-2 rounded-xl font-bold shadow-lg shadow-purple-500/20 active:scale-95 transition">
                List Property
            </button>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 pt-12">
        <div class="mb-10">
            <h1 class="text-3xl md:text-5xl font-black italic uppercase tracking-tighter">Properties <br><span class="text-purple-500">In Kano</span></h1>
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">Verified Real Estate & Short-lets</p>
        </div>

        <div class="glass-card p-4 rounded-3xl flex items-center gap-4 mb-8">
            <svg class="w-5 h-5 text-purple-500 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" id="rental-search" placeholder="Search areas (Hotoro, Nassarawa, Janbulo)..." class="bg-transparent w-full outline-none text-sm text-white font-medium">
        </div>

        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-4">
            <button class="filter-btn active whitespace-nowrap px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest transition" data-category="all">All</button>
            <button class="filter-btn whitespace-nowrap px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest transition" data-category="apartment">Apartments</button>
            <button class="filter-btn whitespace-nowrap px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest transition" data-category="shop">Shops</button>
            <button class="filter-btn whitespace-nowrap px-6 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase tracking-widest transition" data-category="hall">Event Halls</button>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 mt-6">
        <div id="rentals-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="h-64 rounded-[40px] bg-white/5 animate-pulse"></div>
            <div class="h-64 rounded-[40px] bg-white/5 animate-pulse"></div>
            <div class="h-64 rounded-[40px] bg-white/5 animate-pulse"></div>
        </div>
    </main>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-[#0B0E14]/90 backdrop-blur-lg border-t border-white/10 px-6 py-3 z-[100] flex justify-between items-center">
        <a href="index.html" class="flex flex-col items-center gap-1 text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-bold uppercase">Home</span>
        </a>
        <a href="job-search.html" class="flex flex-col items-center gap-1 text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-bold uppercase">Jobs</span>
        </a>
        <a href="rentals.html" class="flex flex-col items-center gap-1 text-purple-500">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-bold uppercase">Rentals</span>
        </a>
        <a href="shop.html" class="flex flex-col items-center gap-1 text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span class="text-[10px] font-bold uppercase">Shop</span>
        </a>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from './firebase-config.js';

        let allRentals = [];
        const grid = document.getElementById('rentals-grid');

        async function fetchRentals() {
            try {
                const q = query(collection(db, "rentals"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                allRentals = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderRentals(allRentals);
            } catch (error) {
                console.error(error);
                grid.innerHTML = `<p class="col-span-full text-center text-gray-500 font-bold uppercase tracking-widest py-10">Connect to Internet to load properties</p>`;
            }
        }

        function renderRentals(items) {
            if (items.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center text-gray-500 py-10">No properties listed yet.</p>`;
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="glass-card rounded-[40px] overflow-hidden group hover:bg-white/10 transition-all duration-500">
                    <div class="h-60 relative overflow-hidden">
                        <img src="${item.imageUrl || 'https://via.placeholder.com/600x400'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <div class="absolute top-4 left-4 neon-gradient px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest text-white">
                            ${item.category || 'Premium'}
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-xl font-bold truncate mb-1">${item.title || item.name}</h3>
                        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest flex items-center gap-1 mb-4">
                            <svg class="w-3 h-3 text-purple-500" fill="currentColor" viewBox="0 0 20 20"><path d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9z"></path></svg>
                            ${item.location || 'Kano'}
                        </p>
                        <div class="flex items-center justify-between border-t border-white/5 pt-4">
                            <span class="text-emerald-400 font-black">₦${Number(item.price).toLocaleString()}</span>
                            <button onclick="window.location.href='listing-details.html?id=${item.id}&type=rentals'" 
                                    class="text-[9px] font-black uppercase tracking-widest text-purple-400 border border-purple-400/30 px-5 py-2 rounded-xl hover:bg-purple-500 hover:text-white transition">
                                View House
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Search Filter Logic
        document.getElementById('rental-search').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allRentals.filter(r => 
                (r.title || "").toLowerCase().includes(term) || 
                (r.location || "").toLowerCase().includes(term)
            );
            renderRentals(filtered);
        };

        // Filter buttons logic
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const cat = btn.dataset.category;
                renderRentals(cat === 'all' ? allRentals : allRentals.filter(r => r.category === cat));
            };
        });

        fetchRentals();
    </script>
</body>
</html>
