<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Shop Products in Kano</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { 
            background-color: #06080C; color: white; font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%);
            margin: 0;
        }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #mobile-menu.active { transform: translateX(0); }
        .search-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .search-input:focus { border-color: var(--neon-purple); background: rgba(255, 255, 255, 0.08); }
        .goog-te-gadget-simple { background: transparent !important; border: none !important; padding: 0 !important; }
        .goog-te-gadget-simple span { color: #94a3b8 !important; font-size: 10px !important; font-weight: 800 !important; text-transform: uppercase !important; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div id="mobile-menu" class="fixed inset-0 z-[100] bg-[#06080C]/98 backdrop-blur-2xl p-8 flex flex-col md:hidden">
        <div class="flex justify-between items-center mb-12">
            <span class="text-xl font-black text-purple-500 uppercase italic">K-HUB MENU</span>
            <button onclick="toggleMenu()" class="text-white p-2 glass-panel">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav class="flex flex-col gap-8 text-3xl font-bold">
            <a href="index.html" class="text-gray-400">Home</a>
            <a href="job-search.html" class="text-gray-400">Jobs</a>
            <a href="rentals.html" class="text-gray-400">Rentals</a>
            <a href="shop.html" class="text-white border-l-4 border-purple-500 pl-4">Shop</a>
            <a href="transport.html" class="text-gray-400">Transport</a>
        </nav>
    </div>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto sticky top-0 z-50 backdrop-blur-md">
        <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
            <svg class="w-10 h-10 mb-1" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="10" fill="url(#k-grad-shop)"/><path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                <defs><linearGradient id="k-grad-shop" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
            </svg>
            <h1 class="text-[10px] font-black italic tracking-tighter leading-none">K-HUB</h1>
        </div>
        <div class="hidden md:flex gap-8 text-[11px] font-black uppercase tracking-widest text-gray-400">
            <a href="index.html">Home</a>
            <a href="job-search.html">Jobs</a>
            <a href="rentals.html">Rentals</a>
            <a href="shop.html" class="text-white border-b-2 border-purple-500 pb-1">Shop</a>
            <a href="transport.html">Transport</a>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='k-hub-login.html'" class="hidden sm:block bg-gradient-to-r from-purple-600 to-blue-600 px-7 py-2.5 rounded-full text-xs font-black uppercase tracking-widest">Login</button>
            <button onclick="toggleMenu()" class="p-3 glass-panel border-white/10 hover:bg-white/5 transition">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
    </nav>

    <header class="px-6 py-12 max-w-7xl mx-auto">
        <h1 class="text-4xl md:text-5xl font-black italic tracking-tighter mb-4 uppercase">Shop Products in <span class="text-purple-500">Kano</span></h1>
        
        <div class="flex flex-col md:flex-row gap-4 mt-8">
            <div class="relative flex-1">
                <input type="text" id="searchInput" placeholder="Search for products..." class="w-full search-input rounded-2xl py-5 px-12 text-sm outline-none">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <button onclick="window.location.href='user-dashboard.html'" class="bg-purple-500 border border-purple-400 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-purple-600 transition">Post a Product</button>
        </div>

        <p class="text-[10px] font-black uppercase tracking-[0.4em] text-gray-600 mb-6 mt-12">Categories</p>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-4">
            <div class="glass-panel p-4 text-center hover:border-purple-500 transition cursor-pointer group">
                <div class="bg-white rounded-xl p-3 mb-3 flex justify-center aspect-square items-center"><img src="https://www.svgrepo.com/show/489955/food.svg" class="w-8 h-8"></div>
                <h3 class="text-[9px] font-black uppercase text-white/70">Food & Agri</h3>
            </div>
            <div class="glass-panel p-4 text-center hover:border-blue-500 transition cursor-pointer group">
                <div class="bg-white rounded-xl p-3 mb-3 flex justify-center aspect-square items-center"><img src="https://www.svgrepo.com/show/475458/mobile-phone.svg" class="w-8 h-8"></div>
                <h3 class="text-[9px] font-black uppercase text-white/70">Electronics</h3>
            </div>
            <div class="glass-panel p-4 text-center hover:border-emerald-500 transition cursor-pointer group">
                <div class="bg-white rounded-xl p-3 mb-3 flex justify-center aspect-square items-center"><img src="https://www.svgrepo.com/show/368817/land.svg" class="w-8 h-8"></div>
                <h3 class="text-[9px] font-black uppercase text-white/70">Properties</h3>
            </div>
            <div class="glass-panel p-4 text-center hover:border-orange-500 transition cursor-pointer group">
                <div class="bg-white rounded-xl p-3 mb-3 flex justify-center aspect-square items-center"><img src="https://www.svgrepo.com/show/478586/cow.svg" class="w-8 h-8"></div>
                <h3 class="text-[9px] font-black uppercase text-white/70">Livestock</h3>
            </div>
            <div class="glass-panel p-4 text-center hover:border-pink-500 transition cursor-pointer group">
                <div class="bg-white rounded-xl p-3 mb-3 flex justify-center aspect-square items-center"><img src="https://www.svgrepo.com/show/491515/tools.svg" class="w-8 h-8"></div>
                <h3 class="text-[9px] font-black uppercase text-white/70">Industrial</h3>
            </div>
            <div class="glass-panel p-4 text-center hover:border-gray-500 transition cursor-pointer group">
                <div class="bg-white rounded-xl p-3 mb-3 flex justify-center aspect-square items-center"><img src="https://www.svgrepo.com/show/365538/shopping-bag-fill.svg" class="w-8 h-8"></div>
                <h3 class="text-[9px] font-black uppercase text-white/70">General</h3>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
            <div class="col-span-full py-20 text-center uppercase font-black text-gray-500">Fetching Marketplace...</div>
        </div>
    </main>

    <footer class="mt-20 border-t border-white/5 py-12 px-6 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex gap-8 text-[10px] font-black uppercase tracking-widest text-gray-600">
                <a href="about.html" class="hover:text-purple-400">About</a>
                <a href="terms.html" class="hover:text-purple-400">Terms</a>
                <a href="contact.html" class="hover:text-purple-400">Contact</a>
            </div>
            <div class="text-[10px] font-black uppercase tracking-widest text-gray-500">
                MADE FOR KANO | © 2026 K-HUB
            </div>
            <div class="flex items-center gap-2 glass-panel px-4 py-2 rounded-xl">
                <div id="google_translate_element"></div>
            </div>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeW7PFz9wntXO0OUj9N5V1DdkUxxI2VkQ",
            authDomain: "k-hub-b4d8f.firebaseapp.com",
            projectId: "k-hub-b4d8f",
            storageBucket: "k-hub-b4d8f.firebasestorage.app",
            messagingSenderId: "117649715938",
            appId: "1:117649715938:web:7768d7b4d27d66e8ba24bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const productList = document.getElementById('product-list');

        // Real-time Firebase Listener for 'listings' collection
        const q = query(collection(db, "listings"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            productList.innerHTML = '';
            if (snapshot.empty) {
                productList.innerHTML = `<div class="col-span-full py-10 text-center uppercase font-black text-gray-600">No products found.</div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                // Filter only products (if needed) or show all listings
                productList.innerHTML += `
                    <div class="glass-panel p-4 group cursor-pointer hover:ring-1 ring-purple-500/50 transition-all" 
                         onclick="window.location.href='listing-details.html?id=${doc.id}'">
                        <div class="bg-gray-900 h-48 rounded-2xl mb-4 overflow-hidden">
                            <img src="${data.image || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover">
                        </div>
                        <div class="px-2">
                            <h4 class="text-[11px] font-black uppercase truncate">${data.title || data.name}</h4>
                            <p class="text-xl font-black text-purple-400 mt-1">₦${Number(data.price || 0).toLocaleString()}</p>
                            <p class="text-[9px] text-gray-500 uppercase font-bold mt-1">📍 ${data.location || 'Kano'}</p>
                        </div>
                    </div>`;
            });
        });
    </script>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        }

        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ha,ig,yo,en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
