<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Shop Products in Kano</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { 
            background-color: #06080C; color: white; font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%);
            margin: 0;
        }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        
        #mobile-menu { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); clip-path: circle(0% at 100% 0%); visibility: hidden; }
        #mobile-menu.active { clip-path: circle(150% at 100% 0%); visibility: visible; }

        .search-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .search-input:focus { border-color: var(--neon-purple); background: rgba(255, 255, 255, 0.08); }

        .lang-dropdown { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 8px 12px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; outline: none; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div id="mobile-menu" class="fixed inset-0 z-[100] bg-[#06080C]/98 backdrop-blur-2xl p-8 flex flex-col md:hidden">
        <div class="flex justify-between items-center mb-12">
            <h1 class="text-[10px] font-black italic tracking-tighter text-purple-500">K-HUB MENU</h1>
            <button onclick="toggleMenu()" class="text-white p-3 glass-panel border-white/10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav class="flex flex-col gap-6">
            <a href="index.html" class="text-4xl font-black italic uppercase tracking-tighter text-gray-700 hover:text-white" data-lang-key="home">Home</a>
            <a href="job-search.html" class="text-4xl font-black italic uppercase tracking-tighter text-gray-700 hover:text-white" data-lang-key="jobs">Jobs</a>
            <a href="rentals.html" class="text-4xl font-black italic uppercase tracking-tighter text-gray-700 hover:text-white" data-lang-key="rentals">Rentals</a>
            <a href="shop.html" class="text-4xl font-black italic uppercase tracking-tighter text-white" data-lang-key="shop">Shop</a>
            <select class="lang-select-dropdown lang-dropdown w-full mt-4" onchange="applySiteLanguage(this.value)">
                <option value="en">English</option><option value="ha">Hausa</option><option value="ig">Igbo</option><option value="yo">Yoruba</option>
            </select>
        </nav>
    </div>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto sticky top-0 z-50 backdrop-blur-md">
        <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
            <svg class="w-10 h-10 mb-1" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="10" fill="url(#k-grad-shop)"/><path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                <defs><linearGradient id="k-grad-shop" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
            </svg>
            <h1 class="text-[10px] font-black italic tracking-tighter leading-none">K-HUB</h1>
        </div>
        
        <div class="hidden md:flex gap-8 text-[11px] font-black uppercase tracking-widest text-gray-400">
            <a href="index.html" data-lang-key="home" class="hover:text-white transition">Home</a>
            <a href="job-search.html" data-lang-key="jobs" class="hover:text-white transition">Jobs</a>
            <a href="rentals.html" data-lang-key="rentals" class="hover:text-white transition">Rentals</a>
            <a href="shop.html" data-lang-key="shop" class="text-white border-b-2 border-purple-500 pb-1">Shop</a>
        </div>

        <div class="flex items-center gap-4">
            <select class="lang-select-dropdown lang-dropdown hidden md:block" id="lang-select-desktop" onchange="applySiteLanguage(this.value)">
                <option value="en">English</option><option value="ha">Hausa</option><option value="ig">Igbo</option><option value="yo">Yoruba</option>
            </select>
            <button onclick="toggleMenu()" class="p-3 glass-panel border-white/10 md:hidden">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
    </nav>

    <header class="px-6 py-12 max-w-7xl mx-auto">
        <h1 class="text-4xl md:text-5xl font-black italic tracking-tighter mb-4 uppercase">
            <span data-lang-key="shop_title">Shop Products in</span> <span class="text-purple-500">Kano</span>
        </h1>
        
        <div class="flex flex-col md:flex-row gap-4 mt-8">
            <div class="relative flex-1">
                <input type="text" id="searchInput" data-lang-key="search_placeholder" placeholder="Search for products..." class="w-full search-input rounded-2xl py-5 px-12 text-sm outline-none">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <button onclick="window.location.href='user-dashboard.html'" class="bg-purple-500 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-purple-600 transition shadow-lg shadow-purple-500/20" data-lang-key="post_product">Post a Product</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
            <div class="col-span-full py-20 text-center uppercase font-black text-gray-500" data-lang-key="fetching">Fetching Marketplace...</div>
        </div>
    </main>

    <script src="lang-manager.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeW7PFz9wntXO0OUj9N5V1DdkUxxI2VkQ",
            authDomain: "k-hub-b4d8f.firebaseapp.com",
            projectId: "k-hub-b4d8f",
            storageBucket: "k-hub-b4d8f.firebasestorage.app",
            messagingSenderId: "117649715938",
            appId: "1:117649715938:web:7768d7b4d27d66e8ba24bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- ADMIN DELETE LOGIC ---
        window.adminDeleteAny = async (id) => {
            if(confirm("Admin: Delete this offensive content?")) {
                try {
                    await deleteDoc(doc(db, "listings", id));
                } catch (e) { alert("Permission Denied: Not an Admin."); }
            }
        };

        // --- LOAD PRODUCTS & CHECK ADMIN STATUS ---
        onAuthStateChanged(auth, async (user) => {
            let isAdmin = false;
            if (user) {
                // Here we assume you've added the isAdmin field in your Firestore users collection
                const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
                const userDoc = await getDoc(doc(db, "users", user.uid));
                isAdmin = userDoc.exists() && userDoc.data().isAdmin === true;
            }

            const q = query(collection(db, "listings"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const productList = document.getElementById('product-list');
                productList.innerHTML = '';
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    productList.innerHTML += `
                        <div class="glass-panel p-4 group cursor-pointer hover:ring-1 ring-purple-500/50 transition relative">
                            ${isAdmin ? `<button onclick="event.stopPropagation(); adminDeleteAny('${doc.id}')" class="absolute top-6 right-6 z-10 bg-red-600 p-2 rounded-lg text-xs shadow-xl">🗑️</button>` : ''}
                            <div onclick="window.location.href='listing-details.html?id=${doc.id}'">
                                <div class="bg-gray-900 h-48 rounded-2xl mb-4 overflow-hidden">
                                    <img src="${data.image || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover group-hover:scale-105 transition">
                                </div>
                                <h4 class="text-[11px] font-black uppercase truncate">${data.title}</h4>
                                <p class="text-xl font-black text-purple-400">₦${Number(data.price || 0).toLocaleString()}</p>
                            </div>
                        </div>`;
                });
            });
        });
    </script>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('active');
        }
    </script>
</body>
</html>
