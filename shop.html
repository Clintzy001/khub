<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub Shop | Marketplace Kano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .cart-badge { background: #8B5CF6; box-shadow: 0 0 10px rgba(139, 92, 246, 0.6); }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="flex items-center justify-between px-6 py-4 max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
            <svg width="35" height="35" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="20" fill="url(#logoGrad)"/>
                <path d="M14 12V28M14 20L24 12M14 20L24 28" stroke="white" stroke-width="3" stroke-linecap="round"/>
                <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
            </svg>
            <span class="text-xl font-bold tracking-tight">K-Hub</span>
        </div>
        
        <div class="hidden md:flex flex-grow max-w-md mx-8">
            <div class="flex items-center bg-white/5 border border-white/10 rounded-xl px-4 py-2 w-full">
                <input type="text" placeholder="Search products in Kano..." class="bg-transparent w-full outline-none text-sm text-white">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <nav class="hidden lg:flex gap-6 text-sm font-medium text-gray-400">
            <a href="index.html" class="hover:text-white transition">Home</a>
            <a href="shop.html" class="text-white border-b-2 border-purple-500 pb-1">Shop</a>
        </nav>

        <div class="flex items-center gap-6 ml-4">
            <button class="relative">
                <svg class="w-6 h-6 text-gray-400 hover:text-white transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                <span class="absolute -top-2 -right-2 w-4 h-4 cart-badge text-[10px] flex items-center justify-center rounded-full font-bold">2</span>
            </button>
            <div class="w-10 h-10 rounded-full bg-purple-600 flex items-center justify-center font-bold">U</div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 py-8">
        <h1 class="text-3xl font-bold mb-8">Shop Products in Kano</h1>
        
        <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
            <button class="px-6 py-2 rounded-full neon-gradient text-sm font-bold whitespace-nowrap">All Items</button>
            <button class="px-6 py-2 rounded-full glass-card text-sm text-gray-400 hover:text-white whitespace-nowrap">Clothing</button>
            <button class="px-6 py-2 rounded-full glass-card text-sm text-gray-400 hover:text-white whitespace-nowrap">Electronics</button>
            <button class="px-6 py-2 rounded-full glass-card text-sm text-gray-400 hover:text-white whitespace-nowrap">Handmade Art</button>
            <button class="px-6 py-2 rounded-full glass-card text-sm text-gray-400 hover:text-white whitespace-nowrap">Food & Spices</button>
            <button class="px-6 py-2 rounded-full glass-card text-sm text-gray-400 hover:text-white whitespace-nowrap">Home Decor</button>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 mb-10">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex gap-4 w-full md:w-auto">
                <select class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none flex-grow">
                    <option>Price: All</option>
                    <option>Under ₦5,000</option>
                    <option>₦5,000 - ₦20,000</option>
                </select>
                <select class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none flex-grow">
                    <option>Sort: Latest</option>
                    <option>Price: Low to High</option>
                </select>
            </div>
            <p class="text-xs text-gray-500">Showing 142 items found in Kano</p>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            
            <div class="glass-card rounded-2xl overflow-hidden group hover:border-purple-500/50 transition">
                <div class="h-48 bg-gray-800 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1596462502278-27bfdc4033c8?auto=format&fit=crop&w=400" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="Product">
                </div>
                <div class="p-4">
                    <p class="text-[10px] text-purple-400 font-bold uppercase mb-1">Accessories</p>
                    <h3 class="font-bold text-sm mb-1 truncate">Custom Ankara Tote Bag</h3>
                    <p class="text-xs text-gray-500 mb-3">Sabon Gari, Kano</p>
                    <div class="flex items-center justify-between">
                        <span class="text-lg font-bold text-white">₦3,500</span>
                        <button class="p-2 bg-white/10 rounded-lg hover:bg-purple-600 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl overflow-hidden group hover:border-purple-500/50 transition">
                <div class="h-48 bg-gray-800 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=400" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt="Product">
                </div>
                <div class="p-4">
                    <p class="text-[10px] text-purple-400 font-bold uppercase mb-1">Electronics</p>
                    <h3 class="font-bold text-sm mb-1 truncate">Minimalist Smart Watch</h3>
                    <p class="text-xs text-gray-500 mb-3">Fagge, Kano</p>
                    <div class="flex items-center justify-between">
                        <span class="text-lg font-bold text-white">₦12,000</span>
                        <button class="p-2 bg-white/10 rounded-lg hover:bg-purple-600 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            </div>

        <div class="mt-16 flex justify-center gap-2">
            <button class="w-10 h-10 rounded-xl glass-card flex items-center justify-center font-bold text-xs hover:bg-white/10">1</button>
            <button class="w-10 h-10 rounded-xl glass-card flex items-center justify-center font-bold text-xs bg-white/10 border-purple-500">2</button>
            <button class="w-10 h-10 rounded-xl glass-card flex items-center justify-center font-bold text-xs hover:bg-white/10">Next</button>
        </div>
    </main>

    <footer class="border-t border-white/10 py-10 px-6 text-center text-xs text-gray-500">
        <div class="flex justify-center gap-6 mb-4">
            <a href="#" class="hover:text-white">About</a>
            <a href="#" class="hover:text-white">Support</a>
            <a href="#" class="hover:text-white">Sell on K-Hub</a>
        </div>
        <p>Made for Kano Residents | © 2026 K-Hub</p>
    </footer>

</body>
</html>
