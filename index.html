<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Kano's Digital Marketplace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-glow { background: radial-gradient(circle at center, rgba(139, 92, 246, 0.3) 0%, transparent 70%); }
        
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #google_translate_element { margin-right: 10px; }
        .goog-te-gadget-simple {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 5px 10px !important;
            border-radius: 12px !important;
            cursor: pointer;
        }
        .goog-te-gadget-simple span { color: #8B5CF6 !important; font-size: 12px !important; font-weight: bold !important; }
        body { top: 0px !important; }
    </style>
</head>
<body class="overflow-x-hidden pb-20 md:pb-0">

    <header class="sticky top-0 z-50 bg-[#0B0E14]/80 backdrop-blur-md border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-8 h-8 neon-gradient rounded-lg flex items-center justify-center font-bold text-white">K</div>
                <span class="text-xl font-bold tracking-tight">K-Hub</span>
            </div>

            <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
                <a href="index.html" class="text-white border-b-2 border-purple-500 pb-1">Home</a>
                <a href="job-search.html" class="hover:text-purple-400 transition">Jobs</a>
                <a href="rentals.html" class="hover:text-purple-400 transition">Rentals</a>
                <a href="shop.html" class="hover:text-purple-400 transition">Shop</a>
                <a href="transport.html" class="hover:text-purple-400 transition">Transport</a>
            </nav>

            <div class="flex items-center gap-4">
                <div id="google_translate_element"></div>
                <div id="nav-auth-section">
                    <button onclick="window.location.href='k-hub-login.html'" class="text-[11px] neon-gradient px-5 py-2 rounded-xl font-bold shadow-lg shadow-purple-500/20 active:scale-95 transition">Login</button>
                </div>
            </div>
        </div>
    </header>

    <section class="relative pt-12 pb-12 px-4 md:px-6 hero-glow">
        <div class="max-w-4xl mx-auto text-center">
            <div class="glass-card p-8 md:p-12 rounded-[40px] relative overflow-hidden">
                <h2 class="text-3xl md:text-5xl font-black mb-6 text-white tracking-tighter">Connecting Kano's <br> Best Talent & Trade</h2>
                <div class="relative z-10 max-w-2xl mx-auto">
                    <div class="flex items-center bg-black/40 border border-white/20 rounded-2xl px-5 py-4 mb-2 focus-within:border-purple-500 transition">
                        <input type="text" id="search-input" placeholder="Search products, jobs, or transport in Kano..." class="bg-transparent w-full outline-none text-sm text-white">
                        <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Try searching "iPhone", "Developer", or "Bata" </p>
                </div>
            </div>
        </div>
    </section>

    <section id="featured-section" class="max-w-7xl mx-auto px-6 mb-16 hidden">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-2xl font-black tracking-tight">K-HUB <span class="text-purple-500">TOP PICKS</span></h2>
            </div>
        </div>
        <div id="featured-slider" class="flex gap-6 overflow-x-auto pb-6 snap-x no-scrollbar"></div>
    </section>

    <main class="max-w-7xl mx-auto px-4 md:px-6 mb-24">
        <div class="flex items-center justify-between mb-8 border-l-4 border-purple-500 pl-4">
            <div>
                <h3 class="text-xl font-black italic uppercase">Latest in Kano</h3>
                <p class="text-gray-500 text-[10px] font-bold">Real-time market updates</p>
            </div>
        </div>

        <div id="home-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
            <div class="shimmer h-80 rounded-[32px]"></div>
            <div class="shimmer h-80 rounded-[32px]"></div>
        </div>

        <div class="flex justify-center">
            <button id="load-more-btn" class="hidden px-10 py-4 rounded-2xl border border-white/10 bg-white/5 font-black text-xs uppercase tracking-widest hover:bg-purple-500 hover:text-white transition-all active:scale-95">
                Load More Results
            </button>
        </div>
    </main>

    <footer class="bg-black/80 border-t border-white/5 py-12 px-6 text-center">
        <h2 class="text-lg font-black tracking-tighter mb-2">K-HUB <span class="text-purple-500">KANO</span></h2>
        <p class="text-[10px] text-gray-500 tracking-[0.3em] uppercase">Built for the Ancient City | © 2026</p>
    </footer>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-[#0B0E14]/90 backdrop-blur-lg border-t border-white/10 px-6 py-3 z-[100] flex justify-between items-center">
        <a href="index.html" class="flex flex-col items-center gap-1 text-purple-500">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[10px] font-bold uppercase">Home</span>
        </a>
        <a href="job-search.html" class="flex flex-col items-center gap-1 text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-bold uppercase">Jobs</span>
        </a>
        <a href="shop.html" class="flex flex-col items-center gap-1 text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span class="text-[10px] font-bold uppercase">Shop</span>
        </a>
        <a href="transport.html" class="flex flex-col items-center gap-1 text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            <span class="text-[10px] font-bold uppercase">Taxi</span>
        </a>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ha,ig,yo,en', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script type="module">
        import { db, collection, query, orderBy, limit, getDocs, where } from './firebase-config.js';

        let allItems = [];
        let itemsToShow = 6;

        async function loadFeaturedItems() {
            const slider = document.getElementById('featured-slider');
            const section = document.getElementById('featured-section');
            try {
                const q = query(collection(db, "products"), where("isFeatured", "==", true), where("status", "==", "active"), limit(6));
                const snap = await getDocs(q);
                if (snap.empty) return;
                section.classList.remove('hidden');
                slider.innerHTML = snap.docs.map(doc => {
                    const item = doc.data();
                    return `<div onclick="window.location.href='listing-details.html?id=${doc.id}&type=products'" class="min-w-[300px] snap-start glass-card group cursor-pointer rounded-[32px] overflow-hidden border border-purple-500/20 hover:border-purple-500/60 transition-all duration-500 relative">
                            <div class="absolute top-4 left-4 z-10 bg-purple-600 text-white text-[8px] font-black px-3 py-1 rounded-full uppercase">Premium</div>
                            <div class="h-44 overflow-hidden"><img src="${item.imageUrl || 'https://via.placeholder.com/400x300'}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700"></div>
                            <div class="p-5"><h3 class="font-bold text-white truncate">${item.name || item.title}</h3><p class="text-emerald-400 font-black">₦${Number(item.price || 0).toLocaleString()}</p></div>
                        </div>`;
                }).join('');
            } catch (err) { console.error(err); }
        }

        async function loadHomeFeed() {
            const collections = ['products', 'rentals', 'jobs', 'transports'];
            allItems = [];
            for (const col of collections) {
                try {
                    const q = query(collection(db, col), where("status", "==", "active"), limit(15));
                    const snap = await getDocs(q);
                    snap.forEach(d => allItems.push({ id: d.id, ...d.data(), type: col }));
                } catch (e) { console.warn(e); }
            }
            renderFeed(allItems.slice(0, itemsToShow));
            if (allItems.length > itemsToShow) document.getElementById('load-more-btn').classList.remove('hidden');
        }

        function renderFeed(items) {
            const feed = document.getElementById('home-feed');
            feed.innerHTML = items.map(item => {
                const price = item.price || item.salary || item.fare || 0;
                return `<div class="glass-card rounded-[35px] overflow-hidden group hover:bg-white/10 transition-all duration-500">
                        <div class="h-52 relative overflow-hidden"><img src="${item.imageUrl || 'https://via.placeholder.com/400x300'}" class="w-full h-full object-cover group-hover:scale-110"></div>
                        <div class="p-6"><h4 class="text-lg font-bold truncate">${item.name || item.title}</h4><div class="flex items-center justify-between mt-4"><span class="text-emerald-400 font-black">₦${Number(price).toLocaleString()}</span>
                        <button onclick="window.location.href='listing-details.html?id=${item.id}&type=${item.type}'" class="text-[10px] font-black uppercase text-purple-400 border border-purple-400/30 px-4 py-2 rounded-xl">View</button></div></div>
                    </div>`;
            }).join('');
        }

        loadFeaturedItems();
        loadHomeFeed();
    </script>
</body>
</html>
