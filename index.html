<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Find Your Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-glow { background: radial-gradient(circle at center, rgba(139, 92, 246, 0.3) 0%, transparent 70%); }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-[#0B0E14]/80 backdrop-blur-md border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="20" fill="url(#logoGrad)"/>
                    <path d="M14 12V28M14 20L24 12M14 20L24 28" stroke="white" stroke-width="3" stroke-linecap="round"/>
                    <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
                </svg>
                <span class="text-xl font-bold tracking-tight">K-Hub</span>
            </div>

            <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
                <a href="index.html" class="text-white border-b-2 border-purple-500 pb-1">Home</a>
                <a href="job-search.html" class="hover:text-purple-400 transition">Jobs</a>
                <a href="rentals.html" class="hover:text-purple-400 transition">Rentals</a>
                <a href="shop.html" class="hover:text-purple-400 transition">Shop</a>
                <a href="transport.html" class="hover:text-purple-400 transition">Transport</a>
            </nav>

            <div class="flex items-center gap-4">
                <button onclick="window.location.href='user-dashboard.html'" class="hidden sm:block text-[10px] bg-white/10 px-4 py-2 rounded-xl font-bold hover:bg-white/20 transition">Dashboard</button>
                <div onclick="window.location.href='user-dashboard.html'" class="w-9 h-9 rounded-full bg-purple-600 flex items-center justify-center font-bold cursor-pointer">U</div>
            </div>
        </div>
    </header>

    <section class="relative pt-12 pb-12 px-4 md:px-6 hero-glow">
        <div class="max-w-4xl mx-auto text-center">
            <div class="glass-card p-6 md:p-12 rounded-3xl relative overflow-hidden">
                <h2 class="text-2xl md:text-4xl font-bold mb-6">Connecting Kano's <br class="md:hidden"> Best Talent & Trade</h2>
                
                <div class="relative z-10">
                    <div class="flex items-center bg-black/40 border border-white/20 rounded-xl px-4 py-3 mb-6">
                        <input type="text" placeholder="Search for jobs, or items..." class="bg-transparent w-full outline-none text-sm text-white">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <button class="neon-gradient w-full md:w-auto px-10 py-3 rounded-full font-bold shadow-lg shadow-purple-500/30 hover:scale-105 transition">
                        Find Your Future
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 md:px-6 mb-12">
        <h3 class="text-md md:text-lg font-semibold mb-6 uppercase tracking-widest text-gray-500">Categories</h3>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4">
            <div onclick="location.href='job-search.html'" class="glass-card p-4 md:p-6 rounded-2xl text-center hover:bg-white/10 transition cursor-pointer">
                <div class="text-blue-400 mb-2 flex justify-center scale-90 md:scale-100">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <h4 class="font-bold text-sm md:text-base">Jobs</h4>
            </div>
            <div onclick="location.href='rentals.html'" class="glass-card p-4 md:p-6 rounded-2xl text-center hover:bg-white/10 transition cursor-pointer">
                <div class="text-blue-400 mb-2 flex justify-center scale-90 md:scale-100">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                </div>
                <h4 class="font-bold text-sm md:text-base">Rent</h4>
            </div>
            <div onclick="location.href='shop.html'" class="glass-card p-4 md:p-6 rounded-2xl text-center hover:bg-white/10 transition cursor-pointer">
                <div class="text-blue-400 mb-2 flex justify-center scale-90 md:scale-100">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <h4 class="font-bold text-sm md:text-base">Shop</h4>
            </div>
            <div onclick="location.href='transport.html'" class="glass-card p-4 md:p-6 rounded-2xl text-center hover:bg-white/10 transition cursor-pointer">
                <div class="text-blue-400 mb-2 flex justify-center scale-90 md:scale-100">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </div>
                <h4 class="font-bold text-sm md:text-base">Transport</h4>
            </div>
        </div>
    </section>

    <footer class="bg-black/50 border-t border-white/10 py-10 px-4 md:px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-8 items-center justify-between">
            <div class="w-full md:w-1/2 text-center md:text-left">
                <h4 class="font-bold mb-2">K-Hub Kano</h4>
                <p class="text-xs text-gray-500">The #1 Platform for the Kano community.</p>
            </div>
            <div class="flex gap-6 text-[10px] md:text-xs text-gray-500 uppercase font-bold">
                <a href="#">Help</a>
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
            </div>
        </div>
    </footer>

</body>
</html>
