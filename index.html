<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Find Your Future</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-glow { background: radial-gradient(circle at center, rgba(139, 92, 246, 0.3) 0%, transparent 70%); }
        .ad-space { border: 2px dashed rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.2); }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-[#0B0E14]/80 backdrop-blur-md border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-8 h-8 neon-gradient rounded-lg flex items-center justify-center font-bold text-white">K</div>
                <span class="text-xl font-bold tracking-tight">K-Hub</span>
            </div>

            <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
                <a href="index.html" class="text-white border-b-2 border-purple-500 pb-1">Home</a>
                <a href="job-search.html" class="hover:text-purple-400 transition">Jobs</a>
                <a href="rentals.html" class="hover:text-purple-400 transition">Rentals</a>
                <a href="shop.html" class="hover:text-purple-400 transition">Shop</a>
                <a href="transport.html" class="hover:text-purple-400 transition">Transport</a>
            </nav>

            <div id="nav-auth-section" class="flex items-center gap-4">
                <button onclick="window.location.href='k-hub-login.html'" class="text-[11px] neon-gradient px-5 py-2 rounded-xl font-bold shadow-lg shadow-purple-500/20 active:scale-95 transition">Login</button>
            </div>
        </div>
    </header>

    <section class="relative pt-12 pb-12 px-4 md:px-6 hero-glow">
        <div class="max-w-4xl mx-auto text-center">
            <div class="glass-card p-6 md:p-12 rounded-3xl relative overflow-hidden">
                <h2 class="text-2xl md:text-4xl font-bold mb-6 text-white">Connecting Kano's <br class="md:hidden"> Best Talent & Trade</h2>
                <div class="relative z-10">
                    <div class="flex items-center bg-black/40 border border-white/20 rounded-xl px-4 py-3 mb-6">
                        <input type="text" id="search-input" placeholder="Search for jobs, items, or transport..." class="bg-transparent w-full outline-none text-sm text-white">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="max-w-7xl mx-auto px-4 md:px-6 mb-12">
        <div class="ad-space w-full py-4 rounded-2xl flex flex-col items-center justify-center text-gray-600">
            <span class="text-[10px] uppercase font-bold tracking-widest mb-2">Advertisement</span>
            <div class="w-full max-w-[728px] h-[90px] bg-white/5 rounded flex items-center justify-center text-xs text-center px-4">
                Local & Global Ads Display Space
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 md:px-6 mb-20">
        <div class="flex items-center justify-between mb-8">
            <h3 class="text-xl font-bold">Latest on K-Hub</h3>
            <span class="text-purple-400 text-xs font-bold uppercase tracking-widest">Kano Updates</span>
        </div>

        <div id="home-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
            <div class="animate-pulse bg-white/5 h-80 rounded-[32px]"></div>
            <div class="animate-pulse bg-white/5 h-80 rounded-[32px]"></div>
            <div class="animate-pulse bg-white/5 h-80 rounded-[32px]"></div>
        </div>

        <div class="flex justify-center">
            <button id="load-more-btn" class="hidden px-8 py-3 rounded-xl border border-white/10 bg-white/5 font-bold text-sm hover:bg-white/10 transition flex items-center gap-2">
                <span>Show More Results</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
        </div>
    </main>

    <footer class="bg-black/50 border-t border-white/10 py-10 px-4 md:px-6 text-center">
        <p class="text-xs text-gray-500 tracking-widest uppercase">MADE FOR KANO | © 2026 K-HUB</p>
    </footer>

    <script type="module" src="./nav.js"></script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let allFetchedItems = [];
        let itemsToShow = 6;

        async function loadHomeFeed() {
            const feed = document.getElementById('home-feed');
            // ADDED 'transports' to the loop
            const collections = ['products', 'rentals', 'jobs', 'transports'];
            allFetchedItems = [];

            try {
                for (const colName of collections) {
                    const q = query(collection(db, colName), orderBy("createdAt", "desc"), limit(8));
                    const snap = await getDocs(q);
                    snap.forEach(doc => {
                        allFetchedItems.push({ id: doc.id, ...doc.data(), type: colName });
                    });
                }

                allFetchedItems.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderFeed(allFetchedItems.slice(0, itemsToShow));
                
                if (allFetchedItems.length > itemsToShow) {
                    document.getElementById('load-more-btn').classList.remove('hidden');
                }
            } catch (error) {
                console.error("Feed Error:", error);
                feed.innerHTML = `<p class="col-span-full text-center text-red-400 py-10">Error loading feed.</p>`;
            }
        }

        function renderFeed(items) {
            const feed = document.getElementById('home-feed');
            if (items.length === 0) {
                feed.innerHTML = `<p class="col-span-full text-center text-gray-500 py-10">No items found.</p>`;
                return;
            }

            feed.innerHTML = items.map(item => {
                const price = item.price || item.salary || item.fare || 0;
                const title = item.name || item.title || "K-Hub Listing";
                
                // Color mapping for Transport (Orange)
                let badgeColor = 'bg-purple-500';
                if (item.type === 'jobs') badgeColor = 'bg-blue-500';
                if (item.type === 'rentals') badgeColor = 'bg-emerald-500';
                if (item.type === 'transports') badgeColor = 'bg-orange-500';

                return `
                    <div class="glass-card rounded-[32px] overflow-hidden group hover:scale-[1.02] transition-all duration-300">
                        <div class="h-48 relative overflow-hidden bg-white/5">
                            <img src="${item.imageUrl || 'https://via.placeholder.com/400x300'}" 
                                 class="w-full h-full object-cover group-hover:scale-110 transition duration-500"
                                 onerror="this.src='https://via.placeholder.com/400x300?text=K-Hub+Listing'">
                            <span class="absolute top-4 left-4 ${badgeColor} text-[10px] font-bold px-3 py-1 rounded-full uppercase text-white shadow-lg">
                                ${item.type === 'transports' ? 'Transport' : item.type.replace('s', '')}
                            </span>
                        </div>
                        <div class="p-6">
                            <h4 class="text-lg font-bold mb-1 truncate">${title}</h4>
                            <p class="text-gray-400 text-sm mb-4 line-clamp-2">${item.description || 'New update available on K-Hub Kano.'}</p>
                            <div class="flex items-center justify-between border-t border-white/10 pt-4">
                                <span class="text-emerald-400 font-extrabold text-lg">₦${Number(price).toLocaleString()}</span>
                                <button onclick="window.location.href='listing-details.html?id=${item.id}&type=${item.type}'" 
                                        class="text-xs font-bold text-purple-400 bg-purple-500/10 px-4 py-2 rounded-xl hover:bg-purple-500 hover:text-white transition">
                                    View Info
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Search Logic
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allFetchedItems.filter(item => 
                (item.name || item.title || "").toLowerCase().includes(term) ||
                (item.description || "").toLowerCase().includes(term)
            );
            renderFeed(filtered);
            document.getElementById('load-more-btn').classList.add('hidden');
        });

        // Load More Logic
        document.getElementById('load-more-btn').addEventListener('click', function() {
            itemsToShow += 6;
            renderFeed(allFetchedItems.slice(0, itemsToShow));
            if (itemsToShow >= allFetchedItems.length) this.classList.add('hidden');
        });

        loadHomeFeed();
    </script>
</body>
</html>
