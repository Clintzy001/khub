<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub Admin | Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .chart-glow { box-shadow: 0 0 20px rgba(139, 92, 246, 0.15); }
    </style>
</head>
<body class="flex min-h-screen">
    <aside class="hidden lg:flex flex-col w-64 bg-black/40 border-r border-white/10 fixed h-full">
        </aside>

    <main class="flex-grow lg:ml-64 p-6 md:p-10">
        <header class="mb-10">
            <h1 class="text-2xl font-bold">Marketplace Insights</h1>
            <p class="text-sm text-gray-500">Kano State Growth Metrics & Revenue Funnel</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 glass-card p-8 rounded-3xl chart-glow">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold">Monthly Revenue (₦)</h3>
                    <select class="bg-white/5 border border-white/10 rounded-lg px-3 py-1 text-xs">
                        <option>Last 6 Months</option>
                        <option>Yearly</option>
                    </select>
                </div>
                <div class="h-64 w-full bg-gradient-to-t from-purple-500/10 to-transparent rounded-xl flex items-end gap-2 px-4 pb-2">
                    <div class="w-full bg-purple-500/20 h-1/3 rounded-t-lg"></div>
                    <div class="w-full bg-purple-500/40 h-1/2 rounded-t-lg"></div>
                    <div class="w-full bg-purple-500/60 h-2/3 rounded-t-lg"></div>
                    <div class="w-full bg-blue-500/80 h-3/4 rounded-t-lg animate-pulse"></div>
                    <div class="w-full bg-purple-500 h-full rounded-t-lg shadow-lg shadow-purple-500/50"></div>
                </div>
            </div>

            <div class="glass-card p-8 rounded-3xl">
                <h3 class="font-bold mb-6">Volume by Module</h3>
                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between text-xs mb-2"><span>Transport</span><span>42%</span></div>
                        <div class="w-full bg-white/5 h-2 rounded-full"><div class="bg-purple-500 h-full rounded-full" style="width: 42%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-xs mb-2"><span>Shop</span><span>35%</span></div>
                        <div class="w-full bg-white/5 h-2 rounded-full"><div class="bg-blue-500 h-full rounded-full" style="width: 35%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-xs mb-2"><span>Rentals</span><span>15%</span></div>
                        <div class="w-full bg-white/5 h-2 rounded-full"><div class="bg-emerald-500 h-full rounded-full" style="width: 15%"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
