<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Sell Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #3B82F6 0%, #2DD4BF 100%); }
        .input-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-xl mx-auto py-8">
        <h2 class="text-2xl font-bold mb-6">List a Product</h2>
        
        <form id="product-form" class="space-y-4 bg-white/5 p-6 rounded-3xl border border-white/10">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Item Name</label>
                <input type="text" id="p-name" required class="w-full input-box p-3 rounded-xl outline-none focus:border-blue-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Price (₦)</label>
                    <input type="number" id="p-price" required class="w-full input-box p-3 rounded-xl outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">LGA Location</label>
                    <input type="text" id="p-loc" required placeholder="Gwale" class="w-full input-box p-3 rounded-xl outline-none">
                </div>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Image Link</label>
                <input type="url" id="p-img" placeholder="https://..." class="w-full input-box p-3 rounded-xl outline-none">
            </div>
            <button type="submit" class="w-full py-4 neon-gradient rounded-xl font-bold mt-4">Post to Shop</button>
        </form>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if(!user) return alert("Please login first");

            try {
                await addDoc(collection(db, "products"), {
                    sellerId: user.uid,
                    name: document.getElementById('p-name').value,
                    price: document.getElementById('p-price').value,
                    location: document.getElementById('p-loc').value,
                    imageUrl: document.getElementById('p-img').value,
                    postedAt: new Date()
                });
                alert("Product is now Live!");
                window.location.href = "shop.html";
            } catch (err) { alert(err.message); }
        });
    </script>
</body>
</html>
