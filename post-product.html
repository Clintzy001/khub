<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Sell an Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; padding-bottom: 40px; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: 0.3s; }
        .input-field:focus { border-color: #8B5CF6; outline: none; background: rgba(255, 255, 255, 0.07); }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-8 h-8 neon-gradient rounded-lg flex items-center justify-center font-bold text-white">K</div>
            <span class="font-bold text-xl tracking-tight text-white">K-Hub</span>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-10">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-white">Sell Something</h1>
            <p class="text-gray-400">List your product in the Kano marketplace.</p>
        </div>

        <form id="product-form" class="space-y-6">
            <div class="glass-card p-6 rounded-3xl space-y-4">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase">Product Image</label>
                    <input type="file" id="product-image" accept="image/*" required class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-purple-600 file:text-white hover:file:bg-purple-700">
                    <div id="upload-status" class="text-[10px] text-purple-400"></div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase">Product Name</label>
                    <input type="text" id="p-name" placeholder="iPhone 13 Pro Max" required class="w-full input-field px-4 py-3 rounded-xl text-sm">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500 uppercase">Price (₦)</label>
                        <input type="number" id="p-price" placeholder="450000" required class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500 uppercase">Location (LGA)</label>
                        <input type="text" id="p-location" placeholder="Tarauni" required class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase">WhatsApp Number</label>
                    <input type="tel" id="p-phone" placeholder="08012345678" required class="w-full input-field px-4 py-3 rounded-xl text-sm">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-4 neon-gradient rounded-2xl font-bold shadow-lg shadow-purple-500/20 active:scale-95 transition text-white">
                Post to Marketplace
            </button>
        </form>
    </main>

    <script type="module">
        import { auth, db, storage, sendNotification } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        let currentUserId = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = 'k-hub-login.html';
            else currentUserId = user.uid;
        });

        // NEW: Notify Followers Logic
        async function notifyFollowers(authorId, itemName) {
            try {
                // Using "follows" to match the profile.html collection name
                const q = query(collection(db, "follows"), where("followingId", "==", authorId));
                const snap = await getDocs(q);

                const userName = auth.currentUser.displayName || "A seller you follow";
                
                snap.forEach((followerDoc) => {
                    const followerData = followerDoc.data();
                    sendNotification(
                        followerData.followerId,
                        'post',
                        'New Post from ' + userName + ' ✨',
                        `They just listed a new item: ${itemName}. Check it out!`
                    );
                });
            } catch (err) {
                console.error("Error notifying followers:", err);
            }
        }

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const statusLabel = document.getElementById('upload-status');
            const file = document.getElementById('product-image').files[0];
            const productName = document.getElementById('p-name').value;

            btn.disabled = true;
            btn.innerText = "Processing...";
            statusLabel.innerText = "Uploading to K-Hub storage...";

            try {
                // 1. Upload Image
                const storageRef = ref(storage, `products/${Date.now()}_${file.name}`);
                const uploadTask = await uploadBytes(storageRef, file);
                const photoURL = await getDownloadURL(uploadTask.ref);

                // 2. Save Product to Firestore
                await addDoc(collection(db, "products"), {
                    userId: currentUserId,
                    name: productName,
                    price: document.getElementById('p-price').value,
                    location: document.getElementById('p-location').value,
                    phone: document.getElementById('p-phone').value,
                    imageUrl: photoURL,
                    postedAt: serverTimestamp(),
                    status: 'active'
                });

                // 3. Trigger Private Notification for the Seller
                await sendNotification(
                    currentUserId, 
                    'post', 
                    'Listing Published! ✨', 
                    `Your item "${productName}" is now live in the marketplace.`
                );

                // 4. Trigger Global Notification for all Followers
                await notifyFollowers(currentUserId, productName);

                alert("Success! Your product is live and followers have been notified.");
                window.location.href = 'user-dashboard.html';

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.innerText = "Post to Marketplace";
            }
        });
    </script>
</body>
</html>
