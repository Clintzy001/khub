<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Find Jobs in Kano</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); margin: 0; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .btn-gradient { background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%); transition: all 0.3s ease; }
        .btn-gradient:hover { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); transform: translateY(-2px); }
        
        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #mobile-menu.active { transform: translateX(0); }

        .lang-dropdown { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 6px 10px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; outline: none; cursor: pointer; }
        .lang-dropdown option { background: #06080C; color: white; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #06080C; }
        ::-webkit-scrollbar-thumb { background: #1e1b4b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">

    <div id="mobile-menu" class="fixed inset-0 z-[200] bg-[#06080C]/98 backdrop-blur-2xl p-8 flex flex-col md:hidden">
        <div class="flex justify-between items-center mb-10">
            <span class="text-xl font-black text-purple-500 italic uppercase tracking-tighter">K-HUB MENU</span>
            <button onclick="toggleMenu()" class="text-white p-2 glass-panel">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div id="mobile-profile-card" class="mb-8"></div>
        <nav class="flex flex-col gap-6 text-xl font-bold uppercase tracking-widest italic">
            <a href="index.html" class="text-gray-400 lang-home">Home</a>
            <a href="job-search.html" class="text-white border-l-4 border-purple-500 pl-4 lang-jobs">Jobs</a>
            <a href="rentals.html" class="text-gray-400 lang-rentals">Rentals</a>
            <a href="shop.html" class="text-gray-400 lang-shop">Shop</a>
            <a href="transport.html" class="text-gray-400 lang-transport">Transport</a>
            <hr class="border-white/10 my-2">
            <div id="mobile-auth-section" class="flex flex-col gap-6"></div>
        </nav>
    </div>

    <div class="max-w-6xl mx-auto glass-panel p-6 md:p-10 relative overflow-hidden ring-1 ring-purple-500/20 shadow-2xl">
        <header class="flex justify-between items-center mb-12">
            <div class="flex flex-col items-center cursor-pointer z-10" onclick="window.location.href='index.html'">
                <svg class="w-12 h-12 mb-1" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#k-grad-shop)"/>
                    <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs><linearGradient id="k-grad-shop" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
                </svg>
                <h1 class="text-[10px] font-black italic tracking-tighter leading-none text-white uppercase">K-HUB</h1>
            </div>

            <nav class="hidden md:flex items-center gap-8 text-[11px] font-black text-gray-400 uppercase tracking-widest">
                <a href="index.html" class="hover:text-white transition lang-home">Home</a>
                <a href="job-search.html" class="text-white border-b-2 border-purple-500 pb-1 lang-jobs">Jobs</a>
                <a href="rentals.html" class="hover:text-white transition lang-rentals">Rentals</a>
                <a href="transport.html" class="hover:text-white transition lang-transport">Transport</a>
                <select id="lang-select-desktop" class="lang-dropdown ml-4 lang-select-sync">
                    <option value="en">English</option>
                    <option value="ha">Hausa</option>
                    <option value="ig">Igbo</option>
                    <option value="yo">Yoruba</option>
                </select>
            </nav>

            <div class="flex items-center gap-3">
                <select id="lang-select-mobile" class="lang-dropdown md:hidden lang-select-sync">
                    <option value="en">English</option>
                    <option value="ha">Hausa</option>
                    <option value="ig">Igbo</option>
                    <option value="yo">Yoruba</option>
                </select>
                <div id="desktop-auth-section" class="flex items-center"></div>
                <button onclick="toggleMenu()" class="md:hidden p-2.5 glass-panel z-50 border-white/10">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </header>

        <section class="mb-12">
            <h1 id="hero-title" class="text-3xl md:text-5xl font-black mb-10 tracking-tighter uppercase italic">Find Jobs in Kano</h1>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="glass-panel px-6 py-4 flex items-center bg-white/5 border-white/10">
                    <input type="text" id="job-title-search" placeholder="Search Role" class="bg-transparent w-full outline-none text-sm font-medium text-white">
                </div>
                <div class="glass-panel px-6 py-4 flex items-center bg-white/5 border-white/10">
                    <input type="text" id="category-search" placeholder="Category" class="bg-transparent w-full outline-none text-sm font-medium text-white">
                </div>
                <div class="glass-panel px-6 py-4 flex items-center bg-white/5 border-white/10">
                    <input type="text" id="location-search" placeholder="Location" class="bg-transparent w-full outline-none text-sm font-medium text-white">
                </div>
            </div>
        </section>

        <section class="mb-16">
            <h3 class="text-xs font-black mb-6 text-gray-500 uppercase tracking-[0.3em] lang-live-opps">Live Opportunities</h3>
            <div id="job-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="col-span-full text-center py-20 animate-pulse text-xs font-black uppercase text-gray-600">Scanning Kano Job Board...</div>
            </div>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center border-t border-white/5 pt-12">
            <div class="flex flex-col">
                <h3 class="text-xs font-black mb-6 text-gray-500 uppercase tracking-[0.3em] lang-employer-net">Employer Network</h3>
                <div class="flex gap-4">
                    <div class="w-10 h-10 rounded-lg bg-white/10 border border-white/10 flex items-center justify-center font-bold">TG</div>
                    <div class="w-10 h-10 rounded-lg bg-white/10 border border-white/10 flex items-center justify-center font-bold">KM</div>
                    <div class="w-10 h-10 rounded-lg bg-white/10 border border-white/10 flex items-center justify-center font-bold">HD</div>
                </div>
            </div>
            <div class="glass-panel p-8 text-center">
                <h4 id="hire-text" class="text-xl font-bold mb-2 uppercase italic">Looking to hire?</h4>
                <button onclick="window.location.href='user-dashboard.html'" class="btn-gradient px-8 py-3 rounded-xl text-xs font-black uppercase w-full mt-4 lang-post-job">Post a Job Vacancy</button>
            </div>
        </section>

        <footer class="mt-20 flex flex-col md:flex-row justify-between items-center text-[10px] text-gray-500 border-t border-white/5 pt-8">
            <div class="flex gap-6 uppercase font-bold tracking-widest">
                <a href="about.html" class="lang-about">About</a>
                <a href="contact.html" class="lang-contact">Contact</a>
            </div>
            <div class="font-bold uppercase tracking-widest py-4 md:py-0 text-white">© 2026 K-HUB</div>
            <div class="flex gap-4">
                <span class="w-6 h-6 rounded-full glass-panel flex items-center justify-center">𝕏</span>
                <span class="w-6 h-6 rounded-full glass-panel flex items-center justify-center italic">IG</span>
            </div>
        </footer>
    </div>

    <script type="module">
        import { auth, db, collection, getDocs, query, orderBy, signOut } from './firebase-config.js';
        import { initAdminLogic } from './admin-guard.js';

        initAdminLogic('jobs');

        window.toggleMenu = () => {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        };

        const translations = {
            en: { home: "Home", jobs: "Jobs", rentals: "Rentals", shop: "Shop", transport: "Transport", title: "Find Jobs in Kano", hire: "Looking to hire?", post: "Post a Job Vacancy", opps: "Live Opportunities", net: "Employer Network", about: "About", contact: "Contact", phRole: "Search Role", phCat: "Category", phLoc: "Location" },
            ha: { home: "Gida", jobs: "Ayyuka", rentals: "Gidajen Haya", shop: "Shago", transport: "Sufuri", title: "Nemi Ayyuka a Kano", hire: "Kana neman ma'aikata?", post: "Sanya Sanarwar Aiki", opps: "Ayyukan Da Akwai", net: "Hanyoyin Ma'aikata", about: "Game da Mu", contact: "Tuntube Mu", phRole: "Nemi matsayi", phCat: "Bangare", phLoc: "Wuri" },
            ig: { home: "Ụlọ", jobs: "Ọrụ", rentals: "Ụlọ Mbiri", shop: "Ụlọ Ahịa", transport: "Ụgbọ", title: "Chọta Ọrụ na Kano", hire: "Ị na-achọ ndị ọrụ?", post: "Zipụ ohere ọrụ", opps: "Ọrụ dị ugbu a", net: "Ndị Na-ewe Ọrụ", about: "Gbasara anyị", contact: "Kpọtụrụ anyị", phRole: "Chọọ ọrụ", phCat: "Ụdị", phLoc: "Ebe" },
            yo: { home: "Ilé", jobs: "Iṣẹ́", rentals: "Ilé Yáya", shop: "Ilé Ìtajà", transport: "Ọkọ̀", title: "Wá Iṣẹ́ ní Kano", hire: "Ṣé o fẹ́ gba òṣìṣẹ́?", post: "Fi iṣẹ́ sílẹ̀", opps: "Iṣẹ́ tó wà lárọ̀ọ́wọ́tó", net: "Àkójọpọ̀ Olùgbaniṣiṣẹ́", about: "Nípa wa", contact: "Kàn sí wa", phRole: "Wá iṣẹ́", phCat: "Irúfẹ́", phLoc: "Agbègbè" }
        };

        // GLOBAL SYNC Logic
        window.applyLanguage = function(lang) {
            localStorage.setItem('kHubLang', lang); // Save for other pages
            const l = translations[lang];
            
            document.querySelectorAll('.lang-home').forEach(el => el.innerText = l.home);
            document.querySelectorAll('.lang-jobs').forEach(el => el.innerText = l.jobs);
            document.querySelectorAll('.lang-rentals').forEach(el => el.innerText = l.rentals);
            document.querySelectorAll('.lang-shop').forEach(el => el.innerText = l.shop);
            document.querySelectorAll('.lang-transport').forEach(el => el.innerText = l.transport);
            document.querySelectorAll('.lang-about').forEach(el => el.innerText = l.about);
            document.querySelectorAll('.lang-contact').forEach(el => el.innerText = l.contact);
            
            document.getElementById('hero-title').innerText = l.title;
            document.getElementById('hire-text').innerText = l.hire;
            document.querySelector('.lang-post-job').innerText = l.post;
            document.querySelector('.lang-live-opps').innerText = l.opps;
            document.querySelector('.lang-employer-net').innerText = l.net;
            
            document.getElementById('job-title-search').placeholder = l.phRole;
            document.getElementById('category-search').placeholder = l.phCat;
            document.getElementById('location-search').placeholder = l.phLoc;

            // Sync all dropdowns on this page
            document.querySelectorAll('.lang-select-sync').forEach(select => select.value = lang);
        };

        // Listen for user clicks
        document.querySelectorAll('.lang-select-sync').forEach(select => {
            select.addEventListener('change', (e) => window.applyLanguage(e.target.value));
        });

        // AUTO-LOAD saved language
        window.addEventListener('load', () => {
            const savedLang = localStorage.getItem('kHubLang') || 'en';
            window.applyLanguage(savedLang);
        });

        auth.onAuthStateChanged(user => {
            const desktopSection = document.getElementById('desktop-auth-section');
            const mobileSection = document.getElementById('mobile-auth-section');
            const mobileProfile = document.getElementById('mobile-profile-card');

            if (user) {
                const userInitials = user.email.charAt(0).toUpperCase();
                const userPhoto = user.photoURL || `https://ui-avatars.com/api/?name=${userInitials}&background=8B5CF6&color=fff`;

                desktopSection.innerHTML = `
                    <div class="flex items-center gap-3">
                        <button onclick="window.location.href='user-dashboard.html'" class="text-[10px] font-black uppercase text-purple-400 border border-purple-400/30 px-5 py-2 rounded-full hover:bg-purple-600 hover:text-white transition">Dashboard</button>
                        <img src="${userPhoto}" class="w-9 h-9 rounded-full border border-purple-500/50 cursor-pointer" onclick="window.location.href='user-dashboard.html'">
                    </div>`;

                mobileProfile.innerHTML = `
                    <div class="glass-panel p-4 flex items-center gap-4 border-purple-500/30">
                        <img src="${userPhoto}" class="w-14 h-14 rounded-full border-2 border-purple-500">
                        <div class="overflow-hidden">
                            <p class="text-xs text-purple-400 font-black uppercase tracking-widest truncate">${user.email}</p>
                            <a href="user-dashboard.html" class="text-[10px] text-gray-500 underline uppercase font-bold">Account Settings</a>
                        </div>
                    </div>`;

                mobileSection.innerHTML = `<button id="mobile-logout-btn" class="text-red-500 text-left pl-4 font-black uppercase tracking-widest">Sign Out</button>`;
            } else {
                desktopSection.innerHTML = `<button onclick="window.location.href='k-hub-login.html'" class="btn-gradient px-6 py-2.5 rounded-full text-[10px] font-black uppercase">Login</button>`;
                mobileSection.innerHTML = `<a href="k-hub-login.html" class="text-purple-400 pl-4 font-black uppercase tracking-widest">Login / Register</a>`;
            }

            document.getElementById('mobile-logout-btn')?.addEventListener('click', () => signOut(auth).then(() => window.location.reload()));
        });

        async function fetchJobs() {
            try {
                const q = query(collection(db, "jobs"), orderBy("serverTimestamp", "desc"));
                const snapshot = await getDocs(q);
                const container = document.getElementById('job-container');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const j = doc.data();
                    container.innerHTML += `
                        <div class="glass-panel p-4 border-white/5 hover:border-purple-500/50 transition relative">
                            <button onclick="adminDeleteAny('${doc.id}')" class="admin-only hidden absolute top-2 right-2 bg-red-600 p-1.5 rounded-full text-[8px] z-50">🗑️</button>
                            <h4 class="text-sm font-bold uppercase truncate italic">${j.title}</h4>
                            <p class="text-[10px] text-purple-400 font-black mt-1">₦${Number(j.salary).toLocaleString()}</p>
                            <button onclick="window.open('https://wa.me/${j.phone}', '_blank')" class="w-full mt-4 py-2 bg-white/5 rounded-lg text-[9px] font-black uppercase hover:bg-purple-600 transition italic">Contact</button>
                        </div>`;
                });
            } catch (e) { console.error(e); }
        }
        fetchJobs();
    </script>
</body>
</html>
