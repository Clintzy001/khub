<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Post a New Job</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; color: white; }
        .input-field:focus { border-color: #8B5CF6; outline: none; background: rgba(255, 255, 255, 0.07); box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-[#0B0E14]/80 backdrop-blur-md border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="20" fill="url(#logoGrad)"/>
                    <path d="M14 12V28M14 20L24 12M14 20L24 28" stroke="white" stroke-width="3" stroke-linecap="round"/>
                    <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
                </svg>
                <span class="text-xl font-bold tracking-tight">K-Hub</span>
            </div>
            <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="job-search.html" class="hover:text-purple-400 transition">Jobs</a>
                <a href="rentals.html" class="hover:text-purple-400 transition">Rentals</a>
                <a href="shop.html" class="hover:text-purple-400 transition">Shop</a>
                <a href="transport.html" class="hover:text-purple-400 transition">Transport</a>
            </nav>
            <div class="flex items-center gap-4">
                <button id="logout-btn" class="hidden sm:block text-[10px] bg-white/10 px-4 py-2 rounded-xl font-bold hover:bg-red-500/20 transition">Logout</button>
                <div onclick="window.location.href='user-dashboard.html'" class="w-9 h-9 rounded-full bg-purple-600 flex items-center justify-center font-bold cursor-pointer">U</div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="mb-8 text-center md:text-left">
            <h1 class="text-2xl md:text-3xl font-bold">Post a Job</h1>
            <p class="text-gray-400 text-sm mt-1">Fill in the details to find your next hire in Kano.</p>
        </div>

        <form id="job-form" class="space-y-6">
            <section class="glass-card p-5 md:p-8 rounded-3xl space-y-5">
                <h2 class="text-sm font-bold text-purple-400 uppercase tracking-widest">1. Basic Details</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Job Title</label>
                        <input type="text" id="title" required placeholder="Software Developer" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Category</label>
                        <select id="category" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                            <option value="Technology">Technology</option>
                            <option value="Finance">Finance</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Education">Education</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Type</label>
                        <select id="type" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                            <option value="Full-time">Full-time</option>
                            <option value="Part-time">Part-time</option>
                            <option value="Contract">Contract</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Location (LGA)</label>
                        <input type="text" id="location" required placeholder="Kano Municipal" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Salary (₦)</label>
                        <input type="number" id="salary" required placeholder="50000" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                </div>
            </section>

            <section class="glass-card p-5 md:p-8 rounded-3xl space-y-5">
                <h2 class="text-sm font-bold text-purple-400 uppercase tracking-widest">2. Requirements</h2>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Description</label>
                    <textarea id="description" required rows="4" placeholder="Job responsibilities..." class="w-full input-field px-4 py-3 rounded-xl text-sm"></textarea>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-500 uppercase">Qualifications</label>
                    <textarea id="qualifications" required rows="3" placeholder="Skills, Degrees..." class="w-full input-field px-4 py-3 rounded-xl text-sm"></textarea>
                </div>
            </section>

            <div class="flex flex-col gap-3">
                <button type="submit" class="w-full py-4 neon-gradient rounded-2xl font-bold shadow-lg shadow-purple-500/20 active:scale-95 transition">
                    Publish Job Listing
                </button>
                <button type="button" onclick="window.location.href='user-dashboard.html'" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-bold text-sm">
                    Cancel
                </button>
            </div>
        </form>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-[#0B0E14]/90 backdrop-blur-md border-t border-white/10 md:hidden z-50">
        <div class="flex justify-around items-center h-16">
            <a href="index.html" class="flex flex-col items-center text-[10px] text-gray-400">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span>Home</span>
            </a>
            <a href="job-search.html" class="flex flex-col items-center text-[10px] text-purple-400">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <span>Jobs</span>
            </a>
            <a href="user-dashboard.html" class="flex flex-col items-center text-[10px] text-gray-400">
                <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span>You</span>
            </a>
        </div>
    </nav>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let currentUserId = null;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'k-hub-login.html';
            } else {
                currentUserId = user.uid;
            }
        });

        const jobForm = document.getElementById('job-form');
        jobForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Changed 'employerId' to 'userId' to match Security Rules requirements
            const jobData = {
                userId: currentUserId, 
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                type: document.getElementById('type').value,
                location: document.getElementById('location').value,
                salary: document.getElementById('salary').value,
                description: document.getElementById('description').value,
                qualifications: document.getElementById('qualifications').value,
                postedAt: new Date(),
                status: 'active'
            };

            try {
                await addDoc(collection(db, "jobs"), jobData);
                alert("Job Posted Successfully!");
                window.location.href = 'user-dashboard.html';
            } catch (error) {
                alert("Error: " + error.message);
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        });
    </script>
</body>
</html>
