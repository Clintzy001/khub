<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Post a New Job</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-field { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
        .input-field:focus { border-color: #8B5CF6; outline: none; background: rgba(255, 255, 255, 0.07); box-shadow: 0 0 10px rgba(139, 92, 246, 0.2); }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="flex items-center justify-between px-6 py-4 max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
            <svg width="35" height="35" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="20" fill="url(#logoGrad)"/>
                <path d="M14 12V28M14 20L24 12M14 20L24 28" stroke="white" stroke-width="3" stroke-linecap="round"/>
                <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
            </svg>
            <span class="text-xl font-bold tracking-tight">K-Hub <span class="text-xs font-normal text-purple-400">Employers</span></span>
        </div>
        <nav class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
            <a href="dashboard.html" class="hover:text-white transition">Dashboard</a>
            <a href="#" class="text-white">Post Listing</a>
            <a href="#" class="hover:text-white transition">Hire Talent</a>
        </nav>
        <button class="px-5 py-2 rounded-xl bg-white/10 text-xs font-bold hover:bg-white hover:text-black transition">Logout</button>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="mb-10">
            <h1 class="text-3xl font-bold">Post a New Job</h1>
            <p class="text-gray-400 mt-2">Reach thousands of qualified candidates in Kano.</p>
        </div>

        <form class="space-y-8">
            <section class="glass-card p-6 md:p-8 rounded-3xl space-y-6">
                <h2 class="text-lg font-bold text-purple-400 mb-4">1. Basic Job Details</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Job Title</label>
                        <input type="text" placeholder="e.g. Senior Software Engineer" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Job Category</label>
                        <select class="w-full input-field px-4 py-3 rounded-xl text-sm appearance-none">
                            <option>Technology</option>
                            <option>Finance</option>
                            <option>Healthcare</option>
                            <option>Education</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Job Type</label>
                        <select class="w-full input-field px-4 py-3 rounded-xl text-sm">
                            <option>Full-time</option>
                            <option>Part-time</option>
                            <option>Remote</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Location (LGA)</label>
                        <input type="text" placeholder="e.g. Dala" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Salary (₦ / mo)</label>
                        <input type="number" placeholder="e.g. 150000" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                </div>
            </section>

            <section class="glass-card p-6 md:p-8 rounded-3xl space-y-6">
                <h2 class="text-lg font-bold text-purple-400 mb-4">2. Job Description & Requirements</h2>
                
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase">Description</label>
                    <textarea rows="6" placeholder="Describe the role, day-to-day tasks, and team culture..." class="w-full input-field px-4 py-3 rounded-xl text-sm"></textarea>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase">Requirements</label>
                    <textarea rows="4" placeholder="List skills, certifications, or experience required..." class="w-full input-field px-4 py-3 rounded-xl text-sm"></textarea>
                </div>
            </section>

            <section class="glass-card p-6 md:p-8 rounded-3xl space-y-6">
                <h2 class="text-lg font-bold text-purple-400 mb-4">3. Application Settings</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">How to Apply</label>
                        <input type="text" placeholder="Email address or link" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">Deadline</label>
                        <input type="date" class="w-full input-field px-4 py-3 rounded-xl text-sm">
                    </div>
                </div>
            </section>

            <div class="flex flex-col md:flex-row gap-4 pt-4">
                <button type="button" class="flex-1 px-8 py-4 bg-white/5 border border-white/10 rounded-2xl font-bold hover:bg-white/10 transition">Preview Job</button>
                <button type="submit" class="flex-1 px-8 py-4 neon-gradient rounded-2xl font-bold shadow-lg shadow-purple-500/20 hover:scale-[1.01] active:scale-95 transition">Submit Posting</button>
            </div>
        </form>
    </main>

    <footer class="mt-20 border-t border-white/10 py-10 px-6 text-center text-xs text-gray-500">
        <p>Postings are subject to verification | Made for Kano | © 2026 K-Hub</p>
    </footer>

</body>
</html>
