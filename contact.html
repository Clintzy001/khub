<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | K-HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        input, textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        .btn-gradient { background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%); }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-3xl mx-auto glass-panel p-8 md:p-12">
        <h1 class="text-4xl font-black mb-2 tracking-tighter italic">GET IN TOUCH</h1>
        <p class="text-purple-400 text-xs font-bold uppercase tracking-widest mb-10">We usually respond within 24 hours</p>

        <form class="space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] uppercase font-black text-gray-500">Full Name</label>
                    <input type="text" class="rounded-xl p-4 outline-none focus:ring-1 ring-purple-500">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] uppercase font-black text-gray-500">Email Address</label>
                    <input type="email" class="rounded-xl p-4 outline-none focus:ring-1 ring-purple-500">
                </div>
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[10px] uppercase font-black text-gray-500">Message</label>
                <textarea rows="5" class="rounded-xl p-4 outline-none focus:ring-1 ring-purple-500"></textarea>
            </div>
            <button type="submit" class="btn-gradient w-full py-4 rounded-xl font-black uppercase tracking-widest">Send Message</button>
        </form>

        <div class="mt-12 pt-8 border-t border-white/5 flex flex-col md:flex-row gap-8 justify-between text-xs text-gray-500">
            <div>
                <p class="font-black text-white">OFFICE</p>
                <p>Kano State, Nigeria</p>
            </div>
            <div>
                <p class="font-black text-white">EMAIL</p>
                <p>support@k-hub.com</p>
            </div>
        </div>
    </div>
</body>
</html>
