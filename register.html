<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Join the Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { 
            background-color: #06080C; color: white; font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px;
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus { border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }
        .role-card { 
            border: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .role-card.active { border-color: var(--neon-purple); background: rgba(139, 92, 246, 0.15); transform: scale(1.05); }
        .btn-gradient {
            background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%);
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4);
        }
        .lang-dropdown { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 6px 10px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; outline: none; cursor: pointer; }
    </style>
</head>
<body class="p-6 py-12">

    <div class="max-w-3xl w-full">
        <div class="flex flex-col items-center mb-8 cursor-pointer" onclick="window.location.href='index.html'">
            <svg class="w-12 h-12 mb-3" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="10" fill="url(#k-grad)"/>
                <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                <defs><linearGradient id="k-grad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
            </svg>
            <h1 class="text-2xl font-black italic tracking-tighter leading-none">K-HUB</h1>
        </div>

        <div class="glass-panel p-8 md:p-10 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-blue-500"></div>
            
            <div class="absolute top-4 right-6">
                <select id="lang-select" class="lang-dropdown lang-select-dropdown" onchange="applyLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="ha">Hausa</option>
                    <option value="ig">Igbo</option>
                    <option value="yo">Yoruba</option>
                </select>
            </div>

            <div class="text-center mb-10 mt-4">
                <h2 class="text-2xl font-black tracking-tight uppercase italic lang-join">Join the <span class="text-purple-500">Community</span></h2>
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2 lang-select-role">Select your role to get started</p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-10">
                <button onclick="selectRole('user')" class="role-card p-4 rounded-2xl bg-white/5 text-center active" id="btn-user">
                    <span class="text-2xl block mb-2">👤</span>
                    <span class="text-[9px] font-black uppercase tracking-widest lang-role-user">User</span>
                </button>
                <button onclick="selectRole('employer')" class="role-card p-4 rounded-2xl bg-white/5 text-center" id="btn-employer">
                    <span class="text-2xl block mb-2">💼</span>
                    <span class="text-[9px] font-black uppercase tracking-widest lang-role-employer">Employer</span>
                </button>
                <button onclick="selectRole('seller')" class="role-card p-4 rounded-2xl bg-white/5 text-center" id="btn-seller">
                    <span class="text-2xl block mb-2">🛍️</span>
                    <span class="text-[9px] font-black uppercase tracking-widest lang-role-seller">Seller</span>
                </button>
                <button onclick="selectRole('landlord')" class="role-card p-4 rounded-2xl bg-white/5 text-center" id="btn-landlord">
                    <span class="text-2xl block mb-2">🏠</span>
                    <span class="text-[9px] font-black uppercase tracking-widest lang-role-landlord">Landlord</span>
                </button>
                <button onclick="selectRole('driver')" class="role-card p-4 rounded-2xl bg-white/5 text-center" id="btn-driver">
                    <span class="text-2xl block mb-2">🚕</span>
                    <span class="text-[9px] font-black uppercase tracking-widest lang-role-driver">Driver</span>
                </button>
            </div>

            <form class="space-y-6" id="registration-form">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest lang-label-name">Full Name</label>
                        <input type="text" id="reg-name" required class="w-full input-field rounded-2xl px-5 py-4 text-sm font-medium outline-none" placeholder="Enter Full Name">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest lang-label-email">Email Address</label>
                        <input type="email" id="reg-email" required class="w-full input-field rounded-2xl px-5 py-4 text-sm font-medium outline-none" placeholder="email@k-hub.ng">
                    </div>
                </div>

                <div id="extra-field" class="hidden space-y-2">
                    <label id="extra-label" class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Business Detail</label>
                    <input type="text" id="reg-extra" class="w-full input-field rounded-2xl px-5 py-4 text-sm font-medium outline-none" placeholder="Provide details">
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest lang-label-pass">Security Key (Password)</label>
                    <input type="password" id="reg-password" required class="w-full input-field rounded-2xl px-5 py-4 text-sm font-medium outline-none" placeholder="••••••••••••">
                </div>

                <button type="submit" id="reg-submit-btn" class="w-full btn-gradient py-5 rounded-2xl text-[11px] font-black uppercase tracking-[0.3em] transition mt-4 lang-init-btn">
                    Initialize Account
                </button>

                <p class="text-center text-[10px] text-gray-500 font-bold uppercase tracking-widest">
                    <span class="lang-have-account">Already have an account?</span> <a href="k-hub-login.html" class="text-purple-400 hover:underline lang-auth-here">Authorize Here</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        // Language Logic
        const translations = {
            en: { join: "Join the Community", select: "Select your role to get started", name: "Full Name", email: "Email Address", pass: "Security Key (Password)", init: "Initialize Account", have: "Already have an account?", auth: "Authorize Here", user: "User", emp: "Employer", sel: "Seller", land: "Landlord", dri: "Driver" },
            ha: { join: "Kasance da Mu", select: "Zaɓi matsayinka don farawa", name: "Cikakken Suna", email: "Adireshin Imel", pass: "Kalmar Sirri", init: "Bude Asusunka", have: "Kana da asusu riga?", auth: "Shiga Nan", user: "Mutum", emp: "Mai Ma'aikata", sel: "Mai Shago", land: "Mai Gida", dri: "Direba" },
            ig: { join: "Soro Obodo", select: "Họrọ ọrụ gị ka ịmalite", name: "Aha zuru ezu", email: "Adreesị ozi-e", pass: "Igodo nchekwa", init: "Malite Akaụntụ", have: "Ị nwere akaụntụ riga?", auth: "Banye ebe a", user: "Onye ọrụ", emp: "Onye ọrụ", sel: "Onye na-ere ahịa", land: "Onye nwe ụlọ", dri: "Onye na-anya ụgbọ ala" },
            yo: { join: "Darapọ mọ wa", select: "Yan ipa rẹ lati bẹrẹ", name: "Orukọ Kikun", email: "Adirẹsi Imeeli", pass: "Ọrọigbaniwọle", init: "Ṣẹda Akọọlẹ", have: "Ṣe o ti ni akọọlẹ tẹlẹ?", auth: "Wọle nihin", user: "Olumulo", emp: "Oga", sel: "Olutaja", land: "Onile", dri: "Awakọ" }
        };

        function applyLanguage(lang) {
            const l = translations[lang];
            document.querySelector('.lang-join').innerHTML = l.join.replace('Community', `<span class="text-purple-500">Community</span>`);
            document.querySelector('.lang-select-role').innerText = l.select;
            document.querySelector('.lang-label-name').innerText = l.name;
            document.querySelector('.lang-label-email').innerText = l.email;
            document.querySelector('.lang-label-pass').innerText = l.pass;
            document.querySelector('.lang-init-btn').innerText = l.init;
            document.querySelector('.lang-have-account').innerText = l.have;
            document.querySelector('.lang-auth-here').innerText = l.auth;
            document.querySelector('.lang-role-user').innerText = l.user;
            document.querySelector('.lang-role-employer').innerText = l.emp;
            document.querySelector('.lang-role-seller').innerText = l.sel;
            document.querySelector('.lang-role-landlord').innerText = l.land;
            document.querySelector('.lang-role-driver').innerText = l.dri;
            
            localStorage.setItem('kHubLang', lang);
            document.getElementById('lang-select').value = lang;
        }

        function selectRole(role) {
            document.querySelectorAll('.role-card').forEach(el => el.classList.remove('active'));
            document.getElementById('btn-' + role).classList.add('active');
            
            const extraField = document.getElementById('extra-field');
            const extraLabel = document.getElementById('extra-label');
            const extraInput = document.getElementById('reg-extra');

            if (role === 'user') {
                extraField.classList.add('hidden');
            } else {
                extraField.classList.remove('hidden');
                switch(role) {
                    case 'employer': extraLabel.innerText = "Company Name"; extraInput.placeholder = "e.g. Kano Tech Solutions"; break;
                    case 'seller': extraLabel.innerText = "Shop Name"; extraInput.placeholder = "e.g. Sabon Gari Boutique"; break;
                    case 'landlord': extraLabel.innerText = "Property/Agency Name"; extraInput.placeholder = "e.g. K-Hub Real Estate"; break;
                    case 'driver': extraLabel.innerText = "Driving License Number"; extraInput.placeholder = "e.g. KANO-12345-ABC"; break;
                }
            }
        }

        // Initialize saved language
        window.addEventListener('load', () => {
            applyLanguage(localStorage.getItem('kHubLang') || 'en');
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeW7PFz9wntXO0OUj9N5V1DdkUxxI2VkQ",
            authDomain: "k-hub-b4d8f.firebaseapp.com",
            projectId: "k-hub-b4d8f",
            storageBucket: "k-hub-b4d8f.firebasestorage.app",
            messagingSenderId: "117649715938",
            appId: "1:117649715938:web:7768d7b4d27d66e8ba24bb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const regForm = document.getElementById('registration-form');

        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-submit-btn');
            btn.innerText = "...";
            btn.disabled = true;

            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const fullName = document.getElementById('reg-name').value;
            const extraDetail = document.getElementById('reg-extra').value;
            
            const activeRoleCard = document.querySelector('.role-card.active');
            const role = activeRoleCard ? activeRoleCard.id.replace('btn-', '') : 'user';

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    fullName: fullName,
                    email: email,
                    role: role,
                    businessName: (role !== 'user' && role !== 'driver') ? extraDetail : '',
                    licenseNumber: role === 'driver' ? extraDetail : '',
                    isVerified: role === 'driver' ? false : true,
                    createdAt: new Date(),
                    isAdmin: false // Security: default to false
                });

                window.location.href = "user-dashboard.html";
            } catch (error) {
                alert("Error: " + error.message);
                btn.innerText = "Initialize Account";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
