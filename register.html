<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Join the Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .role-card { transition: all 0.3s ease; border: 2px solid transparent; }
        .role-card.active { border-color: #8B5CF6; background: rgba(139, 92, 246, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen py-10 px-6">
    <div class="max-w-2xl w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold">Create your K-Hub Account</h1>
            <p class="text-gray-400 mt-2">Select how you want to use the platform</p>
        </div>

        <div class="glass-card p-8 rounded-3xl">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <button onclick="selectRole('user')" class="role-card p-4 rounded-2xl bg-white/5 text-center active" id="btn-user">
                    <span class="text-2xl block mb-2">👤</span>
                    <span class="text-[10px] font-bold uppercase">User</span>
                </button>
                <button onclick="selectRole('employer')" class="role-card p-4 rounded-2xl bg-white/5 text-center" id="btn-employer">
                    <span class="text-2xl block mb-2">💼</span>
                    <span class="text-[10px] font-bold uppercase">Employer</span>
                </button>
                <button onclick="selectRole('seller')" class="role-card p-4 rounded-2xl bg-white/5 text-center" id="btn-seller">
                    <span class="text-2xl block mb-2">🛍️</span>
                    <span class="text-[10px] font-bold uppercase">Seller</span>
                </button>
                <button onclick="selectRole('landlord')" class="role-card p-4 rounded-2xl bg-white/5 text-center" id="btn-landlord">
                    <span class="text-2xl block mb-2">🏠</span>
                    <span class="text-[10px] font-bold uppercase">Landlord</span>
                </button>
            </div>

            <form class="space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500 uppercase">Full Name</label>
                        <input type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500" placeholder="John Doe">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500 uppercase">Email Address</label>
                        <input type="email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500" placeholder="john@example.com">
                    </div>
                </div>

                <div id="business-field" class="hidden space-y-2">
                    <label id="business-label" class="text-xs font-bold text-gray-500 uppercase">Business/Company Name</label>
                    <input type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500" placeholder="Enter name">
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-500 uppercase">Password</label>
                    <input type="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full py-4 neon-gradient rounded-2xl font-bold mt-4 shadow-lg shadow-purple-500/20">Sign Up</button>
            </form>
        </div>
    </div>

    <script>
        function selectRole(role) {
            // Reset all
            document.querySelectorAll('.role-card').forEach(el => el.classList.remove('active'));
            document.getElementById('business-field').classList.add('hidden');
            
            // Activate selected
            document.getElementById('btn-' + role).classList.add('active');
            
            if (role !== 'user') {
                document.getElementById('business-field').classList.remove('hidden');
                const label = document.getElementById('business-label');
                if (role === 'employer') label.innerText = "Company Name";
                if (role === 'seller') label.innerText = "Shop Name";
                if (role === 'landlord') label.innerText = "Agency/Property Name";
            }
        }
    </script>
</body>
</html>
