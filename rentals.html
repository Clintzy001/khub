<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Browse Rental Listings in Kano</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/609/609803.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .btn-gradient { background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%); transition: all 0.3s ease; }
        
        #map-container { height: 0; overflow: hidden; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; border-radius: 24px; border: 1px solid rgba(139, 92, 246, 0.2); }
        #map-container.active { height: 400px; opacity: 1; margin: 1.5rem 0; }
        #map { height: 100%; width: 100%; z-index: 10; }
        
        .leaflet-tile { filter: brightness(0.4) invert(1) contrast(3) hue-rotate(200deg) saturate(0.2); }
        .leaflet-container { background: #06080C !important; }

        .filter-tab { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 18px; border-radius: 12px; font-size: 11px; font-weight: 700; transition: all 0.3s; cursor: pointer; text-transform: uppercase; }
        .filter-tab.active { background: var(--neon-purple); border-color: var(--neon-purple); box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }

        /* Mobile Bottom Nav */
        .bottom-nav { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 64px; z-index: 1000; display: flex; justify-content: space-around; align-items: center; background: rgba(15, 15, 20, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; text-decoration: none; transition: 0.3s; }
        .nav-item.active { color: #A855F7; }
        .nav-item svg { width: 20px; height: 20px; margin-bottom: 2px; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #06080C; }
        ::-webkit-scrollbar-thumb { background: #1e1b4b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="bottom-nav md:hidden">
        <a href="index.html" class="nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span>Home</span>
        </a>
        <a href="shop.html" class="nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span>Shop</span>
        </a>
        <a href="rentals.html" class="nav-item active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            <span>Rent</span>
        </a>
        <a href="user-dashboard.html" class="nav-item">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span>Profile</span>
        </a>
    </div>

    <div class="max-w-7xl mx-auto glass-panel p-6 md:p-10 relative shadow-2xl ring-1 ring-white/5">
        
        <header class="flex justify-between items-center mb-12">
            <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
                <svg class="w-12 h-12 mb-1" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#k-grad-shop)"/>
                    <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="k-grad-shop" x1="0" y1="0" x2="40" y2="40">
                            <stop stop-color="#8B5CF6"/>
                            <stop offset="1" stop-color="#3B82F6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1 class="text-[10px] font-black italic tracking-tighter leading-none">K-HUB</h1>
            </div>
            
            <nav class="hidden md:flex gap-8 text-[11px] font-black text-gray-400 uppercase tracking-widest">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="job-search.html" class="hover:text-white transition">Jobs</a>
                <a href="rentals.html" class="text-white border-b-2 border-purple-500 pb-1">Rent</a>
                <a href="shop.html" class="hover:text-white transition">Shop</a>
                <a href="transport.html" class="hover:text-white transition">Transport</a>
            </nav>

            <div id="desktop-auth-section" class="hidden md:block"></div>
        </header>

        <section class="mb-12">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
                <div class="w-full max-w-lg">
                    <h2 class="text-4xl font-black uppercase italic tracking-tighter mb-4">Browse Rentals</h2>
                    <div class="glass-panel px-6 py-4 flex items-center bg-white/5 border-white/10 focus-within:border-purple-500/50 transition">
                        <input type="text" id="location-search" placeholder="Search area (e.g. Nassarawa)" class="bg-transparent w-full outline-none text-sm text-white">
                        <span class="opacity-50">🔍</span>
                    </div>
                </div>
                <button id="toggle-map-btn" class="w-full md:w-auto px-8 py-4 rounded-2xl btn-gradient text-[11px] font-black uppercase tracking-widest shadow-xl shadow-purple-500/20 flex items-center justify-center gap-2">
                    <span id="map-btn-text">Open Live Map</span> 🗺️
                </button>
            </div>

            <div id="map-container">
                <div id="map"></div>
            </div>

            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mt-8">
                <div class="flex flex-wrap gap-2" id="category-filters">
                    <div class="filter-tab active" data-category="All">All</div>
                    <div class="filter-tab" data-category="Apartment">Apartments</div>
                    <div class="filter-tab" data-category="Office">Offices</div>
                </div>

                <div class="flex items-center gap-4 bg-white/5 p-2 rounded-2xl border border-white/5 w-full md:w-auto justify-between">
                    <div class="flex items-center gap-2 px-2 w-full">
                        <span class="text-[9px] font-black text-gray-500 uppercase">Max:</span>
                        <span class="text-[11px] font-bold text-purple-400 min-w-[35px]" id="priceVal">5.0M</span>
                        <input type="range" min="50000" max="5000000" step="50000" id="priceRange" value="5000000" class="flex-grow md:w-24 accent-purple-500">
                    </div>
                </div>
            </div>
        </section>

        <div id="rentals-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 min-h-[400px]"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { auth, db, collection, getDocs, limit, query, orderBy, where } from './firebase-config.js';

        let currentCategory = 'All';
        const grid = document.getElementById('rentals-grid');
        const mapContainer = document.getElementById('map-container');
        const searchInput = document.getElementById('location-search');
        const priceRange = document.getElementById('priceRange');

        // --- UI REFINEMENTS ---
        const highlightActiveNav = () => {
            const path = window.location.pathname.split("/").pop() || "index.html";
            document.querySelectorAll('.nav-item').forEach(item => {
                if(item.getAttribute('href') === path) item.classList.add('active');
                else item.classList.remove('active');
            });
        };

        // --- MAP LOGIC ---
        let map, markersLayer;
        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([12.0022, 8.5920], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markersLayer = L.layerGroup().addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
        }

        document.getElementById('toggle-map-btn').onclick = () => {
            const isActive = mapContainer.classList.toggle('active');
            document.getElementById('map-btn-text').innerText = isActive ? "Close Map View" : "Open Live Map";
            if (isActive) { 
                initMap(); 
                setTimeout(() => map.invalidateSize(), 400); 
            }
        };

        // --- FETCH & FILTER ---
        async function fetchRentals() {
            grid.innerHTML = '<div class="col-span-full text-center py-20 opacity-50 uppercase font-black animate-pulse">Syncing with Kano...</div>';
            const maxPrice = Number(priceRange.value);
            const searchText = searchInput.value.toLowerCase().trim();

            try {
                // Base Query
                let q = query(collection(db, "rentals"), orderBy("createdAt", "desc"), limit(40));
                
                // Category Filtering (Note: Requires Firestore Index if mixed with orderBy)
                if (currentCategory !== 'All') {
                    q = query(collection(db, "rentals"), where("category", "==", currentCategory), orderBy("createdAt", "desc"));
                }

                const snap = await getDocs(q);
                grid.innerHTML = '';
                if (markersLayer) markersLayer.clearLayers();

                let count = 0;
                snap.forEach(doc => {
                    const data = doc.data();
                    const price = Number(data.price);
                    const location = (data.location || '').toLowerCase();

                    // Client-side Price & Search Filter
                    if (price <= maxPrice && (searchText === '' || location.includes(searchText))) {
                        renderCard(doc.id, data);
                        addMapMarker(data);
                        count++;
                    }
                });

                // Empty State Handler
                if (count === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full py-20 text-center glass-panel flex flex-col items-center">
                            <span class="text-4xl mb-4">🏠</span>
                            <p class="text-gray-500 uppercase font-black tracking-widest text-xs">No properties found in this range</p>
                            <button onclick="window.location.reload()" class="mt-4 text-purple-400 text-[10px] font-black uppercase underline">Clear Filters</button>
                        </div>`;
                }

            } catch (e) { 
                console.error("Firebase Error:", e);
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-500 font-bold uppercase text-xs">Failed to load data. Check console.</div>';
            }
        }

        function renderCard(id, data) {
            const formattedPrice = Number(data.price).toLocaleString();
            grid.innerHTML += `
                <div class="glass-panel overflow-hidden group hover:border-purple-500/50 transition-all duration-500">
                    <div class="h-48 bg-gray-900 relative overflow-hidden">
                        <img src="${data.imageUrl}" 
                             onerror="this.src='https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80'" 
                             class="w-full h-full object-cover group-hover:scale-110 transition duration-700" 
                             alt="${data.title}">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                        <div class="absolute bottom-4 left-4">
                            <p class="text-2xl font-black text-white">₦${formattedPrice}</p>
                            <p class="text-[10px] text-purple-400 font-bold uppercase tracking-tighter">${data.location}</p>
                        </div>
                    </div>
                    <div class="p-5 bg-white/[0.01]">
                        <h3 class="text-xs font-bold truncate uppercase mb-4 text-gray-200">${data.title}</h3>
                        <button onclick="window.location.href='listing-details.html?id=${id}'" class="w-full py-3 bg-white/5 rounded-xl text-[10px] font-black uppercase hover:bg-purple-600 transition tracking-widest">Details</button>
                    </div>
                </div>`;
        }

        function addMapMarker(data) {
            if (map && markersLayer) {
                const lat = data.lat || 11.95 + (Math.random() * 0.1);
                const lng = data.lng || 8.50 + (Math.random() * 0.1);
                const marker = L.marker([lat, lng]).addTo(markersLayer);
                marker.bindPopup(`
                    <div class="text-black p-1">
                        <p class="font-black text-xs">₦${Number(data.price).toLocaleString()}</p>
                        <p class="text-[10px]">${data.title}</p>
                    </div>
                `);
            }
        }

        // --- EVENT LISTENERS ---
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelector('.filter-tab.active').classList.remove('active');
                tab.classList.add('active');
                currentCategory = tab.dataset.category;
                fetchRentals();
            };
        });

        priceRange.oninput = (e) => {
            document.getElementById('priceVal').innerText = (e.target.value / 1000000).toFixed(1) + "M";
            // Debounce fetch for smoother slider feel
            clearTimeout(window.priceTimeout);
            window.priceTimeout = setTimeout(fetchRentals, 300);
        };

        searchInput.oninput = () => {
            clearTimeout(window.searchTimeout);
            window.searchTimeout = setTimeout(fetchRentals, 500);
        };

        // Initialize
        highlightActiveNav();
        fetchRentals();
    </script>
</body>
</html>
