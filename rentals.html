<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Browse Rental Listings in Kano</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .btn-gradient { background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%); transition: all 0.3s ease; }
        
        /* Map Styles */
        #map-container { height: 0; overflow: hidden; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; border-radius: 24px; border: 1px solid rgba(139, 92, 246, 0.2); }
        #map-container.active { height: 400px; opacity: 1; margin: 1.5rem 0; }
        #map { height: 100%; width: 100%; z-index: 10; border-radius: 24px; }
        
        /* Dark Mode Map Filter */
        .leaflet-tile { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) !important; }
        .leaflet-container { background: #06080C !important; }

        .filter-tab { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 18px; border-radius: 12px; font-size: 11px; font-weight: 700; transition: all 0.3s; cursor: pointer; text-transform: uppercase; }
        .filter-tab.active { background: var(--neon-purple); border-color: var(--neon-purple); box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }

        #mobile-sidebar { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #mobile-sidebar.active { transform: translateX(0); }

        .bottom-nav { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 64px; z-index: 1000; display: flex; justify-content: space-around; align-items: center; background: rgba(15, 15, 20, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; text-decoration: none; transition: 0.3s; }
        .nav-item.active { color: #A855F7; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="mobile-sidebar" class="fixed inset-0 z-[3000] bg-[#06080C]/98 backdrop-blur-2xl p-8 md:hidden">
        <div class="flex justify-between items-center mb-12">
            <span class="text-xs font-black italic tracking-tighter text-purple-500">K-HUB MENU</span>
            <button onclick="toggleSidebar()" class="text-white text-3xl font-light">&times;</button>
        </div>
        <nav class="flex flex-col gap-8 text-xl font-black uppercase italic tracking-tighter">
            <a href="index.html" class="lang-home">Home</a>
            <a href="job-search.html" class="lang-jobs">Jobs</a>
            <a href="rentals.html" class="text-purple-500 lang-rentals">Rentals</a>
            <a href="shop.html" class="lang-shop">Shop</a>
            <a href="transport.html" class="lang-transport">Transport</a>
            <hr class="border-white/10">
            <span class="global-username text-sm font-bold text-purple-400"></span>
            <button onclick="window.location.href='login.html'" class="text-left text-sm lang-login auth-text">Login</button>
        </nav>
    </div>

    <div class="max-w-7xl mx-auto glass-panel p-6 md:p-10 relative shadow-2xl ring-1 ring-white/5">
        <header class="flex justify-between items-center mb-12">
            <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
                <svg class="w-12 h-12 mb-1" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#k-grad-shop)"/>
                    <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs><linearGradient id="k-grad-shop" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
                </svg>
                <h1 class="text-[10px] font-black italic tracking-tighter leading-none">K-HUB</h1>
            </div>
            
            <nav class="hidden md:flex gap-8 text-[11px] font-black text-gray-400 uppercase tracking-widest">
                <a href="index.html" class="hover:text-white transition lang-home">Home</a>
                <a href="job-search.html" class="hover:text-white transition lang-jobs">Jobs</a>
                <a href="rentals.html" class="text-white border-b-2 border-purple-500 pb-1 lang-rentals">Rent</a>
                <a href="shop.html" class="hover:text-white transition lang-shop">Shop</a>
                <a href="transport.html" class="hover:text-white transition lang-transport">Transport</a>
            </nav>

            <div class="flex items-center gap-4">
                <select id="lang-select" class="lang-select-dropdown bg-white/5 border border-white/10 text-[10px] font-black uppercase py-2 px-3 rounded-xl outline-none cursor-pointer hidden md:block">
                    <option value="en" class="bg-black">English</option>
                    <option value="ha" class="bg-black">Hausa</option>
                    <option value="ig" class="bg-black">Igbo</option>
                    <option value="yo" class="bg-black">Yoruba</option>
                </select>

                <div class="flex items-center gap-4">
                    <span class="global-username text-xs font-bold text-purple-400 hidden sm:block"></span>
                    <button id="global-auth-btn" class="btn-gradient px-4 py-2 rounded-xl text-[10px] font-black uppercase lang-login">
                        Login
                    </button>
                </div>

                <button onclick="toggleSidebar()" class="md:hidden text-white p-2 glass-panel border-white/10 rounded-xl">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </header>

        <section class="mb-12">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
                <div class="w-full max-w-lg">
                    <h2 id="hero-title" class="text-4xl font-black uppercase italic tracking-tighter mb-4 lang-title">Browse Rentals</h2>
                    <div class="glass-panel px-6 py-4 flex items-center bg-white/5 border-white/10 focus-within:border-purple-500/50 transition">
                        <input type="text" id="location-search" placeholder="Search area (e.g. Nassarawa)" class="bg-transparent w-full outline-none text-sm text-white">
                        <span class="opacity-50">🔍</span>
                    </div>
                </div>
                <button id="toggle-map-btn" class="w-full md:w-auto px-8 py-4 rounded-2xl btn-gradient text-[11px] font-black uppercase tracking-widest shadow-xl shadow-purple-500/20 flex items-center justify-center gap-2">
                    <span id="map-btn-text" class="lang-map-open">Open Live Map</span> 🗺️
                </button>
            </div>

            <div id="map-container">
                <div id="map"></div>
            </div>

            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mt-8">
                <div class="flex flex-wrap gap-2" id="category-filters">
                    <div class="filter-tab active lang-all" data-category="All">All</div>
                    <div class="filter-tab lang-apartments" data-category="Apartment">Apartments</div>
                    <div class="filter-tab lang-offices" data-category="Office">Offices</div>
                </div>

                <div class="flex items-center gap-4 bg-white/5 p-2 rounded-2xl border border-white/5 w-full md:w-auto justify-between">
                    <div class="flex items-center gap-2 px-2 w-full">
                        <span class="text-[9px] font-black text-gray-400 uppercase">Max:</span>
                        <span class="text-[11px] font-bold text-purple-400 min-w-[35px]" id="priceVal">5.0M</span>
                        <input type="range" min="50000" max="5000000" step="50000" id="priceRange" value="5000000" class="flex-grow md:w-24 accent-purple-500 cursor-pointer">
                    </div>
                </div>
            </div>
        </section>

        <div id="rentals-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 min-h-[400px]"></div>
    </div>

    <div class="bottom-nav md:hidden">
        <a href="index.html" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg><span class="lang-home text-[8px]">Home</span></a>
        <a href="shop.html" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg><span class="lang-shop text-[8px]">Shop</span></a>
        <a href="rentals.html" class="nav-item active"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg><span class="lang-rentals text-[8px]">Rent</span></a>
        <a href="login.html" class="nav-item"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg><span class="lang-login text-[8px]">Login</span></a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { auth, db, doc, setDoc, onSnapshot, signOut } from './firebase-config.js';

        // 1. FULL RESTORED DICTIONARY
        const translations = {
            en: { home: "Home", jobs: "Jobs", rentals: "Rentals", shop: "Shop", transport: "Transport", login: "Login", logout: "Logout", title: "Browse Rentals", mapOpen: "Open Live Map", all: "All", apartments: "Apartments", offices: "Offices" },
            ha: { home: "Gida", jobs: "Aiki", rentals: "Gidajen Haya", shop: "Shago", transport: "Sufuri", login: "Shiga", logout: "Fita", title: "Nemi Gidajen Haya", mapOpen: "Bude Taswira", all: "Duka", apartments: "Gidaje", offices: "Ofisoshi" },
            ig: { home: "Ụlọ", jobs: "Ọrụ", rentals: "Ụlọ Mbiri", shop: "Ụlọ Ahịa", transport: "Ụgbọ", login: "Banye", logout: "Pụọ", title: "Chọta Ụlọ", mapOpen: "Mepee Map", all: "Niile", apartments: "Ụlọ", offices: "Ọfịs" },
            yo: { home: "Ilé", jobs: "Iṣẹ́", rentals: "Ilé Yáya", shop: "Ilé Ìtajà", transport: "Ọkọ̀", login: "Wọlé", logout: "Jáde", title: "Wá Ilé Yáya", mapOpen: "Ṣí Máàpù", all: "Gbogbo", apartments: "Ilé", offices: "Ọ́fíìsì" }
        };

        // 2. AUTO TRANSLATOR FUNCTION
        function applyLanguage(lang) {
            const l = translations[lang] || translations.en;
            localStorage.setItem('kHubLang', lang);
            
            document.querySelectorAll('.lang-home').forEach(el => el.innerText = l.home);
            document.querySelectorAll('.lang-jobs').forEach(el => el.innerText = l.jobs);
            document.querySelectorAll('.lang-rentals').forEach(el => el.innerText = l.rentals);
            document.querySelectorAll('.lang-shop').forEach(el => el.innerText = l.shop);
            document.querySelectorAll('.lang-transport').forEach(el => el.innerText = l.transport);
            document.querySelectorAll('.lang-all').forEach(el => el.innerText = l.all);
            document.querySelectorAll('.lang-apartments').forEach(el => el.innerText = l.apartments);
            document.querySelectorAll('.lang-offices').forEach(el => el.innerText = l.offices);
            document.querySelectorAll('.lang-title').forEach(el => el.innerText = l.title);
            
            const loginBtn = document.getElementById('global-auth-btn');
            if (loginBtn.innerText !== "Logout" && loginBtn.innerText !== "Fita" && loginBtn.innerText !== "Pụọ" && loginBtn.innerText !== "Jáde") {
                loginBtn.innerText = l.login;
            }

            document.getElementById('map-btn-text').innerText = l.mapOpen;
            const selectEl = document.getElementById('lang-select');
            if(selectEl) selectEl.value = lang;
        }

        // 3. PRICE RANGE LOGIC
        const priceRange = document.getElementById('priceRange');
        const priceVal = document.getElementById('priceVal');
        
        priceRange.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val >= 1000000) {
                priceVal.innerText = (val / 1000000).toFixed(1) + 'M';
            } else {
                priceVal.innerText = (val / 1000).toFixed(0) + 'K';
            }
        });

        // 4. MAP LOGIC
        let map;
        const toggleMapBtn = document.getElementById('toggle-map-btn');
        const mapContainer = document.getElementById('map-container');

        toggleMapBtn.addEventListener('click', () => {
            mapContainer.classList.toggle('active');
            if (mapContainer.classList.contains('active')) {
                if (!map) {
                    // Initialize Map centered on Kano
                    map = L.map('map').setView([12.0022, 8.5920], 12);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    
                    // Example Marker for a Listing
                    L.marker([12.0022, 8.5920]).addTo(map)
                        .bindPopup('<b class="text-black">Premium Office</b><br><span class="text-black">Nassarawa, Kano</span>');
                }
                setTimeout(() => map.invalidateSize(), 400);
            }
        });

        // 5. GLOBAL AUTH & SYNC
        auth.onAuthStateChanged((user) => {
            const authBtn = document.getElementById('global-auth-btn');
            const authTexts = document.querySelectorAll('.auth-text');
            
            if (user) {
                authBtn.innerText = "Logout";
                authBtn.onclick = () => signOut(auth).then(() => window.location.href = 'login.html');
                authTexts.forEach(el => el.innerText = "Logout");
                
                onSnapshot(doc(db, "users", user.uid), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        document.querySelectorAll('.global-username').forEach(el => el.innerText = data.username || "");
                        if (data.language) applyLanguage(data.language);
                    }
                });
            } else {
                authBtn.innerText = "Login";
                authBtn.onclick = () => window.location.href = 'login.html';
                const savedLang = localStorage.getItem('kHubLang') || 'en';
                applyLanguage(savedLang);
                if (!window.location.pathname.includes('login.html')) {
                    window.location.href = 'login.html';
                }
            }
        });

        window.toggleSidebar = () => document.getElementById('mobile-sidebar').classList.toggle('active');
        document.getElementById('lang-select').onchange = (e) => applyLanguage(e.target.value);

    </script>
</body>
</html>
