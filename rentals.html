<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Browse Rental Listings in Kano</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .btn-gradient { background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%); transition: all 0.3s ease; }
        
        #map-container { height: 0; overflow: hidden; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; border-radius: 24px; border: 1px solid rgba(139, 92, 246, 0.2); }
        #map-container.active { height: 400px; opacity: 1; margin: 1.5rem 0; }
        #map { height: 100%; width: 100%; z-index: 10; }
        
        .filter-tab { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 18px; border-radius: 12px; font-size: 11px; font-weight: 700; transition: all 0.3s; cursor: pointer; text-transform: uppercase; }
        .filter-tab.active { background: var(--neon-purple); border-color: var(--neon-purple); box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }

        #mobile-sidebar { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #mobile-sidebar.active { transform: translateX(0); }

        .bottom-nav { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 64px; z-index: 1000; display: flex; justify-content: space-around; align-items: center; background: rgba(15, 15, 20, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; font-size: 10px; font-weight: 800; text-transform: uppercase; text-decoration: none; }
        .nav-item.active { color: #A855F7; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="mobile-sidebar" class="fixed inset-0 z-[3000] bg-[#06080C]/98 backdrop-blur-2xl p-8 md:hidden">
        <div class="flex justify-between items-center mb-12">
            <span class="text-xs font-black italic tracking-tighter text-purple-500">K-HUB MENU</span>
            <button id="close-menu" class="text-white text-3xl font-light">&times;</button>
        </div>
        <nav class="flex flex-col gap-8 text-xl font-black uppercase italic tracking-tighter">
            <a href="index.html" class="lang-home">Home</a>
            <a href="job-search.html" class="lang-jobs">Jobs</a>
            <a href="rentals.html" class="text-purple-500 lang-rentals">Rentals</a>
            <a href="shop.html" class="lang-shop">Shop</a>
            <a href="transport.html" class="lang-transport">Transport</a>
            <hr class="border-white/10">
            <div class="flex flex-col gap-4">
                <span class="global-username text-sm font-bold text-purple-400"></span>
                <button id="mobile-auth-btn" class="text-left text-sm uppercase font-black lang-login">Sign In</button>
            </div>
        </nav>
    </div>

    <div class="bottom-nav md:hidden">
        <a href="index.html" class="nav-item">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="lang-home">Home</span>
        </a>
        <a href="rentals.html" class="nav-item active">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            <span class="lang-rentals">Rent</span>
        </a>
        <button onclick="window.location.href='user-dashboard.html'" class="nav-item">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="global-username">User</span>
        </button>
    </div>

    <div class="max-w-7xl mx-auto glass-panel p-6 md:p-10 relative shadow-2xl ring-1 ring-white/5">
        <header class="flex justify-between items-center mb-12">
            <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
                <svg class="w-12 h-12 mb-1" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#k-grad-shop)"/>
                    <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                    <defs><linearGradient id="k-grad-shop" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
                </svg>
                <h1 class="text-[10px] font-black italic uppercase">K-HUB</h1>
            </div>
            
            <nav class="hidden md:flex gap-8 text-[11px] font-black text-gray-400 uppercase tracking-widest">
                <a href="index.html" class="hover:text-white transition lang-home">Home</a>
                <a href="job-search.html" class="hover:text-white transition lang-jobs">Jobs</a>
                <a href="rentals.html" class="text-white border-b-2 border-purple-500 pb-1 lang-rentals">Rent</a>
                <a href="shop.html" class="hover:text-white transition lang-shop">Shop</a>
                <a href="transport.html" class="hover:text-white transition lang-transport">Transport</a>
            </nav>

            <div class="flex items-center gap-4">
                <select id="lang-select" class="lang-select-dropdown bg-white/5 border border-white/10 text-[10px] font-black uppercase py-2 px-3 rounded-xl outline-none cursor-pointer">
                    <option value="en" class="bg-black">English</option>
                    <option value="ha" class="bg-black">Hausa</option>
                    <option value="ig" class="bg-black">Igbo</option>
                    <option value="yo" class="bg-black">Yoruba</option>
                </select>

                <div class="hidden md:flex items-center gap-4">
                    <span class="global-username text-xs font-bold text-purple-400"></span>
                    <button id="global-auth-btn" class="btn-gradient px-4 py-2 rounded-xl text-[10px] font-black uppercase">
                        Login
                    </button>
                </div>

                <button id="hamburger-btn" class="md:hidden text-white p-2">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </header>

        <section class="mb-12">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
                <div class="w-full max-w-lg">
                    <h2 id="hero-title" class="text-4xl font-black uppercase italic tracking-tighter mb-4">Browse Rentals</h2>
                    <div class="glass-panel px-6 py-4 flex items-center bg-white/5 border-white/10">
                        <input type="text" id="location-search" placeholder="Search area (e.g. Nassarawa)" class="bg-transparent w-full outline-none text-sm text-white">
                        <span class="opacity-50">🔍</span>
                    </div>
                </div>
                <button id="toggle-map-btn" class="w-full md:w-auto px-8 py-4 rounded-2xl btn-gradient text-[11px] font-black uppercase tracking-widest flex items-center justify-center gap-2">
                    <span id="map-btn-text" class="lang-map-open">Open Live Map</span> 🗺️
                </button>
            </div>
            <div id="map-container"><div id="map"></div></div>
        </section>

        <div id="rentals-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 min-h-[400px]"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // --- AUTH GUARD & SYNC LOGIC ---
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                syncUserSettings(user.uid);
                updateAuthUI(user);
            }
        });

        function syncUserSettings(uid) {
            onSnapshot(doc(db, "users", uid), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.querySelectorAll('.global-username').forEach(el => el.innerText = data.username || "User");
                    if (data.language && data.language !== localStorage.getItem('kHubLang')) {
                        applyLanguage(data.language);
                    }
                }
            });
        }

        function updateAuthUI(user) {
            const btns = [document.getElementById('global-auth-btn'), document.getElementById('mobile-auth-btn')];
            btns.forEach(btn => {
                if (btn) {
                    btn.innerText = "Logout";
                    btn.onclick = () => signOut(auth).then(() => window.location.href = 'login.html');
                }
            });
        }

        // --- PROFILE SAVE FUNCTION ---
        window.saveProfile = async function(newLanguage, newName) {
            const user = auth.currentUser;
            if (user) {
                await setDoc(doc(db, "users", user.uid), {
                    language: newLanguage,
                    username: newName,
                    lastUpdated: new Date()
                }, { merge: true });
                alert("Settings synced across all your devices!");
            }
        };

        // --- EXISTING RENTAL LOGIC ---
        const translations = {
            en: { home: "Home", jobs: "Jobs", rentals: "Rentals", shop: "Shop", transport: "Transport", login: "Logout", title: "Browse Rentals", mapOpen: "Open Live Map" },
            ha: { home: "Gida", jobs: "Aiki", rentals: "Gidajen Haya", shop: "Shago", transport: "Sufuri", login: "Fita", title: "Nemi Gidajen Haya", mapOpen: "Bude Taswira" },
            ig: { home: "Ụlọ", jobs: "Ọrụ", rentals: "Ụlọ Mbiri", shop: "Ụlọ Ahịa", transport: "Ụgbọ", login: "Pụọ", title: "Chọta Ụlọ", mapOpen: "Mepee Map" },
            yo: { home: "Ilé", jobs: "Iṣẹ́", rentals: "Ilé Yáya", shop: "Ilé Ìtajà", transport: "Ọkọ̀", login: "Jáde", title: "Wá Ilé Yáya", mapOpen: "Ṣí Máàpù" }
        };

        window.applyLanguage = (lang) => {
            const l = translations[lang];
            document.querySelectorAll('.lang-home').forEach(el => el.innerText = l.home);
            document.querySelectorAll('.lang-rentals').forEach(el => el.innerText = l.rentals);
            document.getElementById('hero-title').innerText = l.title;
            document.getElementById('map-btn-text').innerText = l.mapOpen;
            localStorage.setItem('kHubLang', lang);
            document.getElementById('lang-select').value = lang;
        };

        document.getElementById('lang-select').onchange = (e) => {
            const newLang = e.target.value;
            applyLanguage(newLang);
            // Sync this choice to Firestore so other devices update
            const name = document.querySelector('.global-username').innerText;
            saveProfile(newLang, name);
        };

        // Sidebar triggers
        document.getElementById('hamburger-btn').onclick = () => document.getElementById('mobile-sidebar').classList.add('active');
        document.getElementById('close-menu').onclick = () => document.getElementById('mobile-sidebar').classList.remove('active');

        window.addEventListener('DOMContentLoaded', () => {
            applyLanguage(localStorage.getItem('kHubLang') || 'en');
        });
    </script>
</body>
</html>
