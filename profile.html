<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .whatsapp-btn { background: #25D366; color: white; transition: all 0.3s ease; }
        .whatsapp-btn:hover { background: #128C7E; transform: scale(1.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="edit-modal" class="modal px-4">
        <div class="glass-card p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6">Edit Profile</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400 block mb-1">Full Name / Store Name</label>
                    <input type="text" id="edit-name" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="text-xs text-gray-400 block mb-1">WhatsApp Number</label>
                    <input type="tel" id="edit-phone" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500">
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="toggleModal(false)" class="flex-1 py-3 text-gray-400 font-bold">Cancel</button>
                    <button id="save-profile-btn" class="flex-1 neon-gradient py-3 rounded-xl font-bold">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <div class="w-8 h-8 neon-gradient rounded-lg flex items-center justify-center font-bold">K</div>
            <span class="font-bold text-xl tracking-tight">K-Hub</span>
        </div>
        <button onclick="window.location.href='user-dashboard.html'" class="text-sm text-gray-400">Back to Dashboard</button>
    </nav>

    <div class="max-w-5xl mx-auto mt-10 px-4">
        <div class="glass-card p-10 rounded-[40px] text-center mb-10 relative">
            <button id="edit-trigger" class="hidden absolute top-6 right-8 text-xs text-purple-400 font-bold border border-purple-400/30 px-3 py-1 rounded-full hover:bg-purple-400 hover:text-white transition">
                Edit Profile
            </button>

            <div class="w-24 h-24 bg-gradient-to-tr from-purple-500 to-blue-500 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl font-bold text-white shadow-lg" id="profile-initial">?</div>
            <h1 id="profile-name" class="text-3xl font-bold mb-1">Loading...</h1>
            <p id="follower-count" class="text-xs text-gray-400 mb-3">0 Followers</p>
            <div id="profile-badge" class="mb-4"></div>
            
            <div class="flex flex-col sm:flex-row justify-center gap-3 mt-4">
                <div id="contact-container" class="hidden">
                    <a id="whatsapp-link" href="#" target="_blank" class="whatsapp-btn flex items-center gap-2 px-6 py-3 rounded-2xl font-bold shadow-lg shadow-green-500/20">
                        Message Seller
                    </a>
                </div>
                <button id="follow-btn" class="hidden bg-white/10 hover:bg-white/20 border border-white/10 px-8 py-3 rounded-2xl font-bold transition">
                    Follow
                </button>
            </div>
        </div>

        <h2 class="text-xl font-bold mb-6 px-2">Listings</h2>
        <div id="public-listings" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        <div id="my-listings" class="grid gap-4"></div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, getDocs, doc, getDoc, updateDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const profileId = urlParams.get('id');

        window.toggleModal = (show) => {
            document.getElementById('edit-modal').classList.toggle('active', show);
        };

        onAuthStateChanged(auth, async (user) => {
            const isOwner = !profileId || (user && user.uid === profileId);
            const targetId = profileId || (user ? user.uid : null);

            if (!targetId) {
                window.location.href = "k-hub-login.html";
                return;
            }

            if (isOwner) {
                document.getElementById('edit-trigger').classList.remove('hidden');
                document.getElementById('edit-trigger').onclick = () => toggleModal(true);
            } else if (user) {
                document.getElementById('follow-btn').classList.remove('hidden');
                checkFollowStatus(user.uid, targetId);
            }

            const userDoc = await getDoc(doc(db, "users", targetId));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                updateProfileUI(userData);
                
                document.getElementById('edit-name').value = userData.fullName || "";
                document.getElementById('edit-phone').value = userData.phone || "";

                document.getElementById('save-profile-btn').onclick = async () => {
                    await updateDoc(doc(db, "users", targetId), {
                        fullName: document.getElementById('edit-name').value,
                        phone: document.getElementById('edit-phone').value
                    });
                    location.reload();
                };
            }

            getFollowerCount(targetId);
            loadItems(targetId, profileId ? 'active' : null);
        });

        async function checkFollowStatus(myId, targetId) {
            const followDoc = await getDoc(doc(db, "follows", `${myId}_${targetId}`));
            const btn = document.getElementById('follow-btn');
            
            if (followDoc.exists()) {
                btn.innerText = "Following";
                btn.classList.replace('bg-white/10', 'bg-purple-600');
            }

            btn.onclick = async () => {
                const docRef = doc(db, "follows", `${myId}_${targetId}`);
                if (btn.innerText === "Follow") {
                    await setDoc(docRef, { followerId: myId, followingId: targetId });
                    btn.innerText = "Following";
                    btn.classList.replace('bg-white/10', 'bg-purple-600');
                } else {
                    await deleteDoc(docRef);
                    btn.innerText = "Follow";
                    btn.classList.replace('bg-purple-600', 'bg-white/10');
                }
                getFollowerCount(targetId);
            };
        }

        async function getFollowerCount(targetId) {
            const q = query(collection(db, "follows"), where("followingId", "==", targetId));
            const snapshot = await getDocs(q);
            document.getElementById('follower-count').innerText = `${snapshot.size} Followers`;
        }

        function updateProfileUI(userData) {
            const name = userData.fullName || "User";
            document.getElementById('profile-name').innerText = name;
            document.getElementById('profile-initial').innerText = name.charAt(0);

            if (userData.isPremium) {
                document.getElementById('profile-badge').innerHTML = 
                    '<span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-[10px] font-bold border border-blue-500/30">VERIFIED SELLER ✅</span>';
            }

            if (profileId && userData.phone) {
                const contactBox = document.getElementById('contact-container');
                const waLink = document.getElementById('whatsapp-link');
                let cleanPhone = userData.phone.replace(/^0/, '234'); 
                waLink.href = `https://wa.me/${cleanPhone}?text=Hello%20${name},%20I%20saw%20your%20listing%20on%20K-Hub!`;
                contactBox.classList.remove('hidden');
            }
        }

        async function loadItems(uid, filterStatus) {
            const collections = ['products', 'jobs', 'rentals', 'transport'];
            const container = document.getElementById(profileId ? 'public-listings' : 'my-listings');
            container.innerHTML = "";

            for (const coll of collections) {
                let q = query(collection(db, coll), where("userId", "==", uid));
                if (filterStatus) {
                    q = query(collection(db, coll), where("userId", "==", uid), where("status", "==", filterStatus));
                }

                const snapshot = await getDocs(q);
                snapshot.forEach(item => {
                    const data = item.data();
                    container.innerHTML += createItemHTML(data, coll, profileId ? false : true);
                });
            }
        }

        function createItemHTML(data, type, isDashboard) {
            if (!isDashboard) {
                return `
                    <div class="glass-card rounded-3xl overflow-hidden hover:scale-[1.02] transition">
                        <img src="${data.imageUrl || 'https://via.placeholder.com/300'}" class="w-full h-48 object-cover">
                        <div class="p-4">
                            <p class="text-[10px] text-purple-400 font-bold uppercase">${type}</p>
                            <h4 class="font-bold">${data.name || data.title}</h4>
                            <p class="text-emerald-400 font-bold mt-2">₦${Number(data.price || data.fare || 0).toLocaleString()}</p>
                        </div>
                    </div>`;
            } else {
                const statusColor = data.status === 'active' ? 'text-emerald-400' : 'text-yellow-400';
                return `
                    <div class="glass-card p-4 rounded-2xl flex justify-between items-center mb-2">
                        <div class="flex items-center gap-4 text-left">
                            <div class="w-12 h-12 rounded-lg bg-white/5 overflow-hidden flex items-center justify-center">
                                ${data.imageUrl ? `<img src="${data.imageUrl}" class="w-full h-full object-cover">` : '📦'}
                            </div>
                            <div>
                                <h4 class="font-bold text-sm">${data.name || data.title}</h4>
                                <p class="text-[9px] uppercase text-gray-500">${type}</p>
                            </div>
                        </div>
                        <span class="text-[9px] font-bold ${statusColor} bg-white/5 px-2 py-1 rounded-md border border-white/5">
                            ${data.status.toUpperCase()}
                        </span>
                    </div>`;
            }
        }
    </script>
</body>
</html>
