<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub Admin | Kano Marketplace Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css"> 
</head>
<body class="bg-[#050505] text-white min-h-screen hidden" id="admin-body">

    <header class="max-w-7xl mx-auto px-6 py-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black tracking-tighter neon-text">K-HUB <span class="text-purple-500">ADMIN</span></h1>
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest" id="logged-admin">Authenticating...</p>
        </div>
        <button id="admin-logout" class="px-6 py-2 bg-white/5 border border-white/10 rounded-full text-xs font-bold hover:bg-red-500/20 hover:text-red-500 transition">Logout</button>
    </header>

    <main class="max-w-7xl mx-auto px-6 space-y-12 pb-20">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="glass-card p-6 rounded-3xl">
                <p class="text-gray-500 text-[10px] font-bold uppercase mb-2">Total Users</p>
                <h2 id="total-users" class="text-3xl font-black">0</h2>
            </div>
            <div class="glass-card p-6 rounded-3xl border-b-2 border-emerald-500">
                <p class="text-gray-500 text-[10px] font-bold uppercase mb-2">Featured Items</p>
                <h2 id="featured-count" class="text-2xl font-black text-emerald-400">0</h2>
            </div>
            <div class="glass-card p-6 rounded-3xl border-b-2 border-blue-500">
                <p class="text-gray-500 text-[10px] font-bold uppercase mb-2">Market Volume</p>
                <h2 id="revenue-total" class="text-2xl font-black text-blue-400">₦0</h2>
            </div>
            <div class="glass-card p-6 rounded-3xl border-b-2 border-red-500">
                <p class="text-gray-500 text-[10px] font-bold uppercase mb-2">Active Reports</p>
                <h2 id="active-reports-count" class="text-3xl font-black text-red-500">0</h2>
            </div>
        </div>

        <section class="glass-card rounded-[40px] overflow-hidden border border-white/5">
            <div class="p-8 border-b border-white/10 flex justify-between items-center bg-white/5">
                <h2 class="text-xl font-bold">Listing Moderation</h2>
                <span class="px-3 py-1 bg-purple-500/20 text-purple-500 rounded-full text-[10px] font-bold uppercase tracking-widest">Global Feed</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="text-[10px] uppercase text-gray-500 bg-white/5">
                        <tr>
                            <th class="px-8 py-4">Item</th>
                            <th class="px-8 py-4">Category</th>
                            <th class="px-8 py-4">Status</th>
                            <th class="px-8 py-4">Price</th>
                            <th class="px-8 py-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="pending-table-body" class="text-sm"></tbody>
                </table>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section class="glass-card rounded-[40px] overflow-hidden border border-white/5">
                <div class="p-8 border-b border-white/10 flex justify-between items-center bg-white/5">
                    <h2 class="text-xl font-bold">User Management</h2>
                    <input type="text" id="user-search" placeholder="Search sellers..." class="bg-black/40 border border-white/10 rounded-xl px-4 py-2 text-xs outline-none focus:border-purple-500 w-1/2">
                </div>
                <div class="max-h-[500px] overflow-y-auto">
                    <table class="w-full text-left">
                        <tbody id="users-table-body" class="text-sm"></tbody>
                    </table>
                </div>
            </section>

            <section class="glass-card rounded-[40px] overflow-hidden border border-red-500/20">
                <div class="p-8 border-b border-white/10 bg-red-500/5">
                    <h2 class="text-xl font-bold text-red-400">Flagged Reports</h2>
                </div>
                <div class="max-h-[500px] overflow-y-auto">
                    <table class="w-full text-left">
                        <tbody id="reports-table-body" class="text-sm"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            collection, query, where, getDocs, getDoc, doc, updateDoc, deleteDoc, getCountFromServer, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import emailjs from 'https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js';

        emailjs.init("YOUR_PUBLIC_KEY"); 

        const ADMIN_EMAIL = "clintzyarts@gmail.com";
        let allUsers = [];

        onAuthStateChanged(auth, async (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById('admin-body').classList.remove('hidden');
                document.getElementById('logged-admin').innerText = `Admin: ${user.email}`;
                refreshDashboard();
            } else {
                window.location.href = "index.html";
            }
        });

        async function refreshDashboard() {
            updateStats();
            loadItems();
            loadUsers();
            loadReports();
            calculateRevenue();
        }

        // --- EMAIL SYSTEM ---
        async function sendStatusEmail(coll, itemId, action) {
            try {
                const itemSnap = await getDoc(doc(db, coll, itemId));
                if (!itemSnap.exists()) return;
                const itemData = itemSnap.data();
                const userSnap = await getDoc(doc(db, "users", itemData.userId));
                if (!userSnap.exists()) return;
                const userData = userSnap.data();

                const templateParams = {
                    to_name: userData.fullName || "K-Hub User",
                    user_email: userData.email,
                    item_title: itemData.name || itemData.title || "Your Listing",
                    status_text: action === 'approve' ? "APPROVED ✅" : "REJECTED ❌",
                    admin_message: action === 'approve' 
                        ? "Great news! Your listing is now live. Want more views? Contact us for Premium Placement." 
                        : "Your listing was removed for violating community guidelines."
                };
                await emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", templateParams);
            } catch (err) { console.error(err); }
        }

        // --- LISTING & ADS MANAGEMENT ---
        async function loadItems() {
            const table = document.getElementById('pending-table-body');
            const categories = ['products', 'jobs', 'rentals', 'transports'];
            table.innerHTML = "";
            let fCount = 0;
            
            for (const cat of categories) {
                const q = query(collection(db, cat));
                const snap = await getDocs(q);
                snap.forEach(d => {
                    const item = d.data();
                    if(item.isFeatured) fCount++;
                    
                    const isPending = item.status === 'pending';
                    const isFeatured = item.isFeatured === true;

                    table.innerHTML += `
                        <tr class="border-b border-white/5 hover:bg-white/5 transition">
                            <td class="px-8 py-4">
                                <div class="font-bold text-xs">${item.name || item.title}</div>
                                <div class="text-[10px] text-gray-500">${item.location || 'Kano'}</div>
                            </td>
                            <td class="px-8 py-4 uppercase text-[10px] text-purple-400 font-black">${cat}</td>
                            <td class="px-8 py-4">
                                <span class="px-2 py-1 rounded text-[9px] font-bold ${isPending ? 'bg-orange-500/20 text-orange-500' : 'bg-emerald-500/20 text-emerald-500'}">
                                    ${item.status.toUpperCase()}
                                </span>
                            </td>
                            <td class="px-8 py-4 text-white font-bold text-xs">₦${Number(item.price || item.salary || 0).toLocaleString()}</td>
                            <td class="px-8 py-4 text-right flex gap-2 justify-end">
                                ${isPending ? `<button onclick="approveItem('${cat}', '${d.id}')" class="bg-emerald-600 px-3 py-1 rounded text-[10px] font-bold">Approve</button>` : ''}
                                <button onclick="toggleFeature('${cat}', '${d.id}', ${isFeatured})" 
                                    class="px-3 py-1 rounded text-[10px] font-bold ${isFeatured ? 'bg-yellow-500 text-black' : 'bg-white/10 text-white'}">
                                    ${isFeatured ? '★ Featured' : '☆ Promote'}
                                </button>
                                <button onclick="rejectItem('${cat}', '${d.id}')" class="bg-red-500/10 text-red-500 px-3 py-1 rounded text-[10px] font-bold">Delete</button>
                            </td>
                        </tr>`;
                });
            }
            document.getElementById('featured-count').innerText = fCount;
        }

        window.toggleFeature = async (coll, id, current) => {
            try {
                await updateDoc(doc(db, coll, id), { isFeatured: !current });
                refreshDashboard();
            } catch (e) { alert(e.message); }
        };

        // --- USER & REPORT LOGIC ---
        function renderUsers(users) {
            const table = document.getElementById('users-table-body');
            table.innerHTML = users.map(u => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition">
                    <td class="px-8 py-4 text-xs font-bold">${u.fullName || 'User'} ${u.isPremium ? '✅' : ''}</td>
                    <td class="px-8 py-4 text-right">
                        <button onclick="toggleVerify('${u.id}', ${u.isPremium})" 
                            class="px-3 py-1 rounded text-[10px] font-bold ${u.isPremium ? 'bg-red-500/10 text-red-500' : 'bg-blue-600 text-white'}">
                            ${u.isPremium ? 'Revoke' : 'Verify'}
                        </button>
                    </td>
                </tr>`).join('');
        }

        async function loadReports() {
            const table = document.getElementById('reports-table-body');
            const snap = await getDocs(collection(db, "reports"));
            document.getElementById('active-reports-count').innerText = snap.size;
            table.innerHTML = snap.docs.map(d => {
                const r = d.data();
                return `
                    <tr class="border-b border-white/5 bg-red-500/5">
                        <td class="px-8 py-4 text-xs font-bold">${r.listingTitle} <br> <span class="text-red-400 uppercase text-[9px]">${r.reason}</span></td>
                        <td class="px-8 py-4 text-right">
                            <button onclick="deleteReportedListing('${r.listingId}', '${d.id}')" class="text-red-500 text-[10px] font-bold">Remove Item</button>
                        </td>
                    </tr>`;
            }).join('');
        }

        // --- CORE ACTIONS ---
        window.approveItem = async (coll, id) => {
            await updateDoc(doc(db, coll, id), { status: 'active' });
            await sendStatusEmail(coll, id, 'approve');
            refreshDashboard();
        };

        window.rejectItem = async (coll, id) => {
            if(confirm("Delete permanently?")) {
                await sendStatusEmail(coll, id, 'reject');
                await deleteDoc(doc(db, coll, id));
                refreshDashboard();
            }
        };

        window.toggleVerify = async (uid, status) => {
            await updateDoc(doc(db, "users", uid), { isPremium: !status });
            loadUsers();
        };

        window.deleteReportedListing = async (lid, rid) => {
            const categories = ['products', 'jobs', 'rentals', 'transports'];
            for (const cat of categories) { await deleteDoc(doc(db, cat, lid)).catch(()=>{}); }
            await deleteDoc(doc(db, "reports", rid));
            refreshDashboard();
        };

        async function updateStats() {
            const uCount = await getCountFromServer(collection(db, "users"));
            document.getElementById('total-users').innerText = uCount.data().count;
        }

        async function calculateRevenue() {
            let total = 0;
            const categories = ['products', 'jobs', 'rentals', 'transports'];
            for (const cat of categories) {
                const snap = await getDocs(query(collection(db, cat), where("status", "==", "active")));
                snap.forEach(d => total += Number(d.data().price || d.data().salary || d.data().fare || 0));
            }
            document.getElementById('revenue-total').innerText = `₦${total.toLocaleString()}`;
        }

        document.getElementById('user-search').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            renderUsers(allUsers.filter(u => u.fullName?.toLowerCase().includes(term) || u.email?.toLowerCase().includes(term)));
        };

        document.getElementById('admin-logout').onclick = () => signOut(auth).then(() => window.location.href = "index.html");
    </script>
</body>
</html>
