<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub Admin | Kano Marketplace Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-text { text-shadow: 0 0 10px rgba(139, 92, 246, 0.5); }
        
        /* Google Translate Styling */
        #google_translate_element { margin-bottom: 10px; }
        .goog-te-gadget-simple {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 5px 10px !important;
            border-radius: 20px !important;
        }
        .goog-te-gadget-simple span { color: #8B5CF6 !important; font-size: 11px !important; font-weight: bold !important; }
        .goog-te-banner-frame.skiptranslate { display: none !important; } 
        body { top: 0px !important; }
    </style>
</head>
<body class="min-h-screen hidden" id="admin-body">

    <header class="max-w-7xl mx-auto px-6 py-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black tracking-tighter neon-text">K-HUB <span class="text-purple-500">ADMIN</span></h1>
            <p class="text-gray-500 text-xs font-bold uppercase tracking-widest" id="logged-admin">Authenticating...</p>
        </div>
        <div class="flex flex-col items-end gap-3">
            <div id="google_translate_element"></div>
            <button id="admin-logout" class="px-6 py-2 bg-white/5 border border-white/10 rounded-full text-[10px] font-bold hover:bg-red-500/20 hover:text-red-500 transition uppercase tracking-widest">Logout</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 space-y-12 pb-20">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="glass-card p-6 rounded-3xl">
                <p class="text-gray-500 text-[10px] font-bold uppercase mb-2">Total Users</p>
                <h2 id="total-users" class="text-3xl font-black">0</h2>
            </div>
            <div class="glass-card p-6 rounded-3xl border-b-2 border-purple-500">
                <p class="text-gray-500 text-[10px] font-bold uppercase mb-2">Verified Drivers</p>
                <h2 id="verified-drivers-count" class="text-3xl font-black text-purple-400">0</h2>
            </div>
            <div class="glass-card p-6 rounded-3xl border-b-2 border-blue-500">
                <p class="text-gray-500 text-[10px] font-bold uppercase mb-2">Market Volume</p>
                <h2 id="revenue-total" class="text-2xl font-black text-blue-400">₦0</h2>
            </div>
            <div class="glass-card p-6 rounded-3xl border-b-2 border-red-500">
                <p class="text-gray-500 text-[10px] font-bold uppercase mb-2">Active Reports</p>
                <h2 id="active-reports-count" class="text-3xl font-black text-red-500">0</h2>
            </div>
        </div>

        <section class="glass-card rounded-[40px] overflow-hidden border border-purple-500/20">
            <div class="p-8 border-b border-white/10 flex justify-between items-center bg-purple-500/5">
                <h2 class="text-xl font-bold italic">DRIVER <span class="text-purple-500">VERIFICATION</span></h2>
                <span class="px-3 py-1 bg-purple-500/20 text-purple-500 rounded-full text-[10px] font-bold uppercase">Pending IDs</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="text-[10px] uppercase text-gray-500 bg-white/5">
                        <tr>
                            <th class="px-8 py-4">Driver Name</th>
                            <th class="px-8 py-4">Vehicle & Exp</th>
                            <th class="px-8 py-4">Phone</th>
                            <th class="px-8 py-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="drivers-table-body" class="text-sm">
                        </tbody>
                </table>
            </div>
        </section>

        <section class="glass-card rounded-[40px] overflow-hidden border border-white/5">
            <div class="p-8 border-b border-white/10 flex justify-between items-center bg-white/5">
                <h2 class="text-xl font-bold">General Listing Moderation</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="text-[10px] uppercase text-gray-500 bg-white/5">
                        <tr>
                            <th class="px-8 py-4">Item</th>
                            <th class="px-8 py-4">Category</th>
                            <th class="px-8 py-4">Status</th>
                            <th class="px-8 py-4">Price</th>
                            <th class="px-8 py-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="pending-table-body" class="text-sm"></tbody>
                </table>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section class="glass-card rounded-[40px] overflow-hidden border border-white/5">
                <div class="p-8 border-b border-white/10 bg-white/5">
                    <h2 class="text-xl font-bold">User Database</h2>
                </div>
                <div class="max-h-[400px] overflow-y-auto">
                    <table class="w-full text-left">
                        <tbody id="users-table-body" class="text-sm"></tbody>
                    </table>
                </div>
            </section>

            <section class="glass-card rounded-[40px] overflow-hidden border border-red-500/20">
                <div class="p-8 border-b border-white/10 bg-red-500/5">
                    <h2 class="text-xl font-bold text-red-400">Reports Queue</h2>
                </div>
                <div class="max-h-[400px] overflow-y-auto">
                    <table class="w-full text-left">
                        <tbody id="reports-table-body" class="text-sm"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ha,ig,yo,en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { 
            collection, query, where, getDocs, getDoc, doc, updateDoc, deleteDoc, getCountFromServer, onSnapshot 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const ADMIN_EMAIL = "clintzyarts@gmail.com";

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === ADMIN_EMAIL) {
                document.getElementById('admin-body').classList.remove('hidden');
                document.getElementById('logged-admin').innerText = `Admin: ${user.email}`;
                initDashboard();
            } else {
                window.location.href = "index.html";
            }
        });

        function initDashboard() {
            loadItems();
            loadReports();
            loadUsers();
            loadDrivers();
            updateStats();
        }

        // --- NEW: DRIVER MANAGEMENT LOGIC ---
        async function loadDrivers() {
            const table = document.getElementById('drivers-table-body');
            const q = query(collection(db, "drivers"));
            
            onSnapshot(q, (snap) => {
                let vCount = 0;
                table.innerHTML = "";
                snap.forEach(d => {
                    const driver = d.data();
                    if(driver.isVerified) vCount++;
                    
                    table.innerHTML += `
                        <tr class="border-b border-white/5 hover:bg-white/5 transition">
                            <td class="px-8 py-4">
                                <div class="font-bold text-xs">${driver.name}</div>
                                <div class="text-[10px] text-gray-500">${driver.area || 'Kano'}</div>
                            </td>
                            <td class="px-8 py-4">
                                <div class="text-[11px] font-bold text-white">${driver.vehicle}</div>
                                <div class="text-[10px] text-purple-400 font-bold">${driver.experience || 0} Years Exp</div>
                            </td>
                            <td class="px-8 py-4 text-xs font-mono">${driver.phone}</td>
                            <td class="px-8 py-4 text-right">
                                <button onclick="toggleDriverVerify('${d.id}', ${driver.isVerified})" 
                                    class="px-4 py-2 rounded-xl text-[10px] font-black uppercase transition ${driver.isVerified ? 'bg-red-500/10 text-red-500' : 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/20'}">
                                    ${driver.isVerified ? 'Revoke' : 'Verify Driver'}
                                </button>
                            </td>
                        </tr>`;
                });
                document.getElementById('verified-drivers-count').innerText = vCount;
            });
        }

        window.toggleDriverVerify = async (id, currentStatus) => {
            try {
                await updateDoc(doc(db, "drivers", id), { isVerified: !currentStatus });
            } catch (e) { alert("Error updating driver status"); }
        };

        // --- EXISTING MODERATION LOGIC ---
        async function loadItems() {
            const table = document.getElementById('pending-table-body');
            const categories = ['products', 'jobs', 'rentals', 'transports'];
            table.innerHTML = "";
            let totalRev = 0;
            
            for (const cat of categories) {
                const snap = await getDocs(collection(db, cat));
                snap.forEach(d => {
                    const item = d.data();
                    const isPending = item.status === 'pending';
                    totalRev += Number(item.price || 0);

                    table.innerHTML += `
                        <tr class="border-b border-white/5 hover:bg-white/5 transition">
                            <td class="px-8 py-4 font-bold text-xs">${item.name || item.title}</td>
                            <td class="px-8 py-4 uppercase text-[10px] text-purple-400">${cat}</td>
                            <td class="px-8 py-4">
                                <span class="px-2 py-1 rounded text-[9px] font-bold ${isPending ? 'bg-orange-500/20 text-orange-500' : 'bg-emerald-500/20 text-emerald-500'}">
                                    ${item.status.toUpperCase()}
                                </span>
                            </td>
                            <td class="px-8 py-4 font-bold text-xs">₦${Number(item.price || 0).toLocaleString()}</td>
                            <td class="px-8 py-4 text-right flex gap-2 justify-end">
                                ${isPending ? `<button onclick="approveItem('${cat}', '${d.id}')" class="bg-emerald-600 px-3 py-1 rounded text-[10px] font-bold">Approve</button>` : ''}
                                <button onclick="deleteListing('${cat}', '${d.id}')" class="bg-red-500/10 text-red-500 px-3 py-1 rounded text-[10px] font-bold">Delete</button>
                            </td>
                        </tr>`;
                });
            }
            document.getElementById('revenue-total').innerText = `₦${totalRev.toLocaleString()}`;
        }

        window.approveItem = async (coll, id) => {
            await updateDoc(doc(db, coll, id), { status: 'active' });
            loadItems();
        };

        window.deleteListing = async (coll, id) => {
            if(confirm("Delete this listing?")) {
                await deleteDoc(doc(db, coll, id));
                loadItems();
            }
        };

        async function updateStats() {
            const uCount = await getCountFromServer(collection(db, "users"));
            document.getElementById('total-users').innerText = uCount.data().count;
            
            const rSnap = await getDocs(collection(db, "reports"));
            document.getElementById('active-reports-count').innerText = rSnap.size;
        }

        document.getElementById('admin-logout').onclick = () => signOut(auth).then(() => window.location.href = "index.html");

    </script>
</body>
</html>
