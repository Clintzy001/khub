<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); margin: 0; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .whatsapp-btn { background: #25D366; color: white; transition: all 0.3s ease; }
        .whatsapp-btn:hover { background: #128C7E; transform: scale(1.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        
        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #mobile-menu.active { transform: translateX(0); }
        
        .lang-dropdown { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 6px 10px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; outline: none; cursor: pointer; }
        .lang-dropdown option { background: #06080C; color: white; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="edit-modal" class="modal px-4">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-md border-purple-500/30">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-6 lang-edit-head">Edit Profile</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 block mb-1 lang-label-name">Full Name / Store Name</label>
                    <input type="text" id="edit-name" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 text-white font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 block mb-1 lang-label-phone">WhatsApp Number</label>
                    <input type="tel" id="edit-phone" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 text-white font-bold">
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="toggleModal(false)" class="flex-1 py-3 text-gray-400 font-black uppercase text-xs lang-cancel">Cancel</button>
                    <button id="save-profile-btn" class="flex-1 neon-gradient py-3 rounded-xl font-black uppercase text-xs text-white lang-save">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mobile-menu" class="fixed inset-0 z-[100] bg-[#06080C]/98 backdrop-blur-2xl p-8 flex flex-col md:hidden">
        <div class="flex justify-between items-center mb-12">
             <div class="flex flex-col items-center">
                <svg class="w-10 h-10 mb-1" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#k-grad-shop-mob)"/>
                    <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs><linearGradient id="k-grad-shop-mob" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
                </svg>
                <h1 class="text-[8px] font-black italic tracking-tighter leading-none">K-HUB</h1>
            </div>
            <button onclick="toggleMenu()" class="text-white p-2 glass-card">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav class="flex flex-col gap-6 text-2xl font-bold uppercase italic tracking-tighter">
            <a href="index.html" class="text-gray-400 pl-4 lang-home">Home</a>
            <a href="user-dashboard.html" class="text-gray-400 pl-4 lang-dash">Dashboard</a>
            <a href="shop.html" class="text-gray-400 pl-4 lang-shop">Shop</a>
            <hr class="border-white/10 my-2">
            <select id="lang-select-mobile" class="lang-dropdown w-full mt-2">
                <option value="en">English</option>
                <option value="ha">Hausa</option>
                <option value="ig">Igbo</option>
                <option value="yo">Yoruba</option>
            </select>
        </nav>
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-white/5 max-w-6xl mx-auto">
        <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
            <svg class="w-10 h-10 mb-1" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="10" fill="url(#k-grad-shop)"/>
                <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                <defs>
                    <linearGradient id="k-grad-shop" x1="0" y1="0" x2="40" y2="40">
                        <stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/>
                    </linearGradient>
                </defs>
            </svg>
            <h1 class="text-[8px] font-black italic tracking-tighter leading-none">K-HUB</h1>
        </div>

        <div class="flex items-center gap-6">
            <select id="lang-select-desktop" class="lang-dropdown hidden md:block">
                <option value="en">English</option>
                <option value="ha">Hausa</option>
                <option value="ig">Igbo</option>
                <option value="yo">Yoruba</option>
            </select>
            <button onclick="window.location.href='user-dashboard.html'" class="hidden md:block text-[10px] font-black uppercase text-gray-400 hover:text-white transition tracking-widest lang-back-dash">Back to Dashboard</button>
            <button onclick="toggleMenu()" class="md:hidden p-2 glass-card border-white/10">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto mt-10 px-4">
        <div class="glass-card p-10 rounded-[40px] text-center mb-10 relative border-purple-500/10">
            <button id="edit-trigger" class="hidden absolute top-6 right-8 text-[9px] text-purple-400 font-black uppercase border border-purple-400/30 px-4 py-2 rounded-full hover:bg-purple-400 hover:text-white transition lang-edit-btn">
                Edit Profile
            </button>

            <div id="profile-avatar" class="w-24 h-24 neon-gradient rounded-full mx-auto mb-4 flex items-center justify-center text-4xl font-black text-white shadow-lg shadow-purple-500/30 italic">
                ?
            </div>
            
            <h1 id="profile-name" class="text-3xl font-black italic uppercase tracking-tighter mb-1">Loading...</h1>
            <p id="follower-count" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3">0 Followers</p>
            <div id="profile-badge" class="mb-4"></div>
            
            <div class="flex flex-col sm:flex-row justify-center gap-3 mt-4">
                <div id="contact-container" class="hidden">
                    <a id="whatsapp-link" href="#" target="_blank" class="whatsapp-btn flex items-center gap-2 px-8 py-3 rounded-2xl font-black uppercase text-xs tracking-widest">
                        <span class="lang-msg-seller">Message Seller</span>
                    </a>
                </div>
                <button id="follow-btn" class="hidden bg-white/10 hover:bg-white/20 border border-white/10 px-8 py-3 rounded-2xl font-black uppercase text-xs tracking-widest transition lang-follow">
                    Follow
                </button>
            </div>
        </div>

        <h2 class="text-xl font-black italic uppercase tracking-tighter mb-6 px-2 lang-listings-head">Listings</h2>
        <div id="public-listings" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        <div id="my-listings" class="grid gap-4"></div>
        <div id="empty-state" class="hidden text-center py-10">
            <p class="text-gray-500 font-bold italic lang-no-listings text-sm">No listings found for this user.</p>
        </div>
    </div>

    <script type="module">
        import { auth, db, sendNotification } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, getDocs, doc, getDoc, updateDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const profileId = urlParams.get('id');

        window.toggleMenu = () => document.getElementById('mobile-menu').classList.toggle('active');
        window.toggleModal = (show) => document.getElementById('edit-modal').classList.toggle('active', show);

        const translations = {
            en: { home: "Home", dash: "Dashboard", shop: "Shop", editBtn: "Edit Profile", editHead: "Edit Profile", labelName: "Full Name / Store Name", labelPhone: "WhatsApp Number", cancel: "Cancel", save: "Save Changes", backDash: "Back to Dashboard", msgSeller: "Message Seller", follow: "Follow", following: "Following", listingsHead: "Listings", verified: "VERIFIED SELLER ✅", followers: "Followers", updated: "Profile Updated!", noListings: "No listings found for this user." },
            ha: { home: "Gida", dash: "Sashin Kulawa", shop: "Shago", editBtn: "Gyara Bayani", editHead: "Gyara Bayanan Ka", labelName: "Cikakken Suna", labelPhone: "Lambar WhatsApp", cancel: "Soke", save: "Ajiye", backDash: "Koma Sashin Kulawa", msgSeller: "Yi Magana da Mai Shago", follow: "Bi Mu", following: "Kana Bi", listingsHead: "Tallace-tallace", verified: "MAI SHAGO INGANNTACCE ✅", followers: "Masu Bi", updated: "An sabunta!", noListings: "Ba a sami wani tallace-tallace ba." },
            ig: { home: "Ụlọ", dash: "Dashboard", shop: "Ụlọ Ahịa", editBtn: "Dezie Profaịlụ", editHead: "Dezie Profaịlụ", labelName: "Aha zuru ezu", labelPhone: "Nọmba WhatsApp", cancel: "Kagbuo", save: "Chekwaa", backDash: "Laghachi na Dashboard", msgSeller: "Gwa Onye Na-ere Ahịa", follow: "Soro", following: "Na-eso", listingsHead: "Ihe Ndị A Na-ere", verified: "ONYE NA-ERE AHỊA ✅", followers: "Ndị Na-eso", updated: "Emelitere!", noListings: "Enweghị ihe achọtara." },
            yo: { home: "Ilé", dash: "Dashboard", shop: "Ìtajà", editBtn: "Ṣatúnṣe Profaịlụ", editHead: "Ṣatúnṣe Profaịlụ", labelName: "Orukọ Kikun", labelPhone: "Nọmba WhatsApp", cancel: "Fagilee", save: "Fi Pamọ́", backDash: "Padà sí Dashboard", msgSeller: "Bá Olùtajà Sọ̀rọ̀", follow: "Tẹ̀lé", following: "Ò ń Tẹ̀lé", listingsHead: "Àwọn Ọjà", verified: "OLÙTAJÀ TÍ A FỌWỌ́SÍ ✅", followers: "Awọn Olutẹle", updated: "A ti túnṣe!", noListings: "Kò sí ọjà kankan." }
        };

        function applyLanguage(lang) {
            const l = translations[lang];
            document.querySelectorAll('.lang-home').forEach(el => el.innerText = l.home);
            document.querySelectorAll('.lang-dash').forEach(el => el.innerText = l.dash);
            document.querySelectorAll('.lang-shop').forEach(el => el.innerText = l.shop);
            document.querySelector('.lang-edit-btn').innerText = l.editBtn;
            document.querySelector('.lang-edit-head').innerText = l.editHead;
            document.querySelector('.lang-label-name').innerText = l.labelName;
            document.querySelector('.lang-label-phone').innerText = l.labelPhone;
            document.querySelector('.lang-cancel').innerText = l.cancel;
            document.querySelector('.lang-save').innerText = l.save;
            document.querySelector('.lang-back-dash').innerText = l.backDash;
            document.querySelector('.lang-msg-seller').innerText = l.msgSeller;
            document.querySelector('.lang-no-listings').innerText = l.noListings;
            
            const followBtn = document.getElementById('follow-btn');
            if(!followBtn.classList.contains('bg-purple-600')) followBtn.innerText = l.follow;
            else followBtn.innerText = l.following;
            
            document.querySelector('.lang-listings-head').innerText = l.listingsHead;
            localStorage.setItem('kHubLang', lang);
            document.getElementById('lang-select-desktop').value = lang;
            document.getElementById('lang-select-mobile').value = lang;
        }

        document.getElementById('lang-select-desktop').addEventListener('change', (e) => applyLanguage(e.target.value));
        document.getElementById('lang-select-mobile').addEventListener('change', (e) => applyLanguage(e.target.value));

        onAuthStateChanged(auth, async (user) => {
            const isOwner = !profileId || (user && user.uid === profileId);
            const targetId = profileId || (user ? user.uid : null);
            if (!targetId) { window.location.href = "k-hub-login.html"; return; }

            if (isOwner) {
                document.getElementById('edit-trigger').classList.remove('hidden');
                document.getElementById('edit-trigger').onclick = () => toggleModal(true);
            } else if (user) {
                document.getElementById('follow-btn').classList.remove('hidden');
                setupFollowLogic(user.uid, targetId, user.displayName);
            }

            const userDoc = await getDoc(doc(db, "users", targetId));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                updateProfileUI(userData);
                document.getElementById('edit-name').value = userData.fullName || "";
                document.getElementById('edit-phone').value = userData.phone || "";
                
                document.getElementById('save-profile-btn').onclick = async () => {
                    const btn = document.getElementById('save-profile-btn');
                    btn.disabled = true; btn.innerText = "...";
                    try {
                        await updateDoc(doc(db, "users", targetId), {
                            fullName: document.getElementById('edit-name').value.trim(),
                            phone: document.getElementById('edit-phone').value.trim()
                        });
                        location.reload();
                    } catch(e) { alert("Error updating profile"); btn.disabled = false; btn.innerText = translations[localStorage.getItem('kHubLang') || 'en'].save; }
                };
            }
            getFollowerCount(targetId);
            loadItems(targetId, profileId ? 'active' : null);
        });

        async function setupFollowLogic(myId, targetId, myName) {
            const btn = document.getElementById('follow-btn');
            const docRef = doc(db, "follows", `${myId}_${targetId}`);
            const followDoc = await getDoc(docRef);
            let isFollowing = followDoc.exists();
            updateFollowBtnUI(isFollowing);

            btn.onclick = async () => {
                if (!isFollowing) {
                    await setDoc(docRef, { followerId: myId, followingId: targetId, timestamp: serverTimestamp() });
                    await sendNotification(targetId, 'follow', 'New Follower! 👤', `${myName || 'A user'} started following you.`);
                    isFollowing = true;
                } else {
                    await deleteDoc(docRef);
                    isFollowing = false;
                }
                updateFollowBtnUI(isFollowing);
                getFollowerCount(targetId);
            };
        }

        function updateFollowBtnUI(isFollowing) {
            const btn = document.getElementById('follow-btn');
            const lang = localStorage.getItem('kHubLang') || 'en';
            if (isFollowing) {
                btn.innerText = translations[lang].following;
                btn.classList.replace('bg-white/10', 'bg-purple-600');
            } else {
                btn.innerText = translations[lang].follow;
                btn.classList.replace('bg-purple-600', 'bg-white/10');
            }
        }

        async function getFollowerCount(targetId) {
            const lang = localStorage.getItem('kHubLang') || 'en';
            const q = query(collection(db, "follows"), where("followingId", "==", targetId));
            const snapshot = await getDocs(q);
            document.getElementById('follower-count').innerText = `${snapshot.size} ${translations[lang].followers}`;
        }

        function updateProfileUI(userData) {
            const name = userData.fullName || "User";
            const lang = localStorage.getItem('kHubLang') || 'en';
            document.getElementById('profile-name').innerText = name;
            document.getElementById('profile-avatar').innerText = name.charAt(0);

            if (userData.isPremium) {
                document.getElementById('profile-badge').innerHTML = 
                    `<span class="bg-blue-500/10 text-blue-400 px-4 py-1.5 rounded-full text-[9px] font-black border border-blue-500/30 tracking-widest uppercase italic">${translations[lang].verified}</span>`;
            }

            if (profileId && userData.phone) {
                const contactBox = document.getElementById('contact-container');
                const waLink = document.getElementById('whatsapp-link');
                let cleanPhone = userData.phone.replace(/^0/, '234'); 
                waLink.href = `https://wa.me/${cleanPhone}?text=Hello,%20I%20saw%20your%20listing%20on%20K-Hub!`;
                contactBox.classList.remove('hidden');
            }
        }

        async function loadItems(uid, filterStatus) {
            const collections = ['products', 'jobs', 'rentals', 'transport'];
            const container = document.getElementById(profileId ? 'public-listings' : 'my-listings');
            container.innerHTML = "";
            let count = 0;
            for (const coll of collections) {
                let q = query(collection(db, coll), where("userId", "==", uid));
                if (filterStatus) q = query(collection(db, coll), where("userId", "==", uid), where("status", "==", filterStatus));
                const snapshot = await getDocs(q);
                snapshot.forEach(item => {
                    count++;
                    container.innerHTML += createItemHTML(item.data(), coll, !profileId);
                });
            }
            if (count === 0) document.getElementById('empty-state').classList.remove('hidden');
        }

        function createItemHTML(data, type, isDashboard) {
            const price = data.price || data.fare || data.salary || 0;
            if (!isDashboard) {
                return `
                    <div class="glass-card rounded-[32px] overflow-hidden hover:scale-[1.02] transition border-white/5">
                        <img src="${data.imageUrl || 'https://via.placeholder.com/300'}" class="w-full h-48 object-cover">
                        <div class="p-5">
                            <p class="text-[9px] text-purple-400 font-black uppercase tracking-widest mb-1">${type}</p>
                            <h4 class="font-black text-white italic uppercase tracking-tighter">${data.name || data.title}</h4>
                            <p class="text-emerald-400 font-black mt-2 text-lg italic">₦${Number(price).toLocaleString()}</p>
                        </div>
                    </div>`;
            } else {
                const statusColor = data.status === 'active' ? 'text-emerald-400' : 'text-yellow-400';
                return `
                    <div class="glass-card p-5 rounded-2xl flex justify-between items-center mb-3 border-white/5">
                        <div class="flex items-center gap-4 text-left">
                            <div class="w-14 h-14 rounded-xl bg-white/5 overflow-hidden flex items-center justify-center">${data.imageUrl ? `<img src="${data.imageUrl}" class="w-full h-full object-cover">` : '📦'}</div>
                            <div>
                                <h4 class="font-black text-sm text-white uppercase italic tracking-tighter">${data.name || data.title}</h4>
                                <p class="text-[9px] font-black uppercase text-gray-500 tracking-widest">${type}</p>
                            </div>
                        </div>
                        <span class="text-[9px] font-black ${statusColor} bg-white/5 px-3 py-1.5 rounded-lg border border-white/5 tracking-widest">${(data.status || 'ACTIVE').toUpperCase()}</span>
                    </div>`;
            }
        }
        applyLanguage(localStorage.getItem('kHubLang') || 'en');
    </script>
</body>
</html>
