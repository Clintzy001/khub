<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); margin: 0; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .whatsapp-btn { background: #25D366; color: white; transition: all 0.3s ease; }
        .whatsapp-btn:hover { background: #128C7E; transform: scale(1.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #mobile-menu.active { transform: translateX(0); }
        .lang-dropdown { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 6px 10px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; outline: none; cursor: pointer; }
        .lang-dropdown option { background: #06080C; color: white; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="edit-modal" class="modal px-4">
        <div class="glass-card p-8 rounded-[32px] w-full max-w-md border-purple-500/30">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter mb-6 lang-edit-head">Edit Profile</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 block mb-1 lang-label-name">Full Name / Store Name</label>
                    <input type="text" id="edit-name" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 text-white font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-400 block mb-1 lang-label-phone">WhatsApp Number</label>
                    <input type="tel" id="edit-phone" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-purple-500 text-white font-bold">
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="toggleModal(false)" class="flex-1 py-3 text-gray-400 font-black uppercase text-xs lang-cancel">Cancel</button>
                    <button id="save-profile-btn" class="flex-1 neon-gradient py-3 rounded-xl font-black uppercase text-xs text-white lang-save">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center border-b border-white/5 max-w-6xl mx-auto">
        <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
            <svg class="w-10 h-10 mb-1" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="10" fill="url(#k-grad-shop)"/><path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                <defs><linearGradient id="k-grad-shop" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
            </svg>
            <h1 class="text-[8px] font-black italic tracking-tighter leading-none">K-HUB</h1>
        </div>
        <div class="flex items-center gap-6">
            <select id="lang-select-desktop" class="lang-dropdown hidden md:block">
                <option value="en">English</option><option value="ha">Hausa</option><option value="ig">Igbo</option><option value="yo">Yoruba</option>
            </select>
            <button onclick="window.location.href='user-dashboard.html'" class="hidden md:block text-[10px] font-black uppercase text-gray-400 hover:text-white transition tracking-widest lang-back-dash">Back to Dashboard</button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto mt-10 px-4 text-center">
        <div class="glass-card p-10 rounded-[40px] mb-10 relative border-purple-500/10">
            <button id="edit-trigger" class="hidden absolute top-6 right-8 text-[9px] text-purple-400 font-black uppercase border border-purple-400/30 px-4 py-2 rounded-full hover:bg-purple-400 hover:text-white transition lang-edit-btn">Edit Profile</button>
            <div id="profile-avatar" class="w-24 h-24 neon-gradient rounded-full mx-auto mb-4 flex items-center justify-center text-4xl font-black text-white shadow-lg italic">?</div>
            <h1 id="profile-name" class="text-3xl font-black italic uppercase tracking-tighter mb-1">Loading...</h1>
            <p id="follower-count" class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3">0 Followers</p>
            <div id="profile-badge" class="mb-4"></div>
            <div class="flex flex-col sm:flex-row justify-center gap-3">
                <div id="contact-container" class="hidden"><a id="whatsapp-link" href="#" target="_blank" class="whatsapp-btn flex items-center gap-2 px-8 py-3 rounded-2xl font-black uppercase text-xs tracking-widest"><span class="lang-msg-seller">Message Seller</span></a></div>
                <button id="follow-btn" class="hidden bg-white/10 hover:bg-white/20 border border-white/10 px-8 py-3 rounded-2xl font-black uppercase text-xs tracking-widest transition lang-follow">Follow</button>
            </div>
        </div>

        <h2 class="text-xl font-black italic uppercase tracking-tighter mb-6 text-left px-2 lang-listings-head">Listings</h2>
        <div id="public-listings" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        <div id="empty-state" class="hidden text-center py-10"><p class="text-gray-500 font-bold italic lang-no-listings text-sm">No listings found.</p></div>
    </div>

    <script type="module">
        import { auth, db, sendNotification } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, getDocs, doc, getDoc, updateDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const profileId = urlParams.get('id');
        let currentUserIsAdmin = false;

        const translations = {
            en: { home: "Home", dash: "Dashboard", shop: "Shop", editBtn: "Edit Profile", editHead: "Edit Profile", labelName: "Full Name", labelPhone: "WhatsApp", cancel: "Cancel", save: "Save", backDash: "Back to Dashboard", msgSeller: "Message Seller", follow: "Follow", following: "Following", listingsHead: "Listings", verified: "VERIFIED SELLER ✅", followers: "Followers", updated: "Updated!", noListings: "No listings found.", delete: "Delete Item" },
            ha: { home: "Gida", dash: "Sashin Kulawa", shop: "Shago", editBtn: "Gyara Bayani", editHead: "Gyara Bayanan Ka", labelName: "Cikakken Suna", labelPhone: "WhatsApp", cancel: "Soke", save: "Ajiye", backDash: "Koma Baya", msgSeller: "Yi Magana", follow: "Bi Mu", following: "Kana Bi", listingsHead: "Tallace-tallace", verified: "INGANNTACCE ✅", followers: "Masu Bi", updated: "An sabunta!", noListings: "Ba a sami tallace-tallace ba.", delete: "Goge Wannan" },
            // (Add IG/YO translations here as per previous versions)
        };

        window.applyLanguage = (lang) => {
            const l = translations[lang] || translations.en;
            document.querySelectorAll('.lang-home').forEach(el => el.innerText = l.home);
            document.querySelectorAll('.lang-dash').forEach(el => el.innerText = l.dash);
            document.querySelectorAll('.lang-edit-btn').forEach(el => el.innerText = l.editBtn);
            document.querySelectorAll('.lang-msg-seller').forEach(el => el.innerText = l.msgSeller);
            document.querySelectorAll('.lang-listings-head').forEach(el => el.innerText = l.listingsHead);
            localStorage.setItem('kHubLang', lang);
        };

        onAuthStateChanged(auth, async (user) => {
            const targetId = profileId || (user ? user.uid : null);
            if (!targetId) { window.location.href = "k-hub-login.html"; return; }

            // Check if logged in user is Admin
            if (user) {
                const adminDoc = await getDoc(doc(db, "users", user.uid));
                if (adminDoc.exists() && adminDoc.data().isAdmin) currentUserIsAdmin = true;
            }

            const isOwner = user && user.uid === targetId;
            if (isOwner) document.getElementById('edit-trigger').classList.remove('hidden');

            const userDoc = await getDoc(doc(db, "users", targetId));
            if (userDoc.exists()) updateProfileUI(userDoc.data());

            loadItems(targetId);
            applyLanguage(localStorage.getItem('kHubLang') || 'en');
        });

        async function loadItems(uid) {
            const collections = ['products', 'jobs', 'rentals', 'transport'];
            const container = document.getElementById('public-listings');
            container.innerHTML = "";
            let count = 0;

            for (const coll of collections) {
                const q = query(collection(db, coll), where("userId", "==", uid));
                const snapshot = await getDocs(q);
                snapshot.forEach(itemDoc => {
                    count++;
                    const data = itemDoc.data();
                    const card = document.createElement('div');
                    card.className = "glass-card rounded-[32px] overflow-hidden border-white/5 relative";
                    card.innerHTML = `
                        <img src="${data.imageUrl || 'https://via.placeholder.com/300'}" class="w-full h-48 object-cover">
                        <div class="p-5">
                            <p class="text-[9px] text-purple-400 font-black uppercase mb-1">${coll}</p>
                            <h4 class="font-black text-white italic uppercase">${data.name || data.title}</h4>
                            <p class="text-emerald-400 font-black mt-2">₦${Number(data.price || 0).toLocaleString()}</p>
                            ${currentUserIsAdmin ? `<button onclick="adminDeleteItem('${coll}', '${itemDoc.id}')" class="mt-4 w-full py-2 bg-red-500/10 text-red-500 border border-red-500/20 rounded-xl text-[10px] font-black uppercase hover:bg-red-500 hover:text-white transition">Delete Listing</button>` : ''}
                        </div>`;
                    container.appendChild(card);
                });
            }
            if (count === 0) document.getElementById('empty-state').classList.remove('hidden');
        }

        window.adminDeleteItem = async (coll, id) => {
            if (confirm("ADMIN ACTION: Are you sure you want to delete this offensive content?")) {
                try {
                    await deleteDoc(doc(db, coll, id));
                    alert("Deleted successfully.");
                    location.reload();
                } catch (e) { alert("Permission denied."); }
            }
        };

        // UI Helpers (Avatar, Followers, etc.)
        function updateProfileUI(userData) {
            document.getElementById('profile-name').innerText = userData.fullName || "User";
            document.getElementById('profile-avatar').innerText = (userData.fullName || "U").charAt(0);
            if (profileId && userData.phone) {
                document.getElementById('contact-container').classList.remove('hidden');
                document.getElementById('whatsapp-link').href = `https://wa.me/${userData.phone.replace(/^0/, '234')}`;
            }
        }
    </script>
</body>
</html>
