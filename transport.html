<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Find Your Ride in Kano</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); margin: 0; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .btn-gradient { background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%); transition: all 0.3s ease; }
        .lang-dropdown { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 6px 12px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; outline: none; cursor: pointer; }
        
        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #mobile-menu.active { transform: translateX(0); }
        
        input[type='range'] { accent-color: #8B5CF6; }
        .trip-card:hover { border-color: rgba(139, 92, 246, 0.5); transform: translateY(-5px); }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">

    <div id="mobile-menu" class="fixed inset-0 z-[100] bg-[#06080C]/98 backdrop-blur-2xl p-8 flex flex-col md:hidden">
        <div class="flex justify-between items-center mb-12">
            <div class="flex flex-col items-center">
                <svg class="w-10 h-10 mb-1" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#k-grad-mob)"/>
                    <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs><linearGradient id="k-grad-mob" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
                </svg>
                <h1 class="text-[8px] font-black italic tracking-tighter leading-none">K-HUB</h1>
            </div>
            <button onclick="toggleMenu()" class="text-white p-2 glass-panel border-white/20">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav class="flex flex-col gap-8 text-3xl font-black uppercase tracking-tighter italic">
            <a href="index.html" class="text-gray-500 hover:text-white transition lang-home">Home</a>
            <a href="shop.html" class="text-gray-500 hover:text-white transition lang-shop">Shop</a>
            <a href="job-search.html" class="text-gray-500 hover:text-white transition lang-jobs">Jobs</a>
            <a href="rentals.html" class="text-gray-500 hover:text-white transition lang-rentals">Rentals</a>
            <a href="transport.html" class="text-white border-l-4 border-purple-500 pl-4 lang-transport">Transport</a>
            <div id="mobile-auth-section" class="flex flex-col gap-4 border-t border-white/10 pt-6"></div>
        </nav>
        <div class="mt-auto">
            <p class="text-[10px] uppercase tracking-[0.3em] text-purple-400 mb-4 font-black">Language / Harshe</p>
            <select id="lang-select-mobile" class="lang-select-dropdown lang-dropdown w-full" onchange="applyLanguage(this.value)">
                <option value="en">English</option>
                <option value="ha">Hausa</option>
                <option value="ig">Igbo</option>
                <option value="yo">Yoruba</option>
            </select>
        </div>
    </div>

    <div class="max-w-7xl mx-auto glass-panel p-6 md:p-10 relative overflow-hidden ring-1 ring-purple-500/20 shadow-2xl">
        
        <header class="flex justify-between items-center mb-12">
            <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
                <svg class="w-12 h-12 mb-1" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#k-grad-shop)"/>
                    <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs><linearGradient id="k-grad-shop" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
                </svg>
                <h1 class="text-[10px] font-black italic tracking-tighter leading-none uppercase">K-HUB</h1>
            </div>

            <nav class="hidden md:flex gap-8 text-[11px] font-black text-gray-400 uppercase tracking-widest">
                <a href="index.html" class="hover:text-white transition lang-home">Home</a>
                <a href="shop.html" class="hover:text-white transition lang-shop">Shop</a>
                <a href="job-search.html" class="hover:text-white transition lang-jobs">Jobs</a>
                <a href="rentals.html" class="hover:text-white transition lang-rentals">Rentals</a>
                <a href="transport.html" class="text-white border-b-2 border-purple-500 pb-1 lang-transport">Transport</a>
            </nav>

            <div class="flex items-center gap-4">
                <select id="lang-select-desktop" class="lang-select-dropdown lang-dropdown hidden md:block" onchange="applyLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="ha">Hausa</option>
                    <option value="ig">Igbo</option>
                    <option value="yo">Yoruba</option>
                </select>
                
                <div id="desktop-auth-section" class="flex items-center gap-4">
                    <span class="global-username text-xs font-bold text-purple-400"></span>
                    <button id="global-auth-btn" class="btn-gradient px-4 py-2 rounded-xl text-[10px] font-black uppercase italic">
                        Login
                    </button>
                </div>
                <button onclick="toggleMenu()" class="md:hidden p-2 glass-panel border-white/10">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-8">
                <section class="mb-10">
                    <h1 class="text-4xl md:text-5xl font-black mb-2 tracking-tighter uppercase italic lang-transport-title" data-lang-key="transportTitle">Find Your Ride</h1>
                    <div class="h-1 w-24 bg-blue-500 mb-8 rounded-full"></div>
                    
                    <div class="glass-panel p-2 flex flex-col md:flex-row items-center gap-2 mb-6 border-white/10">
                        <div class="flex items-center gap-2 flex-1 px-4 py-3 border-b md:border-b-0 md:border-r border-white/10 w-full">
                            <input type="text" id="from-input" placeholder="From (e.g. Sabon Gari)" class="bg-transparent outline-none text-sm w-full font-bold">
                        </div>
                        <div class="flex items-center gap-2 flex-1 px-4 py-3 border-b md:border-b-0 md:border-r border-white/10 w-full">
                            <input type="text" id="to-input" placeholder="To (e.g. Hotoro)" class="bg-transparent outline-none text-sm w-full font-bold">
                        </div>
                        <button class="btn-gradient p-3 px-6 rounded-xl w-full md:w-auto font-black text-xs uppercase tracking-widest lang-search" data-lang-key="search">Search</button>
                    </div>
                </section>

                <div id="transport-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                    <div class="col-span-full text-center py-10 text-gray-600 animate-pulse uppercase font-black text-[10px] tracking-[0.3em] lang-syncing" data-lang-key="syncing">Syncing Live Trips...</div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-8">
                <div class="glass-panel p-6 border-white/10">
                    <h3 class="text-[10px] font-black uppercase tracking-widest mb-8 text-gray-500 lang-filter" data-lang-key="filter">Filter Results</h3>
                    <div>
                        <div class="flex justify-between mb-4">
                            <p class="text-[10px] font-black uppercase text-gray-400 lang-seats" data-lang-key="seats">Seats Needed</p>
                            <span id="seat-count" class="text-purple-500 font-black text-[10px]">ANY</span>
                        </div>
                        <input type="range" min="1" max="10" value="1" oninput="document.getElementById('seat-count').innerText = this.value" class="w-full cursor-pointer">
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-20 flex flex-col md:flex-row justify-between items-center text-[10px] text-gray-500 border-t border-white/5 pt-8 gap-8 font-black uppercase tracking-[0.2em]">
            <div class="flex gap-8">
                <a href="about.html" class="hover:text-purple-400 transition lang-about">About</a>
                <a href="#" class="hover:text-purple-400 transition">Help</a>
                <a href="#" class="hover:text-purple-400 transition">Privacy</a>
            </div>
            <div class="text-center">K-HUB GLOBAL | <span class="text-white">2026</span></div>
        </footer>
    </div>

    <script>
        const translations = {
            en: { home: "Home", shop: "Shop", jobs: "Jobs", rentals: "Rentals", transport: "Transport", transportTitle: "Find Your Ride", fromPh: "From (e.g. Sabon Gari)", toPh: "To (e.g. Hotoro)", search: "Search", syncing: "Syncing Live Trips...", filter: "Filter Results", seats: "Seats Needed", dash: "Dashboard", login: "Login", book: "Book Seat", logout: "Sign Out", about: "About" },
            ha: { home: "Gida", shop: "Shago", jobs: "Ayyuka", rentals: "Gidajen Haya", transport: "Sufuri", transportTitle: "Nemi Motar Ka", fromPh: "Daga Ina (Misali: Sabon Gari)", toPh: "Ina Za Ka (Misali: Hotoro)", search: "Nema", syncing: "Ana Neman Motoci...", filter: "Tace Sakamako", seats: "Yawan Kujera", dash: "Sashin Kulawa", login: "Shiga", book: "Gano Kujera", logout: "Fita", about: "Game da Mu" },
            ig: { home: "Ụlọ", shop: "Ụlọ Ahịa", jobs: "Ọrụ", rentals: "Ụlọ Mbiri", transport: "Ụgbọala", transportTitle: "Chọta Ụgbọala Gị", fromPh: "Ebe I si (dịka Sabon Gari)", toPh: "Ebe I na-aga (dịka Hotoro)", search: "Chọọ", syncing: "Na-achọ ụgbọala...", filter: "Ihe Nzacha", seats: "Oche achọrọ", dash: "Dashboard", login: "Banye", book: "Debe oche", logout: "Pụọ", about: "Gbasara Anyị" },
            yo: { home: "Ilé", shop: "Ìtajà", jobs: "Iṣẹ́", rentals: "Ilé Yáya", transport: "Ọkọ̀", transportTitle: "Wá Ọkọ̀ Rẹ", fromPh: "Níbi tó o ti wá", toPh: "Níbi tó o ń lọ", search: "Wá", syncing: "À ń wá ọkọ̀...", filter: "Sẹ́ Ìyọrísí", seats: "Iye Ibùjókòó", dash: "Dashboard", login: "Wọlé", book: "Gba Ibùjókòó", logout: "Jáde", about: "Nípa Wa" }
        };

        function applyLanguage(lang) {
            const l = translations[lang];
            localStorage.setItem('kHubLang', lang);
            
            document.querySelectorAll('.lang-home').forEach(el => el.innerText = l.home);
            document.querySelectorAll('.lang-shop').forEach(el => el.innerText = l.shop);
            document.querySelectorAll('.lang-jobs').forEach(el => el.innerText = l.jobs);
            document.querySelectorAll('.lang-rentals').forEach(el => el.innerText = l.rentals);
            document.querySelectorAll('.lang-transport').forEach(el => el.innerText = l.transport);
            document.querySelectorAll('.lang-about').forEach(el => el.innerText = l.about);
            
            document.querySelector('.lang-transport-title').innerText = l.transportTitle;
            document.getElementById('from-input').placeholder = l.fromPh;
            document.getElementById('to-input').placeholder = l.toPh;
            document.querySelector('.lang-search').innerText = l.search;
            if(document.querySelector('.lang-syncing')) document.querySelector('.lang-syncing').innerText = l.syncing;
            document.querySelector('.lang-filter').innerText = l.filter;
            document.querySelector('.lang-seats').innerText = l.seats;
            
            document.querySelectorAll('.lang-select-dropdown').forEach(d => d.value = lang);
            window.dispatchEvent(new CustomEvent('langChanged', { detail: lang }));
        }

        window.toggleMenu = () => {
            document.getElementById('mobile-menu').classList.toggle('active');
        };

        window.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('kHubLang') || 'en';
            applyLanguage(savedLang);
        });
    </script>

    <script type="module">
        import { auth, db, doc, setDoc, onSnapshot, collection, getDocs, limit, query, signOut } from './firebase-config.js';

        // GLOBAL PROFILE SAVE FUNCTION
        window.saveProfile = async function(newLanguage, newName) {
            const user = auth.currentUser;
            if (user) {
                try {
                    await setDoc(doc(db, "users", user.uid), {
                        language: newLanguage,
                        username: newName,
                        lastUpdated: new Date()
                    }, { merge: true });
                    alert("Settings synced across all your devices!");
                } catch (e) { console.error("Sync Error", e); }
            }
        }

        // AUTH & LIVE SETTINGS SYNC
        auth.onAuthStateChanged(user => {
            const authBtn = document.getElementById('global-auth-btn');
            const userDisplay = document.querySelector('.global-username');
            const mobileSection = document.getElementById('mobile-auth-section');
            const lang = localStorage.getItem('kHubLang') || 'en';
            const l = translations[lang];

            if (user) {
                // LIVE SYNC: Listen for Firestore changes (username, language, etc.)
                onSnapshot(doc(db, "users", user.uid), (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        if (userDisplay) userDisplay.innerText = data.username || "User";
                        
                        // If language changed on another device, update this one too
                        if (data.language && data.language !== localStorage.getItem('kHubLang')) {
                            applyLanguage(data.language);
                        }
                    }
                });

                authBtn.innerText = l.logout;
                authBtn.onclick = () => signOut(auth).then(() => window.location.reload());
                
                mobileSection.innerHTML = `
                    <a href="user-dashboard.html" class="text-purple-400 uppercase text-lg tracking-widest font-black italic">${l.dash}</a>
                    <button onclick="auth.signOut()" class="text-red-500 uppercase text-lg tracking-widest font-black text-left mt-4 italic">${l.logout}</button>`;
            } else {
                authBtn.innerText = l.login;
                authBtn.onclick = () => window.location.href = 'login.html';
                userDisplay.innerText = "";
                mobileSection.innerHTML = `<a href="login.html" class="text-purple-400 uppercase text-lg tracking-widest font-black italic">${l.login}</a>`;
            }
        });

        // FETCH DATA
        async function fetchTrips() {
            const grid = document.getElementById('transport-grid');
            const lang = localStorage.getItem('kHubLang') || 'en';
            try {
                const q = query(collection(db, "transport"), limit(12));
                const snap = await getDocs(q);
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const t = doc.data();
                    grid.innerHTML += `
                        <div class="glass-panel overflow-hidden bg-white/5 p-6 border-white/10 relative transition-all duration-300 trip-card group">
                            <div class="flex justify-between items-start mb-6">
                                <div class="w-10 h-10 bg-purple-500/20 rounded-xl flex items-center justify-center text-lg">🚐</div>
                                <span class="text-emerald-400 font-black text-sm tracking-tighter italic">₦${Number(t.fare || 0).toLocaleString()}</span>
                            </div>
                            <div class="mb-6">
                                <h4 class="text-[11px] font-black uppercase text-gray-300 italic mb-2">${t.from} → ${t.to}</h4>
                            </div>
                            <button onclick="window.location.href='trip-details.html?id=${doc.id}'" class="w-full py-3 rounded-xl border border-white/10 text-[10px] font-black uppercase hover:bg-purple-600 transition italic">${translations[lang].book}</button>
                        </div>`;
                });
            } catch (err) { console.error(err); }
        }

        window.addEventListener('langChanged', fetchTrips);
        fetchTrips();
    </script>
</body>
</html>
