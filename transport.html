<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Find Your Ride in Kano</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-purple: #8B5CF6; --neon-blue: #3B82F6; }
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); margin: 0; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .btn-gradient { background: linear-gradient(90deg, #A855F7 0%, #3B82F6 100%); transition: all 0.3s ease; }
        
        /* Fixed Mobile Menu Transition */
        #mobile-menu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); visibility: hidden; }
        #mobile-menu.active { transform: translateX(0); visibility: visible; }
        
        /* Language Selector Styling - Brand Aligned */
        .menu-translate .goog-te-gadget-simple { 
            background: rgba(139, 92, 246, 0.1) !important; 
            border: 1px solid rgba(139, 92, 246, 0.3) !important; 
            padding: 12px !important; 
            border-radius: 16px !important; 
            width: 100%; 
            display: flex; 
            justify-content: center;
            font-family: 'Inter', sans-serif !important;
        }
        .menu-translate .goog-te-gadget-simple span { 
            color: #fff !important; 
            font-size: 11px !important; 
            font-weight: 800 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.1em !important;
        }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0 !important; }

        input[type='range'] { accent-color: #8B5CF6; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">

    <div id="mobile-menu" class="fixed inset-0 z-[100] bg-[#06080C]/98 backdrop-blur-2xl p-8 flex flex-col md:hidden">
        <div class="flex justify-between items-center mb-12">
            <span class="text-xl font-black text-purple-500 italic tracking-tighter">K-HUB MENU</span>
            <button onclick="toggleMenu()" class="text-white p-2 glass-panel border-white/20">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav class="flex flex-col gap-8 text-3xl font-black uppercase tracking-tighter">
            <a href="index.html" class="text-gray-500 hover:text-white transition">Home</a>
            <a href="job-search.html" class="text-gray-500 hover:text-white transition">Jobs</a>
            <a href="rentals.html" class="text-gray-500 hover:text-white transition">Rentals</a>
            <a href="shop.html" class="text-gray-500 hover:text-white transition">Shop</a>
            <a href="transport.html" class="text-white border-l-4 border-purple-500 pl-4">Transport</a>
            <div id="mobile-auth-section" class="flex flex-col gap-4 border-t border-white/10 pt-6"></div>
        </nav>
        <div class="mt-auto">
            <p class="text-[10px] uppercase tracking-[0.3em] text-purple-400 mb-4 font-black">Choose Language</p>
            <div id="google_translate_element" class="menu-translate"></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto glass-panel p-6 md:p-10 relative overflow-hidden ring-1 ring-purple-500/20 shadow-2xl">
        
        <header class="flex justify-between items-center mb-12">
            <div class="flex flex-col items-center cursor-pointer" onclick="window.location.href='index.html'">
                <svg class="w-12 h-12 mb-1" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#k-grad-shop)"/>
                    <path d="M12 10V30M12 20L28 10M20 15L28 30" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="k-grad-shop" x1="0" y1="0" x2="40" y2="40">
                            <stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h1 class="text-[10px] font-black italic tracking-tighter leading-none">K-HUB</h1>
            </div>

            <nav class="hidden md:flex gap-8 text-[11px] font-black text-gray-400 uppercase tracking-widest">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="job-search.html" class="hover:text-white transition">Jobs</a>
                <a href="rentals.html" class="hover:text-white transition">Rentals</a>
                <a href="transport.html" class="text-white border-b-2 border-purple-500 pb-1">Transport</a>
            </nav>

            <div class="flex items-center gap-4" id="desktop-auth-section">
                <button onclick="toggleMenu()" class="md:hidden p-2 glass-panel border-white/10">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-8">
                <section class="mb-10">
                    <h1 class="text-4xl md:text-5xl font-black mb-2 tracking-tighter uppercase italic">Find Your Ride</h1>
                    <div class="h-1 w-24 bg-blue-500 mb-8 rounded-full"></div>
                    <div class="glass-panel p-2 flex flex-col md:flex-row items-center gap-2 mb-6 border-white/10">
                        <div class="flex items-center gap-2 flex-1 px-4 py-3 border-b md:border-b-0 md:border-r border-white/10 w-full">
                            <input type="text" placeholder="From (e.g. Sabon Gari)" class="bg-transparent outline-none text-sm w-full font-bold">
                        </div>
                        <div class="flex items-center gap-2 flex-1 px-4 py-3 border-b md:border-b-0 md:border-r border-white/10 w-full">
                            <input type="text" placeholder="To (e.g. Hotoro)" class="bg-transparent outline-none text-sm w-full font-bold">
                        </div>
                        <button class="btn-gradient p-3 px-6 rounded-xl w-full md:w-auto font-black text-xs uppercase tracking-widest">Search</button>
                    </div>
                </section>

                <div id="transport-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                    <div class="col-span-full text-center py-10 text-gray-600 animate-pulse uppercase font-black text-[10px] tracking-[0.3em]">Syncing Live Trips...</div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-8">
                <div class="glass-panel p-6 border-white/10">
                    <h3 class="text-[10px] font-black uppercase tracking-widest mb-8 text-gray-500">Filter Results</h3>
                    <div class="space-y-10">
                        <div>
                            <div class="flex justify-between mb-4">
                                <p class="text-[10px] font-black uppercase text-gray-400">Seats Needed</p>
                                <span class="text-purple-500 font-black text-[10px]">ANY</span>
                            </div>
                            <input type="range" min="1" max="10" class="w-full">
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-20 flex flex-col md:flex-row justify-between items-center text-[10px] text-gray-500 border-t border-white/5 pt-8 gap-8 font-black uppercase tracking-[0.2em]">
            <div class="flex gap-8">
                <a href="#" class="hover:text-purple-400 transition">About</a>
                <a href="#" class="hover:text-purple-400 transition">Help</a>
                <a href="#" class="hover:text-purple-400 transition text-red-500/50">Safety</a>
            </div>
            <div class="text-center">K-HUB GLOBAL | <span class="text-white">2026</span></div>
        </footer>
    </div>

    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ha,ig,yo,en', // Hausa, Igbo, Yoruba, English
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script type="module">
        import { auth, db, collection, getDocs, limit, query, signOut } from './firebase-config.js';
        
        // ADMIN LOGIC IMPORT
        import { initAdminLogic } from './admin-guard.js';
        initAdminLogic('transport'); 

        // 1. GLOBAL MENU TOGGLE
        window.toggleMenu = () => {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        };

        // 2. DYNAMIC AUTH STATE
        auth.onAuthStateChanged(user => {
            const desktopSection = document.getElementById('desktop-auth-section');
            const mobileSection = document.getElementById('mobile-auth-section');

            if (user) {
                const navButtons = `
                    <button onclick="window.location.href='user-dashboard.html'" class="text-[10px] font-black uppercase text-purple-400 border border-purple-400/30 px-5 py-2 rounded-full hover:bg-purple-500 hover:text-white transition">Dashboard</button>
                    <button id="logout-btn" class="text-[10px] font-black uppercase text-red-500/70 hover:text-red-500 transition ml-4">Sign Out</button>
                `;
                desktopSection.innerHTML = navButtons + `
                    <button onclick="toggleMenu()" class="md:hidden p-3 glass-panel border-white/10 ml-2">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>`;
                mobileSection.innerHTML = `
                    <a href="user-dashboard.html" class="text-purple-400 uppercase text-lg tracking-widest font-black">My Dashboard</a>
                    <button id="mobile-logout-btn" class="text-red-500 uppercase text-lg tracking-widest font-black text-left mt-4">Sign Out</button>`;
            } else {
                desktopSection.innerHTML = `
                    <button onclick="window.location.href='login.html'" class="btn-gradient px-6 py-2 rounded-full text-[10px] font-black uppercase">Login</button>
                    <button onclick="toggleMenu()" class="md:hidden p-3 glass-panel border-white/10 ml-2">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>`;
                mobileSection.innerHTML = `<a href="login.html" class="text-purple-400 uppercase text-lg tracking-widest font-black">Login / Register</a>`;
            }

            const logoutAction = () => signOut(auth).then(() => window.location.reload());
            document.getElementById('logout-btn')?.addEventListener('click', logoutAction);
            document.getElementById('mobile-logout-btn')?.addEventListener('click', logoutAction);
        });

        // 3. FETCH DATA & RENDER WITH ADMIN DELETE
        async function fetchTrips() {
            const grid = document.getElementById('transport-grid');
            try {
                const q = query(collection(db, "transport"), limit(12));
                const snap = await getDocs(q);
                grid.innerHTML = '';
                
                if (snap.empty) {
                    grid.innerHTML = '<p class="col-span-full text-center text-gray-500 py-10 font-bold uppercase text-[10px]">No active trips found.</p>';
                    return;
                }

                snap.forEach(doc => {
                    const t = doc.data();
                    grid.innerHTML += `
                        <div class="glass-panel overflow-hidden bg-white/5 p-6 border-white/10 relative group">
                            
                            <button onclick="adminDeleteAny('${doc.id}')" class="admin-only hidden absolute top-4 right-4 z-10 bg-red-600 p-2 rounded-lg text-xs">🗑️</button>

                            <div class="flex justify-between items-start mb-6">
                                <div class="w-10 h-10 bg-purple-500/20 rounded-xl flex items-center justify-center text-lg">🚐</div>
                                <span class="text-emerald-400 font-black text-sm tracking-tighter">₦${Number(t.fare || 0).toLocaleString()}</span>
                            </div>
                            <div class="mb-6">
                                <h4 class="text-xs font-black mb-1 uppercase text-gray-300 tracking-tight">${t.from}</h4>
                                <div class="h-4 w-px bg-white/10 ml-2 my-1"></div>
                                <h4 class="text-xs font-black mb-1 uppercase text-white tracking-tight">${t.to}</h4>
                            </div>
                            <div class="flex justify-between items-center mb-6">
                                <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">${t.availableSeats || 0} SEATS</p>
                                <p class="text-[9px] text-purple-400 font-black uppercase">${t.type || 'Shared'}</p>
                            </div>
                            <button onclick="window.location.href='trip-details.html?id=${doc.id}'" class="w-full py-3 rounded-xl border border-white/10 text-[10px] font-black uppercase hover:bg-purple-600 transition tracking-widest">Book Seat</button>
                        </div>`;
                });
            } catch (err) { grid.innerHTML = '<p class="text-red-500 uppercase text-[10px] font-black">Failed to sync database.</p>'; }
        }
        fetchTrips();
    </script>
</body>
</html>
