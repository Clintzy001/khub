<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub Transport | Travel from Kano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .route-line { border-left: 2px dashed rgba(139, 92, 246, 0.5); }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-[#0B0E14]/80 backdrop-blur-md border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="20" fill="url(#logoGrad)"/>
                    <path d="M14 12V28M14 20L24 12M14 20L24 28" stroke="white" stroke-width="3" stroke-linecap="round"/>
                    <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#3B82F6"/></linearGradient></defs>
                </svg>
                <span class="text-xl font-bold tracking-tight">K-Hub</span>
            </div>

            <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="job-search.html" class="hover:text-purple-400 transition">Jobs</a>
                <a href="rentals.html" class="hover:text-purple-400 transition">Rentals</a>
                <a href="shop.html" class="hover:text-purple-400 transition">Shop</a>
                <a href="transport.html" class="text-white border-b-2 border-purple-500 pb-1">Transport</a>
            </nav>

            <div class="flex items-center gap-4">
                <button onclick="window.location.href='post-transport.html'" class="hidden sm:block text-[10px] border border-purple-500/50 text-purple-400 px-4 py-2 rounded-xl font-bold hover:bg-purple-500 hover:text-white transition">Post a Trip</button>
                <button onclick="window.location.href='user-dashboard.html'" class="hidden sm:block text-[10px] bg-white/10 px-4 py-2 rounded-xl font-bold hover:bg-white/20 transition">Dashboard</button>
                <div onclick="window.location.href='user-dashboard.html'" class="w-9 h-9 rounded-full bg-purple-600 flex items-center justify-center font-bold cursor-pointer">U</div>
            </div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 py-10">
        <div class="glass-card p-6 rounded-3xl">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 font-bold uppercase ml-2">From</label>
                    <select id="search-from" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500">
                        <option>Gwale, Kano</option>
                        <option>Tarauni, Kano</option>
                        <option>Nasarawa, Kano</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 font-bold uppercase ml-2">To</label>
                    <select id="search-to" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500">
                        <option>Sabon Gari, Kano</option>
                        <option>Zaria, Kaduna</option>
                        <option>Abuja, FCT</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 font-bold uppercase ml-2">Date</label>
                    <input type="date" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500">
                </div>
                <div class="flex items-end">
                    <button class="neon-gradient w-full py-3 rounded-xl font-bold shadow-lg shadow-purple-500/20 active:scale-95 transition">Find Rides</button>
                </div>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <h2 class="text-xl font-bold mb-6">Available Trips</h2>
        
        <div id="transport-list" class="space-y-6">
            <div class="glass-card p-6 rounded-3xl hover:border-purple-500/30 transition group">
                <div class="flex flex-col lg:flex-row justify-between gap-8">
                    <div class="flex flex-grow gap-8">
                        <div class="flex flex-col items-center justify-between py-1">
                            <div class="w-3 h-3 rounded-full bg-purple-500"></div>
                            <div class="w-0.5 flex-grow border-l-2 border-dashed border-white/20 my-1"></div>
                            <div class="w-3 h-3 rounded-full border-2 border-purple-500"></div>
                        </div>
                        <div class="space-y-6">
                            <div>
                                <p class="text-lg font-bold">08:00 AM</p>
                                <p class="text-sm text-gray-400">Gwale Motor Park, Kano</p>
                            </div>
                            <div>
                                <p class="text-lg font-bold">09:15 AM</p>
                                <p class="text-sm text-gray-400">Sabon Gari Market</p>
                            </div>
                        </div>
                    </div>

                    <div class="lg:border-l lg:border-white/10 lg:pl-8 flex flex-col justify-center">
                        <p class="text-xs text-gray-500 uppercase font-bold mb-1">Vehicle</p>
                        <p class="font-bold flex items-center gap-2">🚐 Toyota Hiace</p>
                        <p class="text-sm text-purple-400 mt-1">4 Seats Available</p>
                    </div>

                    <div class="lg:border-l lg:border-white/10 lg:pl-8 flex flex-col justify-center items-start lg:items-end">
                        <p class="text-3xl font-extrabold text-white mb-2">₦1,500</p>
                        <button onclick="window.open('https://wa.me/2348000000000?text=I want to book a seat on the 8:00AM trip to Sabon Gari', '_blank')" 
                                class="w-full lg:w-auto px-8 py-3 bg-green-600 rounded-xl font-bold hover:bg-green-500 transition flex items-center gap-2">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.888 11.888-11.888 3.176 0 6.161 1.237 8.404 3.48s3.481 5.229 3.481 8.406c0 6.556-5.333 11.888-11.889 11.888-2.003 0-3.963-.505-5.698-1.465l-6.285 1.688zm6.052-4.103l.353.21c1.438.853 3.097 1.302 4.793 1.302 5.012 0 9.09-4.078 9.09-9.091 0-2.427-.945-4.71-2.66-6.425-1.716-1.714-3.998-2.659-6.43-2.659-5.013 0-9.091 4.078-9.091 9.091 0 1.761.508 3.479 1.47 4.965l.23.354-1.127 4.114 4.212-1.13z"/></svg>
                            Book via WhatsApp
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-t border-white/10 py-10 px-6 text-center text-xs text-gray-500">
        <p>Intercity & Intracity Travel | Made for Kano | © 2026 K-Hub</p>
    </footer>

</body>
</html>
