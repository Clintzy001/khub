<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub Transport | Travel from Kano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .route-line { border-left: 2px dashed rgba(139, 92, 246, 0.5); }
    </style>
</head>
<body class="overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-[#0B0E14]/80 backdrop-blur-md border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-8 h-8 neon-gradient rounded-lg flex items-center justify-center font-bold text-white">K</div>
                <span class="text-xl font-bold tracking-tight">K-Hub</span>
            </div>

            <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="job-search.html" class="hover:text-purple-400 transition">Jobs</a>
                <a href="shop.html" class="hover:text-purple-400 transition">Shop</a>
                <a href="transport.html" class="text-white border-b-2 border-purple-500 pb-1">Transport</a>
            </nav>

            <div class="flex items-center gap-4">
                <button onclick="window.location.href='post-transport.html'" class="hidden sm:block text-[10px] border border-purple-500/50 text-purple-400 px-4 py-2 rounded-xl font-bold hover:bg-purple-500 hover:text-white transition">Post a Trip</button>
                <button onclick="window.location.href='user-dashboard.html'" class="text-[10px] bg-white/10 px-4 py-2 rounded-xl font-bold hover:bg-white/20 transition">Dashboard</button>
            </div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 py-10">
        <div class="glass-card p-6 rounded-3xl">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 font-bold uppercase ml-2">From</label>
                    <select id="search-from" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500 text-white">
                        <option value="all">Anywhere in Kano</option>
                        <option>Gwale</option>
                        <option>Tarauni</option>
                        <option>Nasarawa</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 font-bold uppercase ml-2">To</label>
                    <select id="search-to" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500 text-white">
                        <option value="all">Everywhere</option>
                        <option>Zaria</option>
                        <option>Abuja</option>
                        <option>Kaduna</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 font-bold uppercase ml-2">Alerts</label>
                    <button id="notify-btn" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-xs font-bold text-blue-400 hover:bg-white/10">🔔 Notify me of Trips</button>
                </div>
                <div class="flex items-end">
                    <button id="find-btn" class="neon-gradient w-full py-3 rounded-xl font-bold shadow-lg shadow-purple-500/20 active:scale-95 transition">Find Rides</button>
                </div>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
            Available Trips 
            <span id="trip-count" class="bg-purple-500/20 text-purple-400 text-xs px-2 py-1 rounded-md">...</span>
        </h2>
        
        <div id="transport-list" class="space-y-6">
            <div class="animate-pulse flex space-y-4 flex-col">
                <div class="h-32 bg-white/5 rounded-3xl"></div>
                <div class="h-32 bg-white/5 rounded-3xl"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, getDocs, orderBy, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // NOTIFICATION TRIGGER LOGIC
        async function sendNotification(recipientId, title, message) {
            await addDoc(collection(db, "notifications"), {
                recipientId: recipientId,
                type: 'transport',
                title: title,
                message: message,
                read: false,
                createdAt: serverTimestamp()
            });
        }

        // LOAD TRIPS
        async function loadTrips(filterFrom = 'all', filterTo = 'all') {
            const container = document.getElementById('transport-list');
            const countLabel = document.getElementById('trip-count');
            
            let q = query(collection(db, "transport"), where("status", "==", "active"), orderBy("departureTime", "asc"));
            
            // Note: Complex filtering requires Firestore Indexing
            const snap = await getDocs(q);
            container.innerHTML = "";
            let count = 0;

            if (snap.empty) {
                container.innerHTML = `<div class="glass-card p-10 text-center text-gray-500 rounded-3xl">No trips currently scheduled. Check back soon!</div>`;
                countLabel.innerText = "0";
                return;
            }

            snap.forEach(doc => {
                const data = doc.data();
                
                // Manual client-side filter for simplicity
                if (filterFrom !== 'all' && !data.from.includes(filterFrom)) return;
                if (filterTo !== 'all' && !data.to.includes(filterTo)) return;

                count++;
                const timeStr = data.departureTime?.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                container.innerHTML += `
                    <div class="glass-card p-6 rounded-3xl hover:border-purple-500/30 transition group">
                        <div class="flex flex-col lg:flex-row justify-between gap-8">
                            <div class="flex flex-grow gap-8">
                                <div class="flex flex-col items-center justify-between py-1">
                                    <div class="w-3 h-3 rounded-full bg-purple-500"></div>
                                    <div class="w-0.5 flex-grow border-l-2 border-dashed border-white/20 my-1"></div>
                                    <div class="w-3 h-3 rounded-full border-2 border-purple-500"></div>
                                </div>
                                <div class="space-y-6">
                                    <div>
                                        <p class="text-lg font-bold">${timeStr}</p>
                                        <p class="text-sm text-gray-400">${data.fromLocation}</p>
                                    </div>
                                    <div>
                                        <p class="text-lg font-bold">To ${data.to}</p>
                                        <p class="text-sm text-gray-400">${data.toLocation}</p>
                                    </div>
                                </div>
                            </div>

                            <div class="lg:border-l lg:border-white/10 lg:pl-8 flex flex-col justify-center">
                                <p class="text-xs text-gray-500 uppercase font-bold mb-1">Vehicle</p>
                                <p class="font-bold flex items-center gap-2">🚐 ${data.vehicleType || 'Car'}</p>
                                <p class="text-sm text-purple-400 mt-1">${data.availableSeats} Seats Available</p>
                            </div>

                            <div class="lg:border-l lg:border-white/10 lg:pl-8 flex flex-col justify-center items-start lg:items-end">
                                <p class="text-3xl font-extrabold text-white mb-2">₦${data.fare}</p>
                                <button onclick="bookTrip('${data.phone}', '${data.to}', '${timeStr}')" 
                                        class="w-full lg:w-auto px-8 py-3 bg-green-600 rounded-xl font-bold hover:bg-green-500 transition flex items-center gap-2">
                                    Book via WhatsApp
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            countLabel.innerText = count;
        }

        window.bookTrip = (phone, to, time) => {
            const msg = encodeURIComponent(`Hello K-Hub Driver, I want to book a seat on your trip to ${to} at ${time}.`);
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        };

        // NOTIFY BUTTON LOGIC
        document.getElementById('notify-btn').onclick = async () => {
            const user = auth.currentUser;
            if (!user) return alert("Please login to enable trip alerts!");
            
            await sendNotification(user.uid, "Alert Active 🚗", "You'll receive a notification when a driver posts a trip matching your search.");
            alert("Trip alerts enabled for your account!");
        };

        document.getElementById('find-btn').onclick = () => {
            const from = document.getElementById('search-from').value;
            const to = document.getElementById('search-to').value;
            loadTrips(from, to);
        };

        // Initial Load
        loadTrips();
    </script>
</body>
</html>
