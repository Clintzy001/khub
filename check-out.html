<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0B0E14; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-gradient { background: linear-gradient(90deg, #8B5CF6 0%, #3B82F6 100%); }
    </style>
</head>
<body class="py-12 px-6">
    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-10">
        <div class="lg:col-span-2 space-y-6">
            <h1 class="text-2xl font-bold">Checkout</h1>
            
            <section class="glass-card p-6 rounded-3xl">
                <h3 class="font-bold mb-4 flex items-center gap-2">📍 Delivery Address</h3>
                <textarea class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500" rows="3" placeholder="Enter your full address in Kano..."></textarea>
            </section>

            <section class="glass-card p-6 rounded-3xl">
                <h3 class="font-bold mb-4 flex items-center gap-2">💳 Payment Method</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <label class="flex items-center justify-between p-4 bg-white/5 border border-purple-500 rounded-xl cursor-pointer">
                        <span class="text-sm font-bold">Bank Transfer</span>
                        <input type="radio" name="pay" checked class="accent-purple-500">
                    </label>
                    <label class="flex items-center justify-between p-4 bg-white/5 border border-white/10 rounded-xl cursor-pointer">
                        <span class="text-sm font-bold">Debit Card (Paystack)</span>
                        <input type="radio" name="pay" class="accent-purple-500">
                    </label>
                </div>
            </section>
        </div>

        <aside>
            <div class="glass-card p-6 rounded-3xl sticky top-6">
                <h3 class="font-bold mb-6">Order Summary</h3>
                <div class="space-y-4 mb-6 border-b border-white/10 pb-6" id="summary-items">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-400">Handmade Leather Wallet</span>
                        <span>₦7,500</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-400">Delivery Fee</span>
                        <span>₦1,000</span>
                    </div>
                </div>
                <div class="flex justify-between font-bold text-lg mb-8">
                    <span>Total</span>
                    <span class="text-purple-400">₦8,500</span>
                </div>
                <button onclick="location.href='booking-ticket.html'" class="w-full py-4 neon-gradient rounded-2xl font-bold shadow-lg shadow-purple-500/20">Complete Purchase</button>
            </div>
        </aside>
    </main>
</body>
</html>
