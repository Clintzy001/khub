<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Hub | Update Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #06080C; color: white; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #06080c 60%); }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        input, textarea { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; padding: 12px; border-radius: 12px; color: white; outline: none; }
        input:focus { border-color: #8B5CF6; }
    </style>
</head>
<body class="p-6 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full glass-panel p-8">
        <h1 class="text-2xl font-black italic mb-2">EDIT <span class="text-purple-500">PROFILE</span></h1>
        <p class="text-gray-500 text-xs uppercase tracking-widest mb-8 font-bold">Update your public identity</p>

        <form id="edit-profile-form" class="space-y-6">
            <div>
                <label class="text-[10px] uppercase font-black text-gray-400 block mb-2">Full Name</label>
                <input type="text" id="edit-fullname" placeholder="Enter your full name" required>
            </div>

            <div>
                <label class="text-[10px] uppercase font-black text-gray-400 block mb-2">Bio / Description</label>
                <textarea id="edit-bio" rows="4" placeholder="Tell buyers about yourself..."></textarea>
            </div>

            <div>
                <label class="text-[10px] uppercase font-black text-gray-400 block mb-2">Profile Picture URL</label>
                <input type="text" id="edit-pic" placeholder="Link to an image (optional)">
            </div>

            <div class="flex gap-4 pt-4">
                <button type="button" onclick="history.back()" class="flex-1 text-xs font-black uppercase text-gray-500">Cancel</button>
                <button type="submit" class="flex-1 bg-gradient-to-r from-purple-600 to-blue-600 py-4 rounded-xl text-xs font-black uppercase tracking-widest shadow-lg shadow-purple-500/20">Save Changes</button>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCeW7PFz9wntXO0OUj9N5V1DdkUxxI2VkQ",
            authDomain: "k-hub-b4d8f.firebaseapp.com",
            projectId: "k-hub-b4d8f",
            storageBucket: "k-hub-b4d8f.firebasestorage.app",
            messagingSenderId: "117649715938",
            appId: "1:117649715938:web:7768d7b4d27d66e8ba24bb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // 1. Load current data
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    document.getElementById('edit-fullname').value = data.fullName || "";
                    document.getElementById('edit-bio').value = data.bio || "";
                    document.getElementById('edit-pic').value = data.profilePic || "";
                }
            } else {
                window.location.href = "k-hub-login.html";
            }
        });

        // 2. Handle Update
        document.getElementById('edit-profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = "UPDATING...";
            btn.disabled = true;

            try {
                await updateDoc(doc(db, "users", currentUser.uid), {
                    fullName: document.getElementById('edit-fullname').value,
                    bio: document.getElementById('edit-bio').value,
                    profilePic: document.getElementById('edit-pic').value,
                    lastUpdated: new Date()
                });
                alert("Profile updated successfully!");
                window.location.href = "user-dashboard.html";
            } catch (error) {
                console.error(error);
                alert("Error updating profile.");
                btn.innerText = "SAVE CHANGES";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
